<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotta - Zongora Akadémia (Stabil)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #0a84ff; --neon-orange: #ff9f0a; --neon-purple: #bf5af2;
            --success-green: #32d74b; --error-red: #ff453a; --bg-dark: #050508; 
            --panel-bg: rgba(20, 20, 30, 0.75); --border-color: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 20, 40, 0.5) 0%, rgba(5, 5, 8, 1) 100%), url('zongora-hatter-dark.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: var(--bg-dark); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .font-loader { position: absolute; left: -9999px; visibility: hidden; font-family: 'Noto Music'; }
        .back-btn { position: fixed; top: 15px; left: 15px; color: #aaa; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); z-index: 10; }
        h1 { color: var(--neon-orange); text-transform: uppercase; letter-spacing: 3px; margin: 0 0 10px 0; font-size: 26px; }

        .master-panel { background: var(--panel-bg); padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 8px; width: 850px; box-sizing: border-box; backdrop-filter: blur(15px); }
        .button-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; align-items: center; width: 100%; }
        button.cfg-btn { padding: 6px 12px; background: rgba(0,0,0,0.5); color: #aaa; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; text-transform: uppercase; }
        
        button.cfg-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(10, 132, 255, 0.15); }
        .toggle-btn.on { border-color: var(--success-green); color: var(--success-green); background: rgba(50, 215, 75, 0.15); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 8px; width: 850px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; border: 1px solid var(--border-color); text-align: center; }
        .stat-label { font-size: 11px; color: #bbb; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; font-family: 'Rajdhani', sans-serif; line-height: 1; }

        #btnAction { padding: 10px 50px; background: var(--success-green); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 14px; margin-bottom: 5px; }
        #btnAction.running { background: var(--error-red); color: #fff; }

        canvas { background: rgba(10, 10, 15, 0.7); border: 1px solid var(--border-color); border-radius: 12px; }
    </style>
</head>
<body>
    <div class="font-loader">𝄞𝄢</div>
    <a href="index.html" class="back-btn">← AKADÉMIA</a>
    <h1>KOTTA</h1>

    <div class="master-panel">
        <div class="button-group">
            <button id="btnTreble" class="cfg-btn active" onclick="toggleClef('treble')">VIOLIN</button>
            <button id="btnBass" class="cfg-btn active" onclick="toggleClef('bass')">BASSZUS</button>
            <button id="btnTimer" class="cfg-btn toggle-btn on" onclick="toggleTimer()">IDŐKORLÁT</button>
            <span style="color:#555;">|</span>
            <button id="btnAcc" class="cfg-btn toggle-btn on" onclick="toggleAccidentals()">ELŐJEGYZÉSEK</button>
            <button id="btnHint" class="cfg-btn toggle-btn" onclick="toggleHint()">GYORS-SÚGÓ</button>
            <button id="btnMute" class="cfg-btn toggle-btn on" onclick="toggleAudio()">ZONGORA: BE</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Küldetés</div><div id="taskCount" class="stat-value" style="color:var(--neon-purple);">0 / 10</div></div>
        <div class="stat-box"><div class="stat-label">Idő</div><div class="stat-value" id="seconds">5</div></div>
        <div class="stat-box"><div class="stat-label">Találat</div><div id="scoreOk" class="stat-value" style="color:var(--success-green);">0</div></div>
        <div class="stat-box"><div class="stat-label">Sorozat</div><div id="scoreCombo" class="stat-value" style="color:var(--neon-orange);">0</div></div>
    </div>

    <button id="btnAction" onclick="handleAction()">▶ GYAKORLAT INDÍTÁSA</button>
    <canvas id="staffCanvas" width="850" height="480"></canvas>

    <script>
        const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');
        let audioCtx, isMidiReady = false, isRunning = false, audioOn = true;
        let activeNotes = {}; 

        let scoreOk=0, combo=0, totalTasks=0, timeLeft=5, timerTicker=null;
        let trebleActive=true, bassActive=true, useAccidentals=true, useHint=false, timerEnabled=true;
        let currentNote=null, isTransitioning=false, visualClef='treble';

        const trebleY = 140, bassY = 340; 

        function initAudio() { 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }

        // TEGNAPI STABIL HANGMOTOR
        function playSound(midi, velocity) { 
            if (!audioOn || !audioCtx) return; 
            const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
            osc.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function drawEmptyStaff() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
            for(let i=-2; i<=2; i++){
                if(trebleActive) { ctx.beginPath(); ctx.moveTo(50, trebleY+i*24); ctx.lineTo(800, trebleY+i*24); ctx.stroke(); }
                if(bassActive) { ctx.beginPath(); ctx.moveTo(50, bassY+i*24); ctx.lineTo(800, bassY+i*24); ctx.stroke(); }
            }
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font='100px "Noto Music"'; 
            if(trebleActive) { ctx.fillStyle='#bf5af2'; ctx.fillText('\uD834\uDD1E', 95, trebleY + 20); }
            if(bassActive) { ctx.fillStyle='#0a84ff'; ctx.fillText('\uD834\uDD22', 95, bassY + 12); }
        }

        function drawNote(noteObj) {
            drawEmptyStaff();
            if(!noteObj) return;
            const bY = visualClef === 'treble' ? trebleY : bassY;
            const nY = bY - (noteObj.offset * 12), nX = canvas.width / 2;
            ctx.fillStyle = (timeLeft <= 0) ? '#ff453a' : '#fff';
            if (noteObj.offset <= -6 || noteObj.offset >= 6) {
                ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 3;
                let step = noteObj.offset <= -6 ? -2 : 2;
                for (let p = (noteObj.offset <= -6 ? -6 : 6); (step > 0 ? p <= noteObj.offset : p >= noteObj.offset); p += step) {
                    ctx.beginPath(); ctx.moveTo(nX-22, bY-p*12); ctx.lineTo(nX+22, bY-p*12); ctx.stroke();
                }
            }
            ctx.beginPath(); ctx.ellipse(nX, nY, 16, 12, Math.PI/8, 0, 2*Math.PI); ctx.fill();
            if(useHint || timeLeft <= 0) { ctx.font='bold 24px Rajdhani'; ctx.fillText(noteObj.n, nX + 60, nY); }
        }

        function handleAction() {
            if (!isMidiReady) {
                initAudio();
                navigator.requestMIDIAccess().then(access => {
                    for (let input of access.inputs.values()) input.onmidimessage = (e) => {
                        let [s, n, v] = e.data;
                        if ((s & 0xf0) === 0x90 && v > 0) {
                            playSound(n, v);
                            if(isRunning && !isTransitioning && currentNote && n === currentNote.midi) {
                                isTransitioning=true; scoreOk++; combo++; updateStats();
                                setTimeout(() => { isTransitioning=false; nextTask(); }, 600);
                            }
                        }
                    };
                    isMidiReady = true; startPractice();
                });
                return;
            }
            isRunning ? stopPractice() : startPractice();
        }

        function startPractice() { isRunning = true; totalTasks = 0; scoreOk = 0; combo = 0; updateStats(); document.getElementById('btnAction').innerText = "◼ LEÁLLÍTÁS"; document.getElementById('btnAction').classList.add('running'); nextTask(); }
        function stopPractice() { isRunning = false; clearInterval(timerTicker); document.getElementById('btnAction').innerText = "▶ GYAKORLAT INDÍTÁSA"; document.getElementById('btnAction').classList.remove('running'); drawEmptyStaff(); }
        function nextTask() { if (totalTasks >= 10) { stopPractice(); return; } totalTasks++; updateStats(); generateNote(); startTimer(); drawNote(currentNote); }
        
        function generateNote() {
            visualClef = (trebleActive && bassActive) ? (Math.random() > 0.5 ? 'treble' : 'bass') : (trebleActive ? 'treble' : 'bass');
            const notes = visualClef === 'treble' ? 
                [{n:'C4',o:-6,m:60},{n:'D4',o:-5,m:62},{n:'E4',o:-4,m:64},{n:'F4',o:-3,m:65},{n:'G4',o:-2,m:67},{n:'A4',o:-1,m:69},{n:'B4',o:0,m:71},{n:'C5',o:1,m:72}] :
                [{n:'E2',o:-6,m:40},{n:'G2',o:-4,m:43},{n:'C3',o:-1,m:48},{n:'E3',o:1,m:52},{n:'G3',o:3,m:55},{n:'C4',o:6,m:60}];
            currentNote = notes[Math.floor(Math.random() * notes.length)];
        }

        function startTimer() {
            clearInterval(timerTicker); if(!timerEnabled) return;
            timeLeft = 5; document.getElementById('seconds').innerText = timeLeft;
            timerTicker = setInterval(() => {
                if(!isRunning || isTransitioning) return;
                timeLeft--; if(timeLeft <= 0) { timeLeft = 0; drawNote(currentNote); }
                document.getElementById('seconds').innerText = timeLeft;
            }, 1000);
        }

        function updateStats() { document.getElementById('taskCount').innerText = `${totalTasks} / 10`; document.getElementById('scoreOk').innerText = scoreOk; document.getElementById('scoreCombo').innerText = combo; }
        function toggleClef(c) { if(c==='treble') trebleActive=!trebleActive; else bassActive=!bassActive; if(!trebleActive && !bassActive) {trebleActive=true; bassActive=true;} document.getElementById('btnTreble').classList.toggle('active', trebleActive); document.getElementById('btnBass').classList.toggle('active', bassActive); drawEmptyStaff(); }
        function toggleTimer() { timerEnabled=!timerEnabled; document.getElementById('btnTimer').classList.toggle('on', timerEnabled); if(!timerEnabled) document.getElementById('seconds').innerText = "--"; }
        function toggleAccidentals() { useAccidentals=!useAccidentals; document.getElementById('btnAcc').classList.toggle('on', useAccidentals); }
        function toggleHint() { useHint=!useHint; document.getElementById('btnHint').classList.toggle('on', useHint); if(currentNote) drawNote(currentNote); }
        function toggleAudio() { audioOn = !audioOn; document.getElementById('btnMute').classList.toggle('on', audioOn); }

        window.onload = () => { document.fonts.ready.then(drawEmptyStaff); };
    </script>
</body>
</html>
