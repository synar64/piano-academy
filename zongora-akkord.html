<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Zongora Oktató - Akkord Mester 10.7</title>
    <style>
        :root {
            --neon-blue: #00d4ff; --neon-orange: #ffaa00; --neon-purple: #bf5af2;
            --success-green: #32d74b; --error-red: #ff453a; --bg-color: #050510; --panel-bg: rgba(0, 0, 0, 0.9);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .back-btn { position: fixed; top: 15px; left: 15px; color: #888; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; border: 1px solid #333; }
        
        /* Kompaktabb fejléc */
        h1 { color: var(--neon-purple); text-transform: uppercase; letter-spacing: 3px; margin: 0 0 5px 0; font-size: 26px; text-shadow: 0 0 15px rgba(191,90,242,0.4); }
        
        /* Folyamatjelző */
        #timer-container { width: 850px; height: 10px; background: #222; border-radius: 6px; margin-bottom: 8px; overflow: hidden; border: 1px solid #444; }
        #timer-bar { width: 100%; height: 100%; background-color: var(--neon-purple); transition: width 0.1s linear; }

        /* Egysoros, szélesebb mester panel */
        .master-panel { background: var(--panel-bg); padding: 10px 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; width: 850px; box-sizing: border-box;}
        .button-group { display: flex; gap: 6px; flex-wrap: nowrap; justify-content: center; align-items: center; width: 100%; }
        
        /* Keskenyebb gombok */
        button.cfg-btn, select.cfg-btn { padding: 6px 10px; background: #0a0a0a; color: #888; border: 2px solid #333; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; text-transform: uppercase; appearance: none; text-align: center;}
        select.cfg-btn { padding-right: 20px; }
        button.cfg-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); background: #001a25; }
        
        button.clef-treble.active { border-color: var(--neon-purple); color: var(--neon-purple); background: #15001a; }
        button.clef-bass.active { border-color: var(--neon-blue); color: var(--neon-blue); background: #001a25; }
        button.clef-mixed.active { border-color: var(--neon-orange); color: var(--neon-orange); background: #1a1000; }

        .toggle-btn { border-color: #444; }
        .toggle-btn.on { border-color: var(--success-green); color: var(--success-green); background: #001a05; }

        /* Kompaktabb statisztika */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; width: 850px; box-sizing: border-box; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-size: 18px; font-weight: bold; font-family: monospace; }
        .stat-good .stat-value { color: var(--success-green); }
        .stat-bad .stat-value { color: var(--error-red); }
        .stat-acc .stat-value { color: var(--neon-purple); }

        /* Kompaktabb gomb és vászon */
        #btnAction { padding: 10px 50px; background: var(--success-green); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(50,215,75,0.3); margin-bottom: 5px;}
        #btnAction.running { background: var(--error-red); color: #fff; box-shadow: 0 4px 15px rgba(255,69,58,0.3); }

        canvas { background: #000; border: 2px solid #222; border-radius: 12px; transition: border-color 0.3s; }
        
        .active-notes-panel { margin-top: 5px; background: var(--panel-bg); border: 1px solid #333; padding: 6px; border-radius: 8px; min-width: 400px; text-align: center; color: var(--neon-orange); font-family: monospace; font-size: 16px; }
        #status { margin-top: 5px; font-size: 16px; font-weight: bold; height: 20px; text-align: center; letter-spacing: 1px; color: var(--neon-blue); }

        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← AKADÉMIA</a>

    <div style="text-align: center; margin-bottom: 2px;">
        <h1>AKKORD MESTER 10.7</h1>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>

    <div class="master-panel">
        <div class="button-group">
            <button id="btnTreble" class="cfg-btn clef-treble active" onclick="setClef('treble')">VIOLIN</button>
            <button id="btnBass" class="cfg-btn clef-bass" onclick="setClef('bass')">BASSZUS</button>
            <button id="btnMixed" class="cfg-btn clef-mixed" onclick="setClef('mixed')">VEGYES</button>
            
            <select id="modeSelector" class="cfg-btn" onchange="if(isRunning){stopMission();}">
                <option value="sheet">KOTTAOLVASÓ</option>
                <option value="lead">STÚDIÓ ZENÉSZ</option>
            </select>
            
            <select id="levelSelector" class="cfg-btn" onchange="if(isRunning){stopMission();}">
                <option value="1">1. SZINT (ALAP)</option>
                <option value="2">2. SZINT (FORDÍTÁS)</option>
                <option value="3">3. SZINT (HALADÓ)</option>
            </select>
            
            <button id="btnMute" class="cfg-btn toggle-btn on" onclick="toggleAudio()">ZONGORA: ON</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box stat-acc"><div class="stat-label">Küldetés</div><div id="taskCount" class="stat-value">0 / 10</div></div>
        <div class="stat-box stat-bad"><div class="stat-label">Időkorlát</div><div class="stat-value"><span id="seconds">5.0</span>s</div></div>
        <div class="stat-box stat-good"><div class="stat-label">Helyes</div><div id="scoreOk" class="stat-value">0</div></div>
    </div>

    <button id="btnAction" onclick="handleAction()">▶ Gyakorlat indítása</button>
    
    <div style="display:flex; flex-direction:column; align-items:center;">
        <canvas id="staffCanvas" width="850" height="480"></canvas>
        <div class="active-notes-panel" id="activeNotesDisplay">- Üres -</div>
        <div id="status">Kattints a gombra a kezdéshez!</div>
    </div>

    <div id="resultModal">
        <h1 id="modalTitle" style="color: var(--neon-purple);">Szakasz Lezárva</h1>
        <h2 id="resPercent" style="font-size: 80px; color: var(--success-green); margin: 10px 0;">0%</h2>
        <p id="resMsg" style="font-size: 24px; text-align: center; max-width: 600px; line-height: 1.5;">-</p>
        <br>
        <button onclick="startMission()" style="background: var(--success-green); color: #000; padding: 15px 50px; font-size: 20px; border:none; border-radius: 8px; cursor:pointer; font-weight:bold; text-transform:uppercase;">Következő kör</button>
        <button onclick="document.getElementById('resultModal').style.display='none';" style="background: transparent; color: #888; padding: 15px 50px; font-size: 16px; border: 2px solid #444; border-radius: 8px; cursor:pointer; font-weight:bold; text-transform:uppercase; margin-top: 15px;">Bezárás</button>
    </div>

    <script>
        const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');
        const timerBar = document.getElementById('timer-bar');
        const midiNames = { 48:'C3', 49:'C#3', 50:'D3', 51:'Eb3', 52:'E3', 53:'F3', 54:'F#3', 55:'G3', 56:'Ab3', 57:'A3', 58:'Bb3', 59:'B3', 60:'C4', 61:'C#4', 62:'D4', 64:'E4', 65:'F4', 66:'F#4', 67:'G4', 69:'A4', 70:'Bb4', 71:'B4', 72:'C5', 73:'C#5', 74:'D5', 75:'Eb5', 76:'E5', 77:'F5', 78:'F#5', 79:'G5', 80:'Ab5', 81:'A5' };

        let scoreOk = 0, totalTasks = 0, audioCtx;
        let isMidiReady = false, isRunning = false, isEvaluating = false, isWaitingForCorrection = false;
        let currentClef = 'treble', visualClef = 'treble', currentChord = null, lastChordName = ""; 
        let audioOn = true;
        let activeMidiNotes = new Set(), timerTicker = null;

        let dynamicTimeLimit = 5.0, timeLeft = 5.0;

        // Igazított vonalrendszerek a 480px-es vászonhoz
        const trebleY = 120, bassY = 360;

        const chords = {
            treble: {
                "1": [{name:"C", notes:[{m:60,off:-6,s:''},{m:64,off:-4,s:''},{m:67,off:-2,s:''}]},{name:"F", notes:[{m:65,off:-3,s:''},{m:69,off:-1,s:''},{m:72,off:1,s:''}]},{name:"Am", notes:[{m:69,off:-1,s:''},{m:72,off:1,s:''},{m:76,off:3,s:''}]},{name:"Dm", notes:[{m:62,off:-5,s:''},{m:65,off:-3,s:''},{m:69,off:-1,s:''}]},{name:"G", notes:[{m:67,off:-2,s:''},{m:71,off:0,s:''},{m:74,off:2,s:''}]},{name:"Em", notes:[{m:64,off:-4,s:''},{m:67,off:-2,s:''},{m:71,off:0,s:''}]}],
                "2": [{name:"C (inv1)", notes:[{m:64,off:-4,s:''},{m:67,off:-2,s:''},{m:72,off:1,s:''}]},{name:"C (inv2)", notes:[{m:67,off:-2,s:''},{m:72,off:1,s:''},{m:76,off:3,s:''}]},{name:"G (inv1)", notes:[{m:71,off:0,s:''},{m:74,off:2,s:''},{m:79,off:5,s:''}]},{name:"Am (inv1)", notes:[{m:72,off:1,s:''},{m:76,off:3,s:''},{m:81,off:6,s:''}]}],
                "3": [{name:"G7", notes:[{m:67,off:-2,s:''},{m:71,off:0,s:''},{m:74,off:2,s:''},{m:77,off:4,s:'♮'}]},{name:"D", notes:[{m:62,off:-5,s:''},{m:66,off:-3,s:'♯'},{m:69,off:-1,s:''}]},{name:"A", notes:[{m:69,off:-1,s:''},{m:73,off:1,s:'♯'},{m:76,off:3,s:''}]},{name:"C7", notes:[{m:60,off:-6,s:''},{m:64,off:-4,s:''},{m:67,off:-2,s:''},{m:70,off:0,s:'♭'}]}]
            },
            bass: {
                "1": [{name:"C", notes:[{m:48,off:-1,s:''},{m:52,off:1,s:''},{m:55,off:3,s:''}]},{name:"F", notes:[{m:53,off:2,s:''},{m:57,off:4,s:''},{m:60,off:6,s:''}]},{name:"G", notes:[{m:55,off:3,s:''},{m:59,off:5,s:''},{m:62,off:7,s:''}]},{name:"Dm", notes:[{m:50,off:0,s:''},{m:53,off:2,s:''},{m:57,off:4,s:''}]}],
                "2": [{name:"G (inv1)", notes:[{m:47,off:-2,s:''},{m:50,off:0,s:''},{m:55,off:3,s:''}]},{name:"C (inv1)", notes:[{m:52,off:1,s:''},{m:55,off:3,s:''},{m:60,off:6,s:''}]}],
                "3": [{name:"D", notes:[{m:50,off:0,s:''},{m:54,off:2,s:'♯'},{m:57,off:4,s:''}]},{name:"G7", notes:[{m:55,off:3,s:''},{m:59,off:5,s:''},{m:62,off:7,s:''},{m:65,off:9,s:'♮'}]}]
            }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (navigator.requestMIDIAccess) { navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure); }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleAudio() {
            audioOn = !audioOn;
            const btn = document.getElementById('btnMute');
            btn.innerText = `ZONGORA: ${audioOn ? 'ON' : 'OFF'}`;
            btn.classList.toggle('on', audioOn);
            if (audioOn) initAudio();
        }

        function setClef(clef) {
            currentClef = clef;
            document.getElementById('btnTreble').classList.remove('active');
            document.getElementById('btnBass').classList.remove('active');
            document.getElementById('btnMixed').classList.remove('active');
            
            if (clef === 'treble') document.getElementById('btnTreble').classList.add('active');
            if (clef === 'bass') document.getElementById('btnBass').classList.add('active');
            if (clef === 'mixed') document.getElementById('btnMixed').classList.add('active');
            
            if(isRunning) { stopMission(); } else { draw(); }
        }

        function playTone(m, v) {
            if (!audioOn || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 440 * Math.pow(2, (m - 69) / 12); osc.type = 'triangle';
            gain.gain.setValueAtTime((v/127)*0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function drawLedgers(x, offset, baseLineY) { 
            ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 3; 
            if (offset <= -6) {
                for (let p = -6; p >= offset; p -= 2) { 
                    let py = baseLineY - (p * 12); 
                    ctx.beginPath(); ctx.moveTo(x - 28, py); ctx.lineTo(x + 28, py); ctx.stroke(); 
                }
            }
            if (offset >= 6) {
                for (let p = 6; p <= offset; p += 2) { 
                    let py = baseLineY - (p * 12); 
                    ctx.beginPath(); ctx.moveTo(x - 28, py); ctx.lineTo(x + 28, py); ctx.stroke(); 
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            
            for(let i=-2; i<=2; i++){ 
                ctx.beginPath(); ctx.moveTo(50, trebleY+i*24); ctx.lineTo(800, trebleY+i*24); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(50, bassY+i*24); ctx.lineTo(800, bassY+i*24); ctx.stroke();
            }
            
            ctx.font='240px serif'; ctx.fillStyle='#bf5af2'; ctx.fillText('\uD834\uDD1E', 95, trebleY+72);
            ctx.font='130px serif'; ctx.fillStyle='#0a84ff'; ctx.fillText('\uD834\uDD22', 95, bassY+36);

            if (!currentChord && !isWaitingForCorrection) return;
            const mode = document.getElementById('modeSelector').value;
            const noteX = canvas.width / 2;
            let baseLineY = visualClef === 'treble' ? trebleY : bassY;

            if (mode === 'lead' || isWaitingForCorrection) {
                ctx.fillStyle = isWaitingForCorrection ? '#ffaa00' : '#fff';
                ctx.font = 'bold 45px sans-serif'; ctx.textAlign = 'center';
                let textY = visualClef === 'treble' ? trebleY - 70 : bassY + 110;
                ctx.fillText(currentChord.name, noteX, textY);
            }

            if (mode === 'sheet' || isWaitingForCorrection || isEvaluating) {
                for (let n of currentChord.notes) {
                    let noteY = baseLineY - (n.off * 12);
                    ctx.fillStyle = isEvaluating ? '#32d74b' : (isWaitingForCorrection ? '#ff3b30' : (visualClef === 'treble' ? '#bf5af2' : '#0a84ff'));
                    
                    drawLedgers(noteX, n.off, baseLineY);

                    if (n.s !== '') {
                        ctx.font = '36px serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                        ctx.fillText(n.s, noteX - 28, noteY);
                    }
                    ctx.beginPath(); ctx.ellipse(noteX, noteY, 18, 13, Math.PI / 8, 0, 2 * Math.PI); ctx.fill();
                }
            }
        }

        function generateNewChord() {
            if (currentClef === 'mixed') visualClef = Math.random() > 0.5 ? 'treble' : 'bass';
            else visualClef = currentClef;
            
            const lvl = document.getElementById('levelSelector').value;
            let pool = chords[visualClef][lvl] || chords[visualClef]["1"];
            
            let nextChord;
            do { nextChord = pool[Math.floor(Math.random() * pool.length)]; } while (nextChord.name === lastChordName && pool.length > 1);
            
            currentChord = nextChord;
            lastChordName = currentChord.name;
            
            isEvaluating = false; isWaitingForCorrection = false;
            canvas.style.borderColor = "#222";
            document.getElementById('status').innerText = "Üsd le az akkordot!";
            document.getElementById('status').style.color = "var(--neon-blue)";
            draw();
        }

        function startTimer() {
            clearInterval(timerTicker); 
            timeLeft = dynamicTimeLimit; 
            updateTimerUI();
            timerTicker = setInterval(() => {
                if (isEvaluating || isWaitingForCorrection || !isRunning) return;
                timeLeft -= 0.1;
                if (timeLeft <= 0) { timeLeft = 0; stopAndShow(); }
                updateTimerUI();
            }, 100);
        }

        function updateTimerUI() {
            document.getElementById('seconds').innerText = Math.max(0, timeLeft).toFixed(1);
            timerBar.style.width = (timeLeft / dynamicTimeLimit) * 100 + "%";
            timerBar.style.backgroundColor = timeLeft < (dynamicTimeLimit * 0.3) ? "#ff3b30" : "#bf5af2";
        }

        function stopAndShow() {
            clearInterval(timerTicker);
            isWaitingForCorrection = true;
            canvas.style.borderColor = "#ff3b30";
            document.getElementById('status').innerText = "KERESD MEG A BILLENTYŰKET!";
            document.getElementById('status').style.color = "#ff3b30";
            draw(); 
        }

        function nextTask() {
            if (totalTasks >= 10) { stopMission(); showResult(); return; }
            totalTasks++;
            document.getElementById('taskCount').innerText = `${totalTasks} / 10`;
            generateNewChord();
            startTimer();
        }

        function checkMatch() {
            if (!currentChord || isEvaluating || !isRunning) return;
            if (activeMidiNotes.size === currentChord.notes.length) {
                if (currentChord.notes.every(n => activeMidiNotes.has(n.m))) {
                    if (!isWaitingForCorrection) { scoreOk++; document.getElementById('scoreOk').innerText = scoreOk; }
                    isEvaluating = true; isWaitingForCorrection = false;
                    clearInterval(timerTicker);
                    document.getElementById('status').innerText = "TÖKÉLETES! ✅";
                    document.getElementById('status').style.color = "#32d74b";
                    canvas.style.borderColor = "#32d74b";
                    draw();
                    setTimeout(() => { if(isRunning) nextTask(); }, 1200);
                } else {
                    if (!isWaitingForCorrection) { 
                        canvas.style.borderColor = "#ff3b30"; 
                        setTimeout(() => { if(!isWaitingForCorrection && isRunning) canvas.style.borderColor = "#222"; }, 300); 
                    }
                }
            }
        }

        function showResult() {
            const percent = Math.round((scoreOk / 10) * 100);
            document.getElementById('resPercent').innerText = percent + "%";
            document.getElementById('resPercent').style.color = percent === 100 ? "var(--success-green)" : "var(--neon-orange)";
            
            if (percent === 100) {
                dynamicTimeLimit = Math.max(1.0, dynamicTimeLimit - 1.0);
                document.getElementById('modalTitle').innerText = "SZINTLÉPÉS! ⚡";
                document.getElementById('resMsg').innerText = `Hibátlan játék! Az agyad felgyorsult. A következő körben már csak ${dynamicTimeLimit} másodperced lesz!`;
            } else {
                document.getElementById('modalTitle').innerText = "Szakasz Lezárva";
                document.getElementById('modalTitle').style.color = "var(--neon-blue)";
                document.getElementById('resMsg').innerText = (percent >= 80) ? "Szép munka! Gyakorolj tovább, hogy gyorsulhass!" : "Gyakorolj még ezen a szinten, neked menni fog!";
            }
            document.getElementById('resultModal').style.display = "flex";
        }

        function onMIDIMessage(e) {
            let [s, n, v] = e.data;
            if ((s & 0xf0) === 0x90 && v > 0) { 
                activeMidiNotes.add(n); playTone(n, v); updatePanel(); 
                if (isRunning) checkMatch(); 
            }
            else if ((s & 0xf0) === 0x80 || ((s & 0xf0) === 0x90 && v === 0)) { 
                activeMidiNotes.delete(n); updatePanel(); 
            }
        }

        function onMIDISuccess(midiAccess) {
            for (var input of midiAccess.inputs.values()) { input.onmidimessage = onMIDIMessage; }
            isMidiReady = true;
            const btn = document.getElementById('btnAction');
            btn.innerText = "▶ GYAKORLAT INDÍTÁSA";
            document.getElementById('status').innerText = "MIDI kész! Indítsd a gyakorlatot!";
            document.getElementById('status').style.color = "var(--success-green)";
        }
        
        function onMIDIFailure() { 
            document.getElementById('status').innerText = "Hiba: Nincs MIDI kapcsolat."; 
            document.getElementById('status').style.color = "var(--error-red)";
        }

        function updatePanel() { 
            let names = Array.from(activeMidiNotes).sort((a,b)=>a-b).map(m => midiNames[m] || m); 
            document.getElementById('activeNotesDisplay').innerText = names.length ? names.join(" + ") : "- Üres -"; 
        }

        function handleAction() {
            const btn = document.getElementById('btnAction');
            if (!isMidiReady) {
                initAudio();
                if (navigator.requestMIDIAccess) { navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure); }
                btn.innerText = "KAPCSOLÓDÁS...";
                return;
            }

            if (isRunning) {
                stopMission();
            } else {
                startMission();
            }
        }

        function startMission() {
            scoreOk = 0; totalTasks = 0;
            document.getElementById('scoreOk').innerText = "0";
            document.getElementById('resultModal').style.display = "none";
            isRunning = true;
            
            const btn = document.getElementById('btnAction');
            btn.innerText = "◼ MEGSZAKÍTÁS";
            btn.classList.add('running');
            
            nextTask();
        }

        function stopMission() {
            isRunning = false;
            clearInterval(timerTicker);
            
            const btn = document.getElementById('btnAction');
            btn.innerText = "▶ GYAKORLAT INDÍTÁSA";
            btn.classList.remove('running');
            
            currentChord = null;
            document.getElementById('status').innerText = "Gyakorlat leállítva.";
            document.getElementById('status').style.color = "var(--neon-blue)";
            canvas.style.borderColor = "#222";
            draw();
        }

        draw();
    </script>
</body>
</html>
