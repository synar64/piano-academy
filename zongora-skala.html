<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skála - Pro Zongora Akadémia</title>
    <style>
        :root {
            --neon-blue: #00d4ff; --neon-orange: #ffaa00; --neon-purple: #bf5af2;
            --success-green: #32d74b; --error-red: #ff453a; --bg-color: #050510; --panel-bg: rgba(0, 0, 0, 0.9);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .back-btn { position: fixed; top: 15px; left: 15px; color: #888; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; border: 1px solid #333; }
        h1 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; text-shadow: 0 0 15px rgba(0,212,255,0.4); }
        .master-panel { background: var(--panel-bg); padding: 15px 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        
        button.cfg-btn, select.cfg-btn { padding: 8px 16px; background: #0a0a0a; color: #888; border: 2px solid #333; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; text-transform: uppercase; appearance: none; text-align: center; }
        select.cfg-btn { padding-right: 25px; color: #fff; }
        
        button.cfg-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); background: #001a25; }
        button.hand-lh.active { border-color: var(--neon-orange); color: var(--neon-orange); background: #1a1000; }
        button.hand-both.active { border-color: var(--neon-purple); color: var(--neon-purple); background: #15001a; }
        
        .toggle-btn { border-color: #444; min-width: 130px; }
        .toggle-btn.on { border-color: var(--success-green); color: var(--success-green); background: #001a05; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; min-width: 500px; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-size: 20px; font-weight: bold; font-family: monospace; }
        canvas { background: #000; border: 2px solid #222; border-radius: 12px; }
        
        #btnStart { padding: 12px 60px; background: var(--success-green); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 15px; box-shadow: 0 4px 15px rgba(50,215,75,0.3); margin-top: 5px; }
        #btnStart.running { background: var(--error-red); color: #fff; box-shadow: 0 4px 15px rgba(255,69,58,0.3); }
        
        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← AKADÉMIA</a>
    <h1>SKÁLA</h1>
    
    <div class="master-panel">
        <div class="button-group" id="modeButtons">
            <button id="modeSPRINT" class="cfg-btn active" onclick="setMode('SPRINT')">SPRINT (1X)</button>
            <button id="modeMARATHON" class="cfg-btn" onclick="setMode('MARATHON')">MARATON (3X)</button>
            <button id="modeTRAINING" class="cfg-btn" onclick="setMode('TRAINING')">TRÉNING (∞)</button>
        </div>
        <div class="button-group" id="handButtons">
            <button id="handRH" class="cfg-btn" onclick="setHand('RH')">JOBB KÉZ</button>
            <button id="handLH" class="cfg-btn" onclick="setHand('LH')">BAL KÉZ</button>
            <button id="handBOTH" class="cfg-btn active" onclick="setHand('BOTH')">KÉT KÉZ</button>
            <button id="oct1" class="cfg-btn active" onclick="setOctave(1)">1 OKTÁV</button>
            <button id="oct2" class="cfg-btn" onclick="setOctave(2)">2 OKTÁV</button>
        </div>
        <div class="button-group">
            <select id="scaleSelect" class="cfg-btn" onchange="changeScale()">
                <optgroup label="Dúr Skálák">
                    <option value="C_DUR">C Dúr</option>
                    <option value="D_DUR">D Dúr</option>
                    <option value="E_DUR">E Dúr</option>
                    <option value="F_DUR">F Dúr</option>
                    <option value="G_DUR">G Dúr</option>
                    <option value="A_DUR">A Dúr</option>
                    <option value="H_DUR">H (B) Dúr</option>
                </optgroup>
                <optgroup label="Moll Skálák (Természetes)">
                    <option value="C_MOLL">C Moll</option>
                    <option value="D_MOLL">D Moll</option>
                    <option value="E_MOLL">E Moll</option>
                    <option value="F_MOLL">F Moll</option>
                    <option value="G_MOLL">G Moll</option>
                    <option value="A_MOLL">A Moll</option>
                    <option value="H_MOLL">H (B) Moll</option>
                </optgroup>
            </select>
            <button id="btnHint" class="cfg-btn toggle-btn" onclick="toggleHint()">SÚGÓ: OFF</button>
            <button id="audioToggle" class="cfg-btn toggle-btn on" onclick="toggleAudio()">ZONGORA: ON</button>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Stabilitás</div><div id="uniformity" class="stat-value" style="color:var(--success-green);">100%</div></div>
        <div class="stat-box"><div class="stat-label">BPM</div><div id="bpm" class="stat-value">0</div></div>
        <div class="stat-box"><div class="stat-label">Blokk</div><div id="progress" class="stat-value" style="color:var(--neon-blue);">0 / 0</div></div>
    </div>
    
    <button id="btnStart" onclick="handleMainButton()">▶ MIDI ÉLESÍTÉSE & INDÍTÁS</button>
    <canvas id="staffCanvas" width="850" height="520" style="margin-top: 15px;"></canvas>
    <div id="status" style="margin-top:8px; font-size:16px; color:var(--neon-blue); font-weight:bold;">Kattints a gombra a kezdéshez!</div>

    <div id="resultModal">
        <h1 style="color: var(--neon-blue);">ANALÍZIS</h1>
        <div id="resSummary" style="font-size: 18px; margin: 25px; line-height: 2;"></div>
        <button onclick="closeModal()" style="background: var(--success-green); color:#000; padding: 15px 50px; border:none; border-radius: 8px; font-weight:bold; cursor:pointer; text-transform:uppercase;">BEFEJEZÉS</button>
    </div>

    <script>
        const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');
        let audioCtx, audioOn = true, isMidiReady = false;
        
        const scaleData = {
            "C_DUR": { notes: [ {n:'C',s:'',m:0,o:0}, {n:'D',s:'',m:2,o:1}, {n:'E',s:'',m:4,o:2}, {n:'F',s:'',m:5,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'',m:12,o:7} ] },
            "C_MOLL": { notes: [ {n:'C',s:'',m:0,o:0}, {n:'D',s:'',m:2,o:1}, {n:'E',s:'♭',m:3,o:2}, {n:'F',s:'',m:5,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'♭',m:8,o:5}, {n:'H',s:'♭',m:10,o:6}, {n:'C',s:'',m:12,o:7} ] },
            
            "D_DUR": { notes: [ {n:'D',s:'',m:2,o:1}, {n:'E',s:'',m:4,o:2}, {n:'F',s:'♯',m:6,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'♯',m:13,o:7}, {n:'D',s:'',m:14,o:8} ] },
            "D_MOLL": { notes: [ {n:'D',s:'',m:2,o:1}, {n:'E',s:'',m:4,o:2}, {n:'F',s:'',m:5,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'♭',m:10,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'',m:14,o:8} ] },

            "E_DUR": { notes: [ {n:'E',s:'',m:4,o:2}, {n:'F',s:'♯',m:6,o:3}, {n:'G',s:'♯',m:8,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'♯',m:13,o:7}, {n:'D',s:'♯',m:15,o:8}, {n:'E',s:'',m:16,o:9} ] },
            "E_MOLL": { notes: [ {n:'E',s:'',m:4,o:2}, {n:'F',s:'♯',m:6,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'',m:16,o:9} ] },

            "F_DUR": { notes: [ {n:'F',s:'',m:5,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'♭',m:10,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'',m:16,o:9}, {n:'F',s:'',m:17,o:10} ] },
            "F_MOLL": { notes: [ {n:'F',s:'',m:5,o:3}, {n:'G',s:'',m:7,o:4}, {n:'A',s:'♭',m:8,o:5}, {n:'H',s:'♭',m:10,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'♭',m:13,o:8}, {n:'E',s:'♭',m:15,o:9}, {n:'F',s:'',m:17,o:10} ] },

            "G_DUR": { notes: [ {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'',m:16,o:9}, {n:'F',s:'♯',m:18,o:10}, {n:'G',s:'',m:19,o:11} ] },
            "G_MOLL": { notes: [ {n:'G',s:'',m:7,o:4}, {n:'A',s:'',m:9,o:5}, {n:'H',s:'♭',m:10,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'♭',m:15,o:9}, {n:'F',s:'',m:17,o:10}, {n:'G',s:'',m:19,o:11} ] },

            "A_DUR": { notes: [ {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'♯',m:13,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'',m:16,o:9}, {n:'F',s:'♯',m:18,o:10}, {n:'G',s:'♯',m:20,o:11}, {n:'A',s:'',m:21,o:12} ] },
            "A_MOLL": { notes: [ {n:'A',s:'',m:9,o:5}, {n:'H',s:'',m:11,o:6}, {n:'C',s:'',m:12,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'',m:16,o:9}, {n:'F',s:'',m:17,o:10}, {n:'G',s:'',m:19,o:11}, {n:'A',s:'',m:21,o:12} ] },

            "H_DUR": { notes: [ {n:'H',s:'',m:11,o:6}, {n:'C',s:'♯',m:13,o:7}, {n:'D',s:'♯',m:15,o:8}, {n:'E',s:'',m:16,o:9}, {n:'F',s:'♯',m:18,o:10}, {n:'G',s:'♯',m:20,o:11}, {n:'A',s:'♯',m:22,o:12}, {n:'H',s:'',m:23,o:13} ] },
            "H_MOLL": { notes: [ {n:'H',s:'',m:11,o:6}, {n:'C',s:'♯',m:13,o:7}, {n:'D',s:'',m:14,o:8}, {n:'E',s:'',m:16,o:9}, {n:'F',s:'♯',m:18,o:10}, {n:'G',s:'',m:19,o:11}, {n:'A',s:'',m:21,o:12}, {n:'H',s:'',m:23,o:13} ] }
        };

        let selectedMode = 'SPRINT', selectedHand = 'BOTH', selectedOctaves = 1, showHints = false;
        let isRunning = false;
        let seqBlocks = [], currentBlockIndex = 0, currentNoteInBlock = 0;
        let lastNoteTime = 0, timeDiffs = [], allBpms = [], rhHit = false, lhHit = false;

        const trebleY = 140, bassY = 400;

        function buildSequence() {
            let scaleKey = document.getElementById('scaleSelect').value;
            let baseNotes = scaleData[scaleKey].notes;
            
            let loopSeq = [];
            // Felfelé haladás
            for (let oct = 0; oct < selectedOctaves; oct++) {
                let limit = (oct === selectedOctaves - 1) ? 8 : 7;
                for (let i = 0; i < limit; i++) {
                    let n = baseNotes[i];
                    loopSeq.push({ n: n.n, s: n.s, m_rel: n.m + (oct * 12), o_rel: n.o + (oct * 7) });
                }
            }
            // Lefelé haladás (Ne ismételjük a legfelső, és a legalsó gyökérhangot sem!)
            for (let i = loopSeq.length - 2; i > 0; i--) { 
                loopSeq.push(loopSeq[i]); 
            }

            // Hurok generálása a folyamatos játékhoz
            let flatSeq = [];
            let loops = (selectedMode === 'SPRINT') ? 1 : (selectedMode === 'MARATHON' ? 3 : 100);
            
            for(let l=0; l<loops; l++) {
                flatSeq = flatSeq.concat(loopSeq);
            }
            // A legeslegvégére beletesszük a lezáró gyökérhangot
            flatSeq.push(loopSeq[0]);
            
            // 8 hangos vizuális blokkokra bontás
            seqBlocks = [];
            for(let i=0; i<flatSeq.length; i+=8) { 
                seqBlocks.push(flatSeq.slice(i, i+8)); 
            }
            
            currentBlockIndex = 0; currentNoteInBlock = 0;
            updateProgressLabel();
        }

        function changeScale() { if(isRunning) stopPractice(); buildSequence(); draw(); }
        function toggleHint() { showHints = !showHints; const btn = document.getElementById('btnHint'); btn.innerText = `SÚGÓ: ${showHints ? 'ON' : 'OFF'}`; btn.classList.toggle('on', showHints); draw(); }
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function handleMainButton() { 
            const btn = document.getElementById('btnStart');
            if (!isMidiReady) {
                initAudio();
                if (navigator.requestMIDIAccess) {
                    navigator.requestMIDIAccess().then(access => {
                        for (let input of access.inputs.values()) input.onmidimessage = onMIDIMessage;
                        isMidiReady = true;
                        btn.innerText = "▶ GYAKORLAT INDÍTÁSA";
                        document.getElementById('status').innerText = "MIDI kész! Indítsd a gyakorlatot!";
                        document.getElementById('status').style.color = "var(--success-green)";
                    });
                }
                return;
            }
            isRunning ? stopPractice() : startPractice(); 
        }
        
        function startPractice() { 
            initAudio();
            isRunning = true; currentNoteInBlock = 0; currentBlockIndex = 0;
            timeDiffs = []; allBpms = []; lastNoteTime = 0;
            buildSequence();
            const btn = document.getElementById('btnStart'); btn.innerText = "◼ STOP / RESET"; btn.classList.add('running');
            document.getElementById('status').innerText = "Gyakorlat folyamatban...";
            document.getElementById('status').style.color = "var(--neon-orange)";
            draw(); 
        }
        
        function stopPractice() { 
            isRunning = false; 
            const btn = document.getElementById('btnStart'); btn.innerText = "▶ GYAKORLAT INDÍTÁSA"; btn.classList.remove('running'); 
            document.getElementById('status').innerText = "Gyakorlat leállítva.";
            document.getElementById('status').style.color = "var(--neon-blue)";
            currentNoteInBlock = 0; currentBlockIndex = 0;
            draw(); 
        }
        
        function closeModal() { document.getElementById('resultModal').style.display = 'none'; stopPractice(); }
        function toggleAudio() { audioOn = !audioOn; const btn = document.getElementById('audioToggle'); btn.innerText = `ZONGORA: ${audioOn ? 'ON' : 'OFF'}`; btn.classList.toggle('on', audioOn); if (audioOn) initAudio(); }
        function setMode(m) { selectedMode = m; document.querySelectorAll('#modeButtons .cfg-btn').forEach(b => b.classList.remove('active')); document.getElementById('mode' + m).classList.add('active'); changeScale(); }
        function setHand(mode) { selectedHand = mode; document.querySelectorAll('#handButtons .cfg-btn').forEach(b => { if(b.innerText.includes('KÉZ')) b.classList.remove('active'); }); document.getElementById('hand' + mode).classList.add('active'); draw(); }
        function setOctave(num) { selectedOctaves = num; document.getElementById('oct1').classList.toggle('active', num === 1); document.getElementById('oct2').classList.toggle('active', num === 2); changeScale(); }
        
        function updateProgressLabel() { 
            let total = selectedMode === 'TRAINING' ? '∞' : seqBlocks.length;
            let current = seqBlocks.length === 0 ? 0 : Math.min(currentBlockIndex + 1, seqBlocks.length);
            document.getElementById('progress').innerText = `${current} / ${total}`; 
        }
        
        function playSound(midi) { 
            if (!audioCtx || !audioOn) return; 
            const now = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); 
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(440 * Math.pow(2, (midi - 69) / 12), now); 
            gain.gain.setValueAtTime(0.3, now); 
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2); 
            osc.connect(gain); gain.connect(audioCtx.destination); 
            osc.start(now); osc.stop(now + 1.3); 
        }
        
        function drawLedgers(x, offset, baseLineY) { 
            ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 2; 
            if (offset <= -6) {
                for (let p = -6; p >= offset; p -= 2) { 
                    let py = baseLineY - (p * 12); 
                    ctx.beginPath(); ctx.moveTo(x - 22, py); ctx.lineTo(x + 22, py); ctx.stroke(); 
                }
            }
            if (offset >= 6) {
                for (let p = 6; p <= offset; p += 2) { 
                    let py = baseLineY - (p * 12); 
                    ctx.beginPath(); ctx.moveTo(x - 22, py); ctx.lineTo(x + 22, py); ctx.stroke(); 
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0; 
            
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            if (selectedHand !== 'LH') { for(let i=-2; i<=2; i++){ ctx.beginPath(); ctx.moveTo(50, trebleY+i*24); ctx.lineTo(800, trebleY+i*24); ctx.stroke(); } }
            if (selectedHand !== 'RH') { for(let i=-2; i<=2; i++){ ctx.beginPath(); ctx.moveTo(50, bassY+i*24); ctx.lineTo(800, bassY+i*24); ctx.stroke(); } }
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';
            
            if (selectedHand !== 'LH') { ctx.font='240px serif'; ctx.fillStyle='#bf5af2'; ctx.fillText('𝄞', 95, trebleY+72); }
            if (selectedHand !== 'RH') { ctx.font='130px serif'; ctx.fillStyle='#0a84ff'; ctx.fillText('𝄢', 95, bassY+36); }
            
            if (seqBlocks.length === 0) return;
            let currentBlock = seqBlocks[currentBlockIndex];
            
            currentBlock.forEach((noteObj, i) => {
                let offRH = -6 + noteObj.o_rel; 
                let offLH = -1 + noteObj.o_rel;  
                
                let noteAlpha = (isRunning && i < currentNoteInBlock) ? 0.2 : (isRunning && i === currentNoteInBlock ? 1.0 : 0.4);
                if(!isRunning) noteAlpha = 0.6;
                
                let x = 220 + (i * 72);
                
                if (selectedHand !== 'LH') { 
                    ctx.globalAlpha = noteAlpha;
                    ctx.fillStyle = (isRunning && i === currentNoteInBlock) ? "#00d4ff" : "#fff"; 
                    let yRH = trebleY - offRH * 12; 
                    drawLedgers(x, offRH, trebleY); 
                    
                    if (noteObj.s !== '') {
                        ctx.font = '32px serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                        ctx.fillText(noteObj.s, x - 18, yRH);
                    }
                    
                    ctx.beginPath(); ctx.ellipse(x, yRH, 16, 12, Math.PI/8, 0, 2*Math.PI); ctx.fill(); 
                    
                    if (showHints) {
                        ctx.globalAlpha = 1.0; 
                        ctx.fillStyle = '#aaa'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(noteObj.n + noteObj.s, x, trebleY + 110);
                    }
                }
                if (selectedHand !== 'RH') { 
                    ctx.globalAlpha = noteAlpha;
                    ctx.fillStyle = (isRunning && i === currentNoteInBlock) ? "#ffaa00" : "#fff"; 
                    let yLH = bassY - offLH * 12; 
                    drawLedgers(x, offLH, bassY); 
                    
                    if (noteObj.s !== '') {
                        ctx.font = '32px serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                        ctx.fillText(noteObj.s, x - 18, yLH);
                    }
                    
                    ctx.beginPath(); ctx.ellipse(x, yLH, 16, 12, Math.PI/8, 0, 2*Math.PI); ctx.fill(); 
                    
                    if (showHints) {
                        ctx.globalAlpha = 1.0; 
                        ctx.fillStyle = '#aaa'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(noteObj.n + noteObj.s, x, bassY + 105);
                    }
                }
            });
        }

        function onMIDIMessage(e) {
            if (!isRunning) return;
            let [s, n, v] = e.data;
            if ((s & 0xf0) === 0x90 && v > 0) {
                let noteObj = seqBlocks[currentBlockIndex][currentNoteInBlock];
                let tRH = 60 + noteObj.m_rel; 
                let tLH = 48 + noteObj.m_rel; 
                
                if (selectedHand === 'RH' && n === tRH) { playSound(n); processHit(); }
                else if (selectedHand === 'LH' && n === tLH) { playSound(n); processHit(); }
                else if (selectedHand === 'BOTH') { 
                    if (n === tRH && !rhHit) { rhHit = true; playSound(n); } 
                    if (n === tLH && !lhHit) { lhHit = true; playSound(n); } 
                    if (rhHit && lhHit) { rhHit = false; lhHit = false; processHit(); } 
                }
            }
        }

        function processHit() {
            const now = performance.now();
            if (lastNoteTime !== 0) {
                let diff = now - lastNoteTime; timeDiffs.push(diff); allBpms.push(60000/diff);
                let avg = timeDiffs.reduce((a,b)=>a+b)/timeDiffs.length, dev = Math.sqrt(timeDiffs.reduce((a,b)=>a+Math.pow(b-avg,2),0)/timeDiffs.length);
                document.getElementById('uniformity').innerText = Math.round(Math.max(0, 100-(dev/3))) + "%";
                document.getElementById('bpm').innerText = Math.round(60000/diff);
            }
            lastNoteTime = now; currentNoteInBlock++;
            
            if (currentNoteInBlock >= seqBlocks[currentBlockIndex].length) {
                currentNoteInBlock = 0;
                currentBlockIndex++;
                updateProgressLabel();
                
                if (currentBlockIndex >= seqBlocks.length) {
                    finish(); 
                    return; 
                }
            }
            draw();
        }

        function finish() { 
            isRunning = false; 
            const avgBpm = allBpms.length > 0 ? Math.round(allBpms.reduce((a,b)=>a+b)/allBpms.length) : 0; 
            document.getElementById('resSummary').innerHTML = `BPM: ${avgBpm}<br>Stabilitás: ${document.getElementById('uniformity').innerText}`; 
            document.getElementById('resultModal').style.display = "flex"; 
        }
        
        window.onload = () => { buildSequence(); draw(); };
    </script>
</body>
</html>
