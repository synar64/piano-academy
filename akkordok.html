<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Akíra Piano Academy | Workstation - Chords</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --rack-bg: #1a1a1d;
            --rack-border: #2a2a2d;
            --btn-dark: #101012;
            --btn-border: #050505;
            --text-dim: #555;
            --lcd-bg-dark: #111211;
            --lcd-label-color: #557799;
            --oled-text: #b3e6ff;
        }

        body {
            font-family: 'Inter', sans-serif; background: #000;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; color: #fff;
            -webkit-user-select: none; user-select: none;
        }

        /* ── KOTTA ── */
        .sheet-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px 20px; width: 100%; box-sizing: border-box; overflow: visible;
        }
        .sheet-viewport {
            width: 100%; max-width: 2450px; aspect-ratio: 2450 / 480; position: relative; overflow: hidden;
            background: transparent; border: none; border-radius: 0; box-shadow: none;
        }
        .sheet-image { width: 100%; height: 100%; object-fit: contain; z-index: 1; position: absolute; opacity: 0.35; pointer-events: none; }
        #staffCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* ── WORKSTATION CHASSIS ── */
        .lower-section { width: 100%; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .workstation-chassis {
            display: flex; width: 100%; max-width: 2560px; position: relative;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9); border-radius: 6px 6px 0 0; background: var(--rack-bg);
        }
        .wood-cheek {
            width: 24px; background: linear-gradient(to right, #3a1c0d, #1a0c05);
            box-shadow: inset 1px 0 2px rgba(255,255,255,0.1), inset -2px 0 5px rgba(0,0,0,0.8);
            border-radius: 6px 0 0 0; z-index: 10;
        }
        .wood-cheek.right { border-radius: 0 6px 0 0; background: linear-gradient(to left, #3a1c0d, #1a0c05); }
        .synth-core { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        /* ── INFO SÁV ── */
        .info-bar-integrated {
            width: 100%; height: 45px; background-color: var(--lcd-bg-dark); border-bottom: 2px solid #080808;
            display: flex; align-items: center; justify-content: center; z-index: 10;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.9), 0 5px 15px rgba(0,0,0,0.5);
        }
        .info-bar-text {
            font-family: 'Share Tech Mono', monospace; font-size: 18px; font-weight: bold;
            color: var(--oled-text); text-transform: uppercase; letter-spacing: 2px; transition: 0.2s;
        }

        /* ── MIXER OVERLAY ── */
        .settings-bar {
            position: absolute; bottom: 100%; left: 0; width: 100%; height: 85px; background: var(--lcd-bg-dark);
            display: none; align-items: center; justify-content: space-around; z-index: 50;
            border-top: 2px solid #333; box-shadow: 0 -10px 30px #000; padding: 0 20px; box-sizing: border-box;
        }
        .settings-control { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 150px; z-index: 2; position: relative; }
        .settings-control label { font-size: 11px; color: var(--lcd-label-color); font-family: 'Share Tech Mono', monospace; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .settings-control input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #111; border-radius: 3px; outline: none; cursor: pointer; box-shadow: inset 0 1px 3px #000; }
        .settings-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 20px; background: #888; border: 1px solid #111; border-radius: 2px; box-shadow: 0 2px 4px #000; cursor: grab; }

        /* ── MASTER DASHBOARD ── */
        .master-dashboard {
            display: flex; justify-content: space-between; align-items: center;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 3px;
            padding: 25px 30px; border-top: 1px solid #333; position: relative; width: 100%; box-sizing: border-box;
        }
        .dashboard-logo { position: absolute; top: -35px; left: 30px; z-index: 5; pointer-events: none; }
        .control-group { display: flex; align-items: center; gap: 8px; z-index: 10; }

        /* HARDVER GOMBOK */
        .hardware-btn {
            width: 95px; height: 38px; background-color: var(--btn-dark); color: var(--text-dim);
            border: 1px solid var(--btn-border); border-radius: 3px; cursor: pointer;
            font-weight: 700; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-decoration: none;
            box-shadow: 0 3px 0 #000; transition: transform 0.1s; text-shadow: none !important;
        }
        .hardware-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #000; }
        .hardware-btn.active { color: #ffffff; background-color: #121214; }

        #btnStart { width: 110px; font-weight: 800; font-size: 14px; letter-spacing: 1px; box-shadow: 0 4px 0 #000; margin-left: 20px; }
        #btnStart:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        #btnStart.running { color: #ffffff; background-color: #1a1a1c; border-color: #333; }

        /* ── CENTER CONSOLE ── */
        .center-console { flex: 1; display: flex; justify-content: center; position: relative; }
        .lcd-arrow-wrapper { display: flex; flex-direction: column; align-items: center; width: 620px; }
        .arrow-row { display: flex; width: 100%; justify-content: space-around; margin: 4px 0; }
        .nav-disk-btn { width: 22px; height: 22px; background: #222; border: 1px solid #111; border-radius: 50%; color: #888; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 2px rgba(0,0,0,0.6); transition: 0.1s; flex-shrink: 0; }
        .nav-disk-btn:active { transform: translateY(2px); box-shadow: 0 0 1px rgba(0,0,0,0.6); }

        .oled-wrapper { background: #111; padding: 2px; border-radius: 4px; width: 100%; box-shadow: 0 2px 4px rgba(255,255,255,0.1); box-sizing: border-box; }
        .oled-screen { background: var(--lcd-bg-dark); border: 2px solid #222; border-radius: 2px; display: flex; box-shadow: inset 0 3px 8px rgba(0,0,0,0.9); overflow: hidden; }
        .oled-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 0; cursor: pointer; }
        .oled-divider { width: 1px; background: rgba(255,255,255,0.05); margin: 5px 0; }
        .oled-header { font-size: 11px; color: var(--lcd-label-color); font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .oled-main { font-size: 18px; color: var(--oled-text); font-family: 'Share Tech Mono'; font-weight: bold; text-transform: uppercase; }

        /* ── ZONGORA ── */
        .piano-crop-wrapper { width: 100%; position: relative; aspect-ratio: 2500/248; background: #000; overflow: visible; border-top: 2px solid #000; }
        .piano-inner { width: 100%; aspect-ratio: 2500/284; position: absolute; top: 0; left: 0; }
        .piano-img { width: 100%; height: 100%; display: block; filter: grayscale(100%); pointer-events: none; }
        .hitbox-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        .key-glow { position: absolute; top: 0; cursor: pointer; }
        .key-glow.pressed::after { content: ''; position: absolute; pointer-events: none; z-index: 150; top: 0; left: 0; width: 100%; height: 100%; border-radius: 0 0 4px 4px; background: rgba(0,0,0,0.11); box-shadow: inset 6px 0 10px -2px rgba(0,0,0,0.6); }
        .black-glow.pressed::after { top: 3px; left: 3px; width: calc(100% - 6px); height: calc(100% - 13px); border-radius: 3px; background: rgba(255,255,255,0.15); box-shadow: inset 0 -10px 15px rgba(255,255,255,0.3); z-index: 40; }

        /* ── MODÁLIS ABLAKOK ── */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--rack-bg); padding: 30px; border: 2px solid var(--rack-border); border-radius: 6px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,1); }
        .modal-title { color: #aaa; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; font-size: 16px; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #111; padding-bottom: 15px; }
        .modal-btn { background-color: var(--btn-dark); color: #aaa; border: 1px solid var(--btn-border); border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px; padding: 12px 40px; box-shadow: 0 3px 0 #000; transition: 0.1s; letter-spacing: 1px; }
        .modal-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000; }

        .key-led { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; border-radius: 50%; background-color: var(--oled-text); opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; }
        .key-glow.chord-hint .key-led { opacity: 1; }

        body.help-mode-active { cursor: help; } body.help-mode-active * { cursor: help !important; }
    </style>
</head>
<body>

    <!-- KOTTA -->
    <div class="sheet-container">
        <div id="sheetViewport" class="sheet-viewport">
            <img src="kottavonal_feher.png" class="sheet-image" id="sheetBg">
            <canvas id="staffCanvas" width="2450" height="480"></canvas>
        </div>
    </div>

    <!-- WORKSTATION CHASSIS -->
    <div class="lower-section">
        <div class="workstation-chassis">
            <div class="wood-cheek"></div>
            <div class="synth-core">

                <!-- MIXER OVERLAY -->
                <div id="mixerBar" class="settings-bar">
                    <div class="settings-control"><label>Attack</label><input type="range" id="vst_a" min="0" max="1" step="0.01" value="0.01"></div>
                    <div class="settings-control"><label>Decay</label><input type="range" id="vst_e" min="1" max="10" step="0.1" value="10.0"></div>
                    <div class="settings-control"><label>Release</label><input type="range" id="vst_r" min="0.1" max="3" step="0.1" value="0.8"></div>
                    <div class="settings-control"><label>Velocity</label><input type="range" id="vst_d" min="0.1" max="2" step="0.1" value="1.0"></div>
                    <div class="settings-control"><label>Reverb</label><input type="range" id="vst_rev" min="0" max="1" step="0.05" value="0"></div>
                    <div class="settings-control"><label>Stereo Wide</label><input type="range" id="vst_wide" min="0" max="1" step="0.05" value="0"></div>
                </div>

                <!-- INFO SÁV -->
                <div class="info-bar-integrated">
                    <div id="infoBarText" class="info-bar-text">SYSTEM READY — PRESS START TO BEGIN</div>
                </div>

                <!-- MASTER DASHBOARD -->
                <div class="master-dashboard">
                    <div class="dashboard-logo">
                        <svg viewBox="0 0 300 40" style="height:25px; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.8));">
                            <text x="60" y="30" fill="#666" font-family="'Inter',sans-serif" font-weight="800" font-size="32" text-anchor="end">AK</text>
                            <path d="M 64 30 L 72 30 L 72 12 L 68 12 L 68 0 L 64 0 Z" fill="#555"/>
                            <text x="76" y="30" fill="#666" font-family="'Inter',sans-serif" font-weight="800" font-size="32" text-anchor="start">RA</text>
                            <text x="135" y="28" fill="#444" font-family="'Inter',sans-serif" font-weight="600" font-size="14" letter-spacing="3">WORKSTATION</text>
                        </svg>
                    </div>

                    <!-- BAL CSOPORT -->
                    <div class="control-group">
                        <a href="index.html" class="hardware-btn" style="text-decoration:none;" data-help="HOME: RETURN TO MAIN MENU">Home</a>
                        <button id="handRH" class="hardware-btn active" onclick="if(!helpActive) toggleHand('RH')" data-help="TOP CLEF: TOGGLE TREBLE CLEF CHORD GENERATION">Top</button>
                        <button id="handLH" class="hardware-btn active" onclick="if(!helpActive) toggleHand('LH')" data-help="BOTTOM CLEF: TOGGLE BASS CLEF CHORD GENERATION">Bottom</button>
                        <button id="btnHintName" class="hardware-btn" onclick="if(!helpActive) toggleHint()" data-help="HINTS: DISPLAYS NOTE NAMES WITHIN EACH CHORD">Hints</button>
                    </div>

                    <!-- KÖZÉP: OLED + NYILAK -->
                    <div class="center-console">
                        <div class="lcd-arrow-wrapper">
                            <div class="arrow-row">
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleModule(-1)">▲</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) toggleMode()">▲</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleLevel(1)">▲</button>
                                <button class="nav-disk-btn" style="opacity:0;pointer-events:none;">▲</button>
                            </div>

                            <div class="oled-wrapper">
                                <div class="oled-screen">
                                    <div class="oled-section" onclick="if(!helpActive) loadModule()" data-help="MODULE: CLICK TO NAVIGATE TO ANOTHER MODULE">
                                        <div class="oled-header">Module</div>
                                        <div class="oled-main" id="lcdModuleText">CHORDS</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" onclick="if(!helpActive) toggleMode()" data-help="MODE: NOTES (SHEET ONLY) → CHORDS (NAME + NOTES) → ROMAN (NUMERAL + NOTES)">
                                        <div class="oled-header">Mode</div>
                                        <div class="oled-main" id="lcdModeText">NOTES</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" onclick="if(!helpActive) cycleLevel(1)" data-help="LEVEL: ROOT POSITION → INVERSIONS → 7TH CHORDS">
                                        <div class="oled-header">Level</div>
                                        <div class="oled-main" id="lcdLevelText">ROOT</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" data-help="PROGRESS: CURRENT CHORD OUT OF 16 IN THE SEQUENCE">
                                        <div class="oled-header">Progress</div>
                                        <div class="oled-main" id="lcdProgress" style="font-size:14px;">0 / 16</div>
                                    </div>
                                </div>
                            </div>

                            <div class="arrow-row">
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleModule(1)">▼</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) toggleMode()">▼</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleLevel(-1)">▼</button>
                                <button class="nav-disk-btn" style="opacity:0;pointer-events:none;">▼</button>
                            </div>
                        </div>
                    </div>

                    <!-- JOBB CSOPORT -->
                    <div class="control-group">
                        <button id="btnStart" class="hardware-btn" onclick="if(!helpActive) handleMainButton()" data-help="START/STOP: BEGIN OR END THE CHORD PRACTICE SESSION">START</button>
                        <button id="audioToggle" class="hardware-btn active" onclick="if(!helpActive) toggleAudio()" data-help="PIANO AUDIO: TOGGLE INTERNAL SYNTHESIZER">Piano</button>
                        <button id="btnVst" class="hardware-btn" onclick="if(!helpActive) toggleVst()" data-help="MIXER: OPEN ADSR ENVELOPE PANEL">Mixer</button>
                        <button id="btnFullscreen" class="hardware-btn" onclick="if(!helpActive) toggleFullScreen()" data-help="FULLSCREEN: IMMERSIVE STUDIO MODE">Fullscr</button>
                        <button id="btnHelp" class="hardware-btn" onclick="toggleHelp()" data-help="HELP: CLICK ANY ELEMENT TO SEE ITS DESCRIPTION">Help</button>
                    </div>
                </div>

                <!-- ZONGORA -->
                <div class="piano-crop-wrapper">
                    <div class="piano-inner">
                        <img src="grandpiano-keys.png" class="piano-img">
                        <div id="hb-wrap" class="hitbox-layer"></div>
                    </div>
                </div>

            </div>
            <div class="wood-cheek right"></div>
        </div>
    </div>

<script>
    // ── AKKORD ADATOK (eredeti, érintetlen) ──
    const CHORDS = {
        treble: {
            "1": [ {name:"C", roman:"I", notes:[{m:60,n:'C4',off:-6,s:''},{m:64,n:'E4',off:-4,s:''},{m:67,n:'G4',off:-2,s:''}]}, {name:"F", roman:"IV", notes:[{m:65,n:'F4',off:-3,s:''},{m:69,n:'A4',off:-1,s:''},{m:72,n:'C5',off:1,s:''}]}, {name:"Am", roman:"vi", notes:[{m:69,n:'A4',off:-1,s:''},{m:72,n:'C5',off:1,s:''},{m:76,n:'E5',off:3,s:''}]}, {name:"Dm", roman:"ii", notes:[{m:62,n:'D4',off:-5,s:''},{m:65,n:'F4',off:-3,s:''},{m:69,n:'A4',off:-1,s:''}]}, {name:"G", roman:"V", notes:[{m:67,n:'G4',off:-2,s:''},{m:71,n:'H4',off:0,s:''},{m:74,n:'D5',off:2,s:''}]}, {name:"Em", roman:"iii", notes:[{m:64,n:'E4',off:-4,s:''},{m:67,n:'G4',off:-2,s:''},{m:71,n:'H4',off:0,s:''}]} ],
            "2": [ {name:"C", roman:"I", notes:[{m:64,n:'E4',off:-4,s:''},{m:67,n:'G4',off:-2,s:''},{m:72,n:'C5',off:1,s:''}]}, {name:"C", roman:"I", notes:[{m:67,n:'G4',off:-2,s:''},{m:72,n:'C5',off:1,s:''},{m:76,n:'E5',off:3,s:''}]} ],
            "3": [ {name:"G7", roman:"V7", notes:[{m:67,n:'G4',off:-2,s:''},{m:71,n:'H4',off:0,s:''},{m:74,n:'D5',off:2,s:''},{m:77,n:'F5',off:4,s:''}]}, {name:"Cmaj7", roman:"Imaj7", notes:[{m:60,n:'C4',off:-6,s:''},{m:64,n:'E4',off:-4,s:''},{m:67,n:'G4',off:-2,s:''},{m:71,n:'H4',off:0,s:''}]}, {name:"Am7", roman:"vi7", notes:[{m:69,n:'A4',off:-1,s:''},{m:72,n:'C5',off:1,s:''},{m:76,n:'E5',off:3,s:''},{m:79,n:'G5',off:5,s:''}]} ]
        },
        bass: {
            "1": [ {name:"C", roman:"I", notes:[{m:48,n:'C3',off:-1,s:''},{m:52,n:'E3',off:1,s:''},{m:55,n:'G3',off:3,s:''}]}, {name:"F", roman:"IV", notes:[{m:53,n:'F3',off:2,s:''},{m:57,n:'A3',off:4,s:''},{m:60,n:'C4',off:6,s:''}]} ],
            "2": [ {name:"G", roman:"V", notes:[{m:47,n:'H2',off:-2,s:''},{m:50,n:'D3',off:0,s:''},{m:55,n:'G3',off:3,s:''}]} ],
            "3": [ {name:"D", roman:"II", notes:[{m:50,n:'D3',off:0,s:''},{m:54,n:'F#3',off:2,s:'♯'},{m:57,n:'A3',off:4,s:''}]} ]
        }
    };

    const TREBLE_BASE_Y = 141.5, TREBLE_SP_Y = 11.14;
    const BASS_BASE_Y = 376.16, BASS_SP_Y = 10.71;

    // ── ÁLLAPOTOK ──
    let isRunning = false, showNames = false, helpActive = false, audioOn = true;
    let activeRH = true, activeLH = true;
    let currentMode = 'sheet', currentLevel = 1;
    let seq = [], currentStep = 0, activeMidiNotes = new Set();
    let waitingForRelease = false;
    let audioInited = false;
    let audioCtx, sampleBuffers = {}, activeNodes = {};
    let masterReverb, reverbGain;

    // ── MODULE VÁLTÓ ──
    const modules = [
        { name: 'EAR TRAIN', url: 'hallasfejleszto.html' },
        { name: 'SIGHT READ', url: 'kottaolvasas.html' },
        { name: 'CHORDS', url: 'akkordok.html' },
        { name: 'SCALES', url: 'skalak.html' },
        { name: 'HANON', url: 'hanon.html' },
        { name: 'RHYTHM', url: 'ritmus.html' }
    ];
    let currentModuleIdx = 2; // CHORDS
    function cycleModule(dir) {
        if (helpActive) return;
        currentModuleIdx = (currentModuleIdx + dir + modules.length) % modules.length;
        document.getElementById('lcdModuleText').innerText = modules[currentModuleIdx].name;
    }
    function loadModule() {
        if (helpActive) return;
        if (currentModuleIdx !== 2) window.location.href = modules[currentModuleIdx].url;
    }

    // ── LCD ──
    function updateLCD() {
        const modeNames = { 'sheet':'NOTES', 'lead':'CHORDS', 'roman':'ROMAN' };
        const levelNames = { 1:'ROOT', 2:'INVERSION', 3:'7THS' };
        document.getElementById('lcdModeText').innerText = modeNames[currentMode];
        document.getElementById('lcdLevelText').innerText = levelNames[currentLevel];
    }
    function updateProgress() {
        document.getElementById('lcdProgress').innerText = `${currentStep} / 16`;
    }

    function updateInfoBar(msg) {
        if (helpActive) return;
        document.getElementById('infoBarText').innerHTML = msg || 'SYSTEM READY — PRESS START TO BEGIN';
    }

    // ── HELP ──
    function toggleHelp() {
        helpActive = !helpActive;
        document.getElementById('btnHelp').classList.toggle('active', helpActive);
        if (helpActive) {
            document.body.classList.add('help-mode-active');
            document.getElementById('infoBarText').innerHTML = 'HELP MODE — CLICK ANY ELEMENT TO READ ITS DESCRIPTION';
        } else {
            document.body.classList.remove('help-mode-active');
            document.getElementById('infoBarText').innerHTML = isRunning
                ? 'PLAYING — HOLD THE CORRECT CHORD NOTES SIMULTANEOUSLY'
                : 'SYSTEM READY — PRESS START TO BEGIN';
        }
    }
    document.addEventListener('click', (e) => {
        if (e.target.closest('#btnHelp')) return;
        if (helpActive) {
            e.preventDefault(); e.stopPropagation();
            const target = e.target.closest('[data-help]');
            if (target) document.getElementById('infoBarText').innerHTML = target.dataset.help;
        }
    }, true);

    // ── FULLSCREEN ──
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else if (document.exitFullscreen) document.exitFullscreen();
    }
    document.addEventListener('fullscreenchange', () => {
        document.getElementById('btnFullscreen').classList.toggle('active', !!document.fullscreenElement);
    });

    // ── GOMBOK ──
    function toggleHand(h) {
        if (helpActive) return;
        if (h === 'RH') activeRH = !activeRH; else activeLH = !activeLH;
        if (!activeRH && !activeLH) { activeRH = true; activeLH = true; }
        document.getElementById('handRH').classList.toggle('active', activeRH);
        document.getElementById('handLH').classList.toggle('active', activeLH);
        if (isRunning) stopPractice(); else { buildSequence(); draw(); }
    }
    function toggleMode() {
        if (helpActive) return;
        if (currentMode === 'sheet') currentMode = 'lead';
        else if (currentMode === 'lead') currentMode = 'roman';
        else currentMode = 'sheet';
        updateLCD();
        if (isRunning) stopPractice(); else draw();
    }
    function cycleLevel(dir) {
        if (helpActive) return;
        currentLevel = ((currentLevel - 1 + dir + 3) % 3) + 1;
        updateLCD();
        if (isRunning) stopPractice();
    }
    function updateKeyboardHints() {
        document.querySelectorAll('.key-glow').forEach(k => k.classList.remove('chord-hint'));
        if (showNames && seq.length > 0 && currentStep < seq.length) {
            seq[currentStep].chord.notes.forEach(n => {
                document.getElementById(`k-${n.m}`)?.classList.add('chord-hint');
            });
        }
    }

    function toggleHint() {
        if (helpActive) return;
        showNames = !showNames;
        document.getElementById('btnHintName').classList.toggle('active', showNames);
        updateKeyboardHints();
        draw();
    }
    function toggleAudio() {
        audioOn = !audioOn;
        document.getElementById('audioToggle').classList.toggle('active', audioOn);
        if (audioOn && !audioInited) initAudio();
    }
    function toggleVst() {
        if (helpActive) return;
        let mb = document.getElementById('mixerBar');
        mb.style.display = mb.style.display === 'flex' ? 'none' : 'flex';
        document.getElementById('btnVst').classList.toggle('active');
    }

    // ── SEQUENCE (eredeti logika) ──
    function buildSequence() {
        seq = [];
        for (let i = 0; i < 16; i++) {
            let clef = 'treble';
            if (activeRH && activeLH) clef = Math.random() > 0.5 ? 'treble' : 'bass';
            else if (activeLH && !activeRH) clef = 'bass';
            let pool = CHORDS[clef][currentLevel.toString()] || CHORDS[clef]["1"];
            let chord = pool[Math.floor(Math.random() * pool.length)];
            seq.push({ clef, chord, isError: false });
        }
        currentStep = 0; waitingForRelease = false;
        updateProgress();
        updateKeyboardHints();
    }

    // ── PRACTICE KONTROL ──
    function handleMainButton() {
        if (!isRunning) {
            initAudio(); buildSequence(); isRunning = true;
            document.getElementById('btnStart').innerText = 'STOP';
            document.getElementById('btnStart').classList.add('running');
            updateInfoBar('PLAYING — HOLD THE CORRECT CHORD NOTES SIMULTANEOUSLY');
            draw();
        } else stopPractice();
    }
    function stopPractice() {
        isRunning = false; waitingForRelease = false;
        document.getElementById('btnStart').innerText = 'START';
        document.getElementById('btnStart').classList.remove('running');
        document.querySelectorAll('.key-glow').forEach(k => k.classList.remove('chord-hint'));
        updateInfoBar(); draw();
    }

    // ── AUDIO ──
    async function initAudio() {
        if (audioInited) return; audioInited = true;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        let len = audioCtx.sampleRate * 2.5;
        let impulse = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
        for (let i = 0; i < len; i++) {
            let decay = Math.pow(1 - i / len, 3);
            impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * decay;
            impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * decay;
        }
        masterReverb = audioCtx.createConvolver();
        masterReverb.buffer = impulse;
        reverbGain = audioCtx.createGain();
        reverbGain.gain.value = 0;
        masterReverb.connect(reverbGain).connect(audioCtx.destination);
        const samples = { 21:'A0', 36:'C2', 48:'C3', 60:'C4', 72:'C5', 84:'C6' };
        for (let k in samples) {
            try {
                const r = await fetch(`https://tonejs.github.io/audio/salamander/${samples[k]}.mp3`);
                sampleBuffers[k] = await audioCtx.decodeAudioData(await r.arrayBuffer());
            } catch(e) {}
        }
        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(m => {
                m.inputs.forEach(input => input.onmidimessage = (msg) => {
                    const cmd = msg.data[0] >> 4, n = msg.data[1], v = msg.data[2];
                    if (cmd === 9 && v > 0) { document.getElementById(`k-${n}`)?.classList.add('pressed'); handleNoteOn(n, v); }
                    else if (cmd === 8 || (cmd === 9 && v === 0)) { document.getElementById(`k-${n}`)?.classList.remove('pressed'); handleNoteOff(n); }
                });
            }).catch(() => {});
        }
    }

    function playTone(note, vel) {
        if (!audioCtx || !audioOn || Object.keys(sampleBuffers).length === 0) return;
        if (activeNodes[note]) { try { activeNodes[note].source.stop(); } catch(e) {} delete activeNodes[note]; }
        const source = audioCtx.createBufferSource();
        let closest = 36, minDiff = 999;
        for (let b in sampleBuffers) { let diff = Math.abs(note - b); if (diff < minDiff) { minDiff = diff; closest = b; } }
        source.buffer = sampleBuffers[closest];
        source.playbackRate.value = Math.pow(2, (note - closest) / 12);
        const gain = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner();
        let wideAmount = parseFloat(document.getElementById('vst_wide').value) || 0;
        panner.pan.setValueAtTime(Math.max(-1, Math.min(1, ((note - 60) / 30) * wideAmount)), audioCtx.currentTime);
        let atk = parseFloat(document.getElementById('vst_a').value) || 0.01;
        let dec = parseFloat(document.getElementById('vst_e').value) || 10.0;
        let velo = parseFloat(document.getElementById('vst_d').value) || 1.0;
        if (reverbGain) reverbGain.gain.value = parseFloat(document.getElementById('vst_rev').value) || 0;
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        if (atk > 0.05) gain.gain.linearRampToValueAtTime((vel/127)*velo, audioCtx.currentTime + atk);
        else gain.gain.setValueAtTime((vel/127)*velo, audioCtx.currentTime);
        if (dec < 9.5) gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dec);
        source.connect(gain); gain.connect(panner); panner.connect(audioCtx.destination); gain.connect(masterReverb);
        source.start(); activeNodes[note] = { source, gain };
    }

    function handleNoteOff(midi) {
        activeMidiNotes.delete(midi);
        if (activeNodes[midi]) {
            let rel = parseFloat(document.getElementById('vst_r').value) || 0.8;
            const gainNode = activeNodes[midi].gain;
            gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
            gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + rel);
            activeNodes[midi].source.stop(audioCtx.currentTime + rel + 0.1);
            delete activeNodes[midi];
        }
        if (activeMidiNotes.size === 0 && waitingForRelease) { waitingForRelease = false; draw(); }
        checkMatch();
    }

    function handleNoteOn(midi, vel = 100) {
        activeMidiNotes.add(midi);
        playTone(midi, vel);
        checkMatch();
    }

    // ── MATCH CHECK (eredeti logika) ──
    function checkMatch() {
        if (!isRunning || seq.length === 0 || currentStep >= 16) return;
        if (waitingForRelease || activeMidiNotes.size === 0) return;
        let targetChord = seq[currentStep].chord;
        let expectedMidis = targetChord.notes.map(n => n.m);
        let allExpectedPresent = expectedMidis.every(m => activeMidiNotes.has(m));
        let noExtraNotes = activeMidiNotes.size === expectedMidis.length;
        if (allExpectedPresent && noExtraNotes) {
            seq[currentStep].isError = false;
            waitingForRelease = true; currentStep++;
            updateProgress();
            updateKeyboardHints();
            if (currentStep >= 16) {
                updateInfoBar('ROUND COMPLETE — WELL DONE!');
                setTimeout(() => { buildSequence(); draw(); updateInfoBar('PLAYING — HOLD THE CORRECT CHORD NOTES SIMULTANEOUSLY'); }, 1000);
            }
        } else {
            let hasWrongNote = Array.from(activeMidiNotes).some(m => !expectedMidis.includes(m));
            if (hasWrongNote) seq[currentStep].isError = true;
        }
        draw();
    }

    // ── KOTTA RAJZOLÁS (eredeti logika) ──
    const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');

    function drawLedgers(x, offset, baseLineY, spacing, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.shadowBlur = 0;
        if (offset <= -6) for (let p = -6; p >= offset; p -= 2) { let py = baseLineY - (p * spacing); ctx.beginPath(); ctx.moveTo(x-22, py); ctx.lineTo(x+22, py); ctx.stroke(); }
        if (offset >= 6)  for (let p = 6;  p <= offset; p += 2) { let py = baseLineY - (p * spacing); ctx.beginPath(); ctx.moveTo(x-22, py); ctx.lineTo(x+22, py); ctx.stroke(); }
    }

    function draw() {
        ctx.clearRect(0, 0, 2450, 480);
        if (!seq.length) return;

        const activeColor   = 'rgba(179, 230, 255, 1.0)';
        const inactiveColor = 'rgba(179, 230, 255, 0.3)';
        const errorColor    = '#ff6655';
        const ledgerColor   = 'rgba(120, 160, 180, 0.8)';

        const startX = 180, endX = 2380, xSpacing = (endX - startX) / 15;

        seq.forEach((item, i) => {
            let color = (isRunning && i === currentStep) ? activeColor : inactiveColor;
            if (item.isError && i === currentStep) color = errorColor;
            ctx.globalAlpha = 1.0;

            let x = startX + i * xSpacing;
            let baseLineY = item.clef === 'treble' ? TREBLE_BASE_Y : BASS_BASE_Y;
            let spacing   = item.clef === 'treble' ? TREBLE_SP_Y   : BASS_SP_Y;
            let textY     = item.clef === 'treble' ? TREBLE_BASE_Y - 55 : BASS_BASE_Y - 55;

            // Akkord neve / római szám (lead/roman módban)
            if (currentMode === 'lead' || currentMode === 'roman') {
                ctx.fillStyle = color; ctx.shadowBlur = 0;
                ctx.font = '400 28px "Share Tech Mono"'; ctx.textAlign = 'center';
                let displayText = currentMode === 'roman' ? item.chord.roman : item.chord.name;
                ctx.fillText(displayText, x, textY);

                let isSolved = (i < currentStep) || (i === currentStep && waitingForRelease);
                if (currentMode === 'roman' && isSolved) {
                    ctx.font = '400 14px "Share Tech Mono"';
                    ctx.fillStyle = inactiveColor;
                    ctx.fillText(`(${item.chord.name})`, x, textY + 22);
                }
            }

            // Kottafejek megjelenítése
            let isSolved = (i < currentStep) || (i === currentStep && waitingForRelease);
            let showNotes = (currentMode === 'sheet') || ((currentMode === 'lead' || currentMode === 'roman') && isSolved);

            if (showNotes) {
                item.chord.notes.forEach(n => {
                    let noteY = baseLineY - (n.off * spacing);
                    drawLedgers(x, n.off, baseLineY, spacing, ledgerColor);
                    ctx.fillStyle = color; ctx.shadowBlur = 0;
                    if (n.s !== '') {
                        ctx.font = n.s === '♭' ? '46px Arial' : '34px Arial';
                        ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
                        ctx.fillText(n.s, x - 28, noteY + (n.s === '♭' ? 6 : 12));
                    }
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.beginPath(); ctx.ellipse(x, noteY, 14, 10, -Math.PI/10, 0, 2*Math.PI); ctx.fill();
                });
            }

            // Hangnevek (hints) — mindig látszik ha be van kapcsolva, módtól függetlenül
            if (showNames) {
                ctx.fillStyle = color; ctx.font = '400 16px "Share Tech Mono"'; ctx.textAlign = 'center';
                ctx.textBaseline = 'alphabetic';
                let hintStr = item.chord.notes.map(n => n.n.replace('#','♯')).join(' + ');
                let topY = Math.min(...item.chord.notes.map(n => baseLineY - (n.off * spacing)));
                let hintY;
                if (currentMode === 'sheet') {
                    hintY = item.clef === 'treble' ? TREBLE_BASE_Y - 55 : BASS_BASE_Y - 55;
                    if (topY < hintY + 20) hintY = topY - 20;
                } else {
                    hintY = textY - 40;
                    if (showNotes && topY < textY + 20) hintY = topY - 20;
                }
                ctx.fillText(hintStr, x, hintY);
            }
        });
        ctx.globalAlpha = 1.0;
    }

    // ── BILLENTYŰZET ──
    function create88() {
        const wrap = document.getElementById('hb-wrap');
        const whites = [0,2,4,5,7,9,11]; let wIdx = 0;
        for (let m = 21; m <= 108; m++) {
            const k = document.createElement('div'); const isW = whites.includes(m%12);
            k.id = `k-${m}`; k.className = `key-glow ${isW ? 'white-glow' : 'black-glow'}`;
            if (isW) { k.style.left = (wIdx*1.92307)+'%'; k.style.width = '1.92307%'; k.style.height = '100%'; wIdx++; }
            else { k.style.left = ((wIdx*1.92307)-0.6)+'%'; k.style.width = '1.2%'; k.style.height = '65%'; k.style.zIndex = '200'; }
            k.onmousedown = (e) => { e.preventDefault(); k.classList.add('pressed'); handleNoteOn(m, 100); };
            k.onmouseup = () => { k.classList.remove('pressed'); handleNoteOff(m); };
            k.onmouseleave = () => { k.classList.remove('pressed'); handleNoteOff(m); };
            const led = document.createElement('div');
            led.className = 'key-led';
            k.appendChild(led);
            wrap.appendChild(k);
        }
    }

    window.onload = () => {
        updateLCD(); updateProgress();
        create88();
        document.fonts.ready.then(draw);
        window.addEventListener('pointerdown', () => initAudio(), { once: true });
    };
</script>
</body>
