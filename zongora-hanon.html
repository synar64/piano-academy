<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanon No. 1 - Zongora Akadémia PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #0a84ff; --neon-orange: #ff9f0a; --neon-purple: #bf5af2;
            --success-green: #32d74b; --error-red: #ff453a; --bg-dark: #050508; 
            --panel-bg: rgba(20, 20, 30, 0.75); --border-color: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 20, 40, 0.5) 0%, rgba(5, 5, 8, 1) 100%), url('zongora-hatter-dark.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: var(--bg-dark); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .font-loader { position: absolute; left: -9999px; visibility: hidden; font-family: 'Noto Music'; }
        .back-btn { position: fixed; top: 15px; left: 15px; color: #aaa; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); z-index: 10; transition: 0.3s; backdrop-filter: blur(10px); }
        .back-btn:hover { color: #fff; border-color: var(--neon-blue); background: rgba(10,132,255,0.1); }
        h1 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; margin: 0 0 10px 0; font-size: 26px; text-shadow: 0 0 15px rgba(10,132,255,0.4); }

        .master-panel { position: relative; z-index: 100; background: var(--panel-bg); padding: 15px 30px; border-radius: 15px; border: 1px solid var(--border-color); margin-bottom: 15px; width: 850px; box-sizing: border-box; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .button-row { display: flex; gap: 15px; justify-content: space-between; align-items: flex-end; width: 100%; }
        .btn-group-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .group-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .group-separator { width: 1px; height: 35px; background: rgba(255,255,255,0.15); margin: 0 5px; }
        
        button.cfg-btn { padding: 9px 16px; background: rgba(0,0,0,0.5); color: #aaa; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; text-transform: uppercase; font-family: inherit; outline: none; }
        button.cfg-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        button.active-blue.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(10, 132, 255, 0.15); }
        button#handRH.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(10, 132, 255, 0.15); }
        button#handLH.active { border-color: var(--neon-orange); color: var(--neon-orange); background: rgba(255, 159, 10, 0.15); }
        
        .toggle-btn { text-align: center; }
        .toggle-btn.on { border-color: var(--success-green); color: var(--success-green); background: rgba(50, 215, 75, 0.15); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; width: 850px; position: relative; z-index: 10; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 11px; color: #bbb; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        .stat-value { font-size: 32px; font-weight: 700; font-family: 'Rajdhani', sans-serif; line-height: 1; }

        canvas { background: rgba(10, 10, 15, 0.7); border: 1px solid var(--border-color); border-radius: 12px; backdrop-filter: blur(15px); box-shadow: 0 15px 50px rgba(0,0,0,0.6); position: relative; z-index: 1; }
        #btnStart { padding: 14px 80px; background: var(--success-green); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 16px; box-shadow: 0 4px 20px rgba(50,215,75,0.4); margin: 10px 0; position: relative; z-index: 10; }
        #btnStart.running { background: var(--error-red); color: #fff; box-shadow: 0 4px 20px rgba(255,69,58,0.4); }
        #status { margin-top: 10px; font-size: 18px; color: var(--neon-blue); font-weight: bold; font-family: 'Rajdhani', sans-serif; letter-spacing: 2px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: rgba(20, 20, 30, 0.9); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }

        #pianoWrapper { display: none; width: 850px; justify-content: center; margin-top: 15px; }
        .piano-container { display: flex; background: #000; padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .key { width: 30px; height: 100px; border: 1px solid #111; border-radius: 0 0 4px 4px; cursor: pointer; position: relative; display: flex; align-items: flex-end; justify-content: center; font-size: 8px; color: #666; transition: 0.1s; user-select: none; }
        .white { background: #eee; }
        .white.pressed { background: var(--neon-blue) !important; color: #fff; }
        .black { background: #111; width: 20px; height: 60px; margin-left: -10px; margin-right: -10px; z-index: 2; border-radius: 0 0 2px 2px; }
        .black.pressed { background: var(--neon-orange) !important; }
    </style>
</head>
<body>
    <div class="font-loader">𝄞𝄢</div>
    <a href="index.html" class="back-btn">← AKADÉMIA</a>
    <h1>Hanon No. 1</h1>

    <div class="master-panel">
        <div class="button-row">
            
            <div class="btn-group-container">
                <div class="group-title">Gyakorlat Mód</div>
                <div style="display:flex; gap:6px;">
                    <button id="modeSPRINT" class="cfg-btn active-blue active" onclick="setMode('SPRINT')">SPRINT</button>
                    <button id="modeMARATHON" class="cfg-btn active-blue" onclick="setMode('MARATHON')">MARATON</button>
                    <button id="modeTRAINING" class="cfg-btn active-blue" onclick="setMode('TRAINING')">TRÉNING</button>
                </div>
            </div>

            <div class="group-separator"></div>

            <div class="btn-group-container">
                <div class="group-title">Kezek</div>
                <div style="display:flex; gap:6px;">
                    <button id="handRH" class="cfg-btn active" onclick="toggleHand('RH')">JOBB</button>
                    <button id="handLH" class="cfg-btn active" onclick="toggleHand('LH')">BAL</button>
                </div>
            </div>

            <div class="group-separator"></div>

            <div class="btn-group-container">
                <div class="group-title">Hangzás & Motor</div>
                <div style="display:flex; gap:6px;">
                    <button id="audioToggle" class="cfg-btn toggle-btn on" onclick="toggleAudio()">ZONGORA: BE</button>
                    <button id="kbToggle" class="cfg-btn toggle-btn" onclick="toggleKeyboard()">BILLENTYŰ</button>
                    <button id="dynToggle" class="cfg-btn toggle-btn on" onclick="toggleDynamics()">DINAMIKA</button>
                </div>
            </div>

        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Stabilitás</div><div id="uniformity" class="stat-value" style="color:var(--success-green);">100%</div></div>
        <div class="stat-box"><div class="stat-label">BPM</div><div id="bpm" class="stat-value">0</div></div>
        <div class="stat-box"><div class="stat-label">Irány</div><div id="progress" class="stat-value" style="color:var(--neon-blue);">STOP</div></div>
    </div>

    <button id="btnStart" onclick="handleMainButton()">▶ GYAKORLAT INDÍTÁSA</button>
    <canvas id="staffCanvas" width="850" height="500"></canvas>
    
    <div id="pianoWrapper">
        <div class="piano-container" id="piano"></div>
    </div>

    <div id="status">KÉSZEN ÁLL</div>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h1 style="color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px;">Analízis</h1>
            <div id="resSummary" style="font-size: 22px; margin: 25px 0; line-height: 1.6; font-family: 'Rajdhani';"></div>
            <button onclick="closeModal()" style="background: var(--success-green); color:#000; padding: 15px 50px; border:none; border-radius: 8px; font-weight:bold; cursor:pointer; text-transform:uppercase;">Rendben</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');
        let audioCtx, compressor, audioBuffers = {}, useDynamics = true, isAudioEnabled = true, isMidiReady = false, isRunning = false;
        let activeNotes = {}; 
        
        const whiteKeys = [36,38,40,41,43,45,47, 48,50,52,53,55,57,59, 60,62,64,65,67,69,71, 72,74,76,77,79,81,83, 84,86,88,89,91,93,95];
        const patternAsc = [0, 2, 3, 4, 5, 4, 3, 2];
        const patternDesc = [0, -2, -3, -4, -5, -4, -3, -2]; 
        const noteNames = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
        
        let selectedMode = 'SPRINT';
        let rhActive = true, lhActive = true, selectedHand = 'BOTH';
        let currentLoop = 1, rootIndex = 14, currentIndex = 0, isAscending = true, isFinalNote = false;
        let lastNoteTime = 0, timeDiffs = [], allBpms = [], rhHit = false, lhHit = false;
        const trebleY = 140, bassY = 380;

        function createPiano() {
            const p = document.getElementById('piano');
            for (let i = 48; i <= 72; i++) {
                const isB = [1,3,6,8,10].includes(i%12);
                const k = document.createElement('div');
                k.className = `key ${isB?'black':'white'}`; k.id = `key-${i}`;
                k.onmousedown = (e) => { e.preventDefault(); simulateMidi(i, 100); };
                k.onmouseup = () => simulateMidi(i, 0);
                k.onmouseleave = () => simulateMidi(i, 0);
                p.appendChild(k);
            }
        }

        function simulateMidi(note, vel) {
            onMIDIMessage({ data: [vel > 0 ? 0x90 : 0x80, note, vel] });
        }

        function toggleKeyboard() {
            const w = document.getElementById('pianoWrapper');
            const b = document.getElementById('kbToggle');
            const isVisible = w.style.display === 'flex';
            w.style.display = isVisible ? 'none' : 'flex';
            b.classList.toggle('on', !isVisible);
        }

        function toggleAudio() {
            isAudioEnabled = !isAudioEnabled;
            const btn = document.getElementById('audioToggle');
            btn.classList.toggle('on', isAudioEnabled);
            btn.innerText = isAudioEnabled ? "ZONGORA: BE" : "ZONGORA: KI";
            if(isAudioEnabled) initAudio();
        }

        async function initAudio() { 
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                compressor = audioCtx.createDynamicsCompressor();
                // TISZTA BEÁLLÍTÁSOK AZ AUDACITY-VEL FELERŐSÍTETT HANGOKHOZ
                compressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
                compressor.ratio.setValueAtTime(4, audioCtx.currentTime);
                compressor.connect(audioCtx.destination);
                
                for(let i=48; i<=84; i++) {
                    const name = noteNames[i%12] + (Math.floor(i/12)-1);
                    try {
                        let r = await fetch(`audio/piano/${name}.mp3`);
                        if(!r.ok) r = await fetch(`audio/piano/${name.toLowerCase()}.mp3`);
                        if(r.ok) {
                            const ab = await r.arrayBuffer();
                            audioBuffers[i] = await audioCtx.decodeAudioData(ab);
                        }
                    } catch(e) {}
                }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }

        function handleMainButton() {
            if (!isMidiReady) {
                if (isAudioEnabled) initAudio();
                navigator.requestMIDIAccess().then(access => {
                    for (let input of access.inputs.values()) input.onmidimessage = onMIDIMessage;
                    isMidiReady = true; startPractice();
                });
                return;
            }
            isRunning ? stopPractice() : startPractice();
        }

        function startPractice() {
            isRunning = true; currentIndex = 0; rootIndex = 14; isAscending = true; isFinalNote = false;
            currentLoop = 1; timeDiffs = []; allBpms = []; lastNoteTime = 0; rhHit = false; lhHit = false;
            const btn = document.getElementById('btnStart'); btn.innerText = "◼ LEÁLLÍTÁS"; btn.classList.add('running');
            document.getElementById('status').innerText = "GYAKORLÁS..."; draw();
        }

        function stopPractice() { isRunning = false; const btn = document.getElementById('btnStart'); btn.innerText = "▶ GYAKORLAT INDÍTÁSA"; btn.classList.remove('running'); document.getElementById('status').innerText = "KÉSZEN ÁLL"; draw(); }

        function playSound(midi, velocity) { 
            if (!isAudioEnabled || !audioCtx || !audioBuffers[midi]) return; 
            if (activeNotes[midi]) stopSound(midi);

            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain(); 
            const source = audioCtx.createBufferSource();
            
            source.buffer = audioBuffers[midi];
            // NORMÁL HANGERŐ (1.0), MIVEL A FORRÁSFÁJL MÁR ERŐS
            let maxVolume = useDynamics ? (velocity / 127) : 0.8; 
            gain.gain.setValueAtTime(maxVolume, now);
            
            source.connect(gain); 
            gain.connect(compressor); 
            source.start(now); 
            
            activeNotes[midi] = { src: source, gain: gain };
        }

        function stopSound(midi) {
            if (activeNotes[midi]) {
                const now = audioCtx.currentTime;
                const { src, gain } = activeNotes[midi];
                gain.gain.cancelScheduledValues(now);
                gain.gain.setValueAtTime(gain.gain.value, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                src.stop(now + 0.15);
                delete activeNotes[midi];
            }
        }

        function onMIDIMessage(e) {
            let [status, note, velocity] = e.data;
            let cmd = status & 0xf0;

            const k = document.getElementById(`key-${note}`);
            if (k) {
                if (cmd === 0x90 && velocity > 0) k.classList.add('pressed');
                else k.classList.remove('pressed');
            }

            if (cmd === 0x90 && velocity > 0) {
                if (isRunning) {
                    let targetIdx = isFinalNote ? 14 : rootIndex + (isAscending ? patternAsc : patternDesc)[currentIndex];
                    let tRH = whiteKeys[targetIdx], tLH = whiteKeys[targetIdx - 7];
                    if (selectedHand === 'RH' && note === tRH) { playSound(note, velocity); processHit(); }
                    else if (selectedHand === 'LH' && note === tLH) { playSound(note, velocity); processHit(); }
                    else if (selectedHand === 'BOTH') { 
                        if (note === tRH && !rhHit) { rhHit = true; playSound(note, velocity); } 
                        if (note === tLH && !lhHit) { lhHit = true; playSound(note, velocity); } 
                        if (rhHit && lhHit) { rhHit = false; lhHit = false; processHit(); } 
                    } else playSound(note, velocity);
                } else playSound(note, velocity);
            } else if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) stopSound(note);
        }

        function processHit() {
            const now = performance.now();
            if (lastNoteTime !== 0) {
                let diff = now - lastNoteTime; timeDiffs.push(diff); allBpms.push(60000/diff);
                let avg = timeDiffs.reduce((a,b)=>a+b)/timeDiffs.length, dev = Math.sqrt(timeDiffs.reduce((a,b)=>a+Math.pow(b-avg,2),0)/timeDiffs.length);
                document.getElementById('uniformity').innerText = Math.round(Math.max(0, 100-(dev/3))) + "%";
                document.getElementById('bpm').innerText = Math.round(60000/diff);
            }
            lastNoteTime = now;
            if (isFinalNote) {
                if ((selectedMode === 'MARATHON' && currentLoop < 3) || selectedMode === 'TRAINING') {
                    currentLoop++; rootIndex = 14; isAscending = true; isFinalNote = false; currentIndex = 0;
                } else { finish(); return; }
            } else {
                currentIndex++;
                if (currentIndex >= 8) {
                    currentIndex = 0;
                    if (isAscending) { if (rootIndex === 20) { isAscending = false; rootIndex = 25; } else rootIndex++; } 
                    else { if (rootIndex === 18) { isFinalNote = true; } else rootIndex--; }
                }
            }
            document.getElementById('progress').innerText = isFinalNote ? "ZÁRÁS" : (isAscending ? "FEL" : "LE");
            draw();
        }

        function drawLedgers(x, off, baseY, color) {
            ctx.strokeStyle = color; ctx.lineWidth = 3;
            if (off >= 6) { for (let p = 6; p <= off; p += 2) { let ly = baseY - p * 12; ctx.beginPath(); ctx.moveTo(x - 22, ly); ctx.lineTo(x + 22, ly); ctx.stroke(); } }
            if (off <= -6) { for (let p = -6; p >= off; p -= 2) { let ly = baseY - p * 12; ctx.beginPath(); ctx.moveTo(x - 22, ly); ctx.lineTo(x + 22, ly); ctx.stroke(); } }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
            for(let i=-2; i<=2; i++){
                if(selectedHand!=='LH'){ctx.beginPath();ctx.moveTo(50,trebleY+i*24);ctx.lineTo(800,trebleY+i*24);ctx.stroke();}
                if(selectedHand!=='RH'){ctx.beginPath();ctx.moveTo(50,bassY+i*24);ctx.lineTo(800,bassY+i*24);ctx.stroke();}
            }
            ctx.font='100px "Noto Music"'; ctx.textAlign='center'; ctx.textBaseline='middle';
            if(selectedHand!=='LH'){ctx.fillStyle='#bf5af2'; ctx.fillText('\uD834\uDD1E', 95, trebleY + 20);}
            if(selectedHand!=='RH'){ctx.fillStyle='#0a84ff'; ctx.fillText('\uD834\uDD22', 95, bassY + 12);}
            if (isRunning) {
                if (isFinalNote) drawNote(14, 0, true);
                else {
                    const p = isAscending ? patternAsc : patternDesc;
                    p.forEach((step, i) => {
                        ctx.globalAlpha = i < currentIndex ? 0.15 : (i === currentIndex ? 1.0 : 0.35);
                        drawNote(rootIndex + step, i, false);
                    });
                }
            }
            ctx.globalAlpha = 1.0;
        }

        function drawNote(targetIndex, xPos, isWhole) {
            let x = 200 + (xPos * 80);
            if (selectedHand !== 'LH') {
                let off = targetIndex - 20; let y = trebleY - off * 12;
                let color = (!isWhole && xPos === currentIndex) || isWhole ? "#0a84ff" : "#fff";
                ctx.fillStyle = color; drawLedgers(x, off, trebleY, color);
                ctx.beginPath(); ctx.ellipse(x, y, 16, 12, Math.PI/8, 0, 2*Math.PI); ctx.fill();
            }
            if (selectedHand !== 'RH') {
                let off = targetIndex - 7 - 8; let y = bassY - off * 12;
                let color = (!isWhole && xPos === currentIndex) || isWhole ? "#ff9f0a" : "#fff";
                ctx.fillStyle = color; drawLedgers(x, off, bassY, color);
                ctx.beginPath(); ctx.ellipse(x, y, 16, 12, Math.PI/8, 0, 2*Math.PI); ctx.fill();
            }
        }

        function finish() { isRunning = false; const avg = allBpms.length > 0 ? Math.round(allBpms.reduce((a,b)=>a+b)/allBpms.length) : 0; document.getElementById('resSummary').innerHTML = `Tempó: <span style="color:var(--neon-blue)">${avg} BPM</span><br>Stabilitás: <span style="color:var(--success-green)">${document.getElementById('uniformity').innerText}</span>`; document.getElementById('resultModal').style.display = "flex"; }
        function closeModal() { document.getElementById('resultModal').style.display = 'none'; stopPractice(); }
        function toggleDynamics() { useDynamics = !useDynamics; document.getElementById('dynToggle').classList.toggle('on', useDynamics); }
        function setMode(m) { selectedMode = m; document.querySelectorAll('#modeSPRINT, #modeMARATHON, #modeTRAINING').forEach(b=>b.classList.remove('active')); document.getElementById('mode'+m).classList.add('active'); if(isRunning) stopPractice(); }
        function toggleHand(h) {
            if (h === 'RH') rhActive = !rhActive; if (h === 'LH') lhActive = !lhActive;
            if (!rhActive && !lhActive) { if (h === 'RH') rhActive = true; if (h === 'LH') lhActive = true; }
            document.getElementById('handRH').classList.toggle('active', rhActive);
            document.getElementById('handLH').classList.toggle('active', lhActive);
            selectedHand = (rhActive && lhActive) ? 'BOTH' : (rhActive ? 'RH' : 'LH');
            if (isRunning) stopPractice(); draw();
        }
        createPiano();
        window.onload = () => { document.fonts.ready.then(draw); };
    </script>
</body>
</html>
