<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Zongora Oktató 5.2 - Ritmus Tréner</title>
    <style>
        :root {
            --neon-blue: #00d4ff; --neon-orange: #ffaa00; --neon-purple: #bf5af2;
            --success-green: #32d74b; --error-red: #ff453a; --bg-color: #050510; --panel-bg: rgba(0, 0, 0, 0.9);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .back-btn { position: fixed; top: 15px; left: 15px; color: #888; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; border: 1px solid #333; }
        h1 { color: var(--neon-orange); text-transform: uppercase; letter-spacing: 3px; margin: 0 0 5px 0; font-size: 26px; text-shadow: 0 0 15px rgba(255,170,0,0.4); }
        
        .master-panel { background: var(--panel-bg); padding: 10px 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; width: 850px; box-sizing: border-box;}
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; width: 100%; }
        
        button.cfg-btn { padding: 6px 12px; background: #0a0a0a; color: #888; border: 2px solid #333; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; text-transform: uppercase; }
        button.cfg-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); background: #001a25; }
        
        button.clef-treble.active { border-color: var(--neon-purple); color: var(--neon-purple); background: #15001a; }
        button.clef-bass.active { border-color: var(--neon-blue); color: var(--neon-blue); background: #001a25; }

        .toggle-btn { border-color: #444; }
        .toggle-btn.on { border-color: var(--success-green); color: var(--success-green); background: #001a05; }

        .bpm-container { background: #0a0a0a; padding: 4px 10px; border-radius: 6px; border: 2px solid #333; display: flex; align-items: center; gap: 10px; }
        input[type=range] { accent-color: var(--neon-orange); cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; width: 850px; box-sizing: border-box; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-size: 18px; font-weight: bold; font-family: monospace; }
        .stat-good .stat-value { color: var(--success-green); }
        .stat-bad .stat-value { color: var(--error-red); }
        .stat-acc .stat-value { color: var(--neon-orange); }

        canvas { background: #000; border: 2px solid #222; border-radius: 12px; }
        
        #btnStart { padding: 10px 50px; background: var(--success-green); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(50,215,75,0.3); margin-top: 5px; margin-bottom: 5px;}
        #btnStart.running { background: var(--error-red); color: #fff; box-shadow: 0 4px 15px rgba(255,69,58,0.3); }

        #status { margin-top: 5px; font-size: 16px; font-weight: bold; height: 20px; text-align: center; letter-spacing: 1px; }
        .correct { color: var(--success-green); }
        .early { color: var(--neon-orange); }
        .late { color: #ff9f0a; }
        .wrong { color: var(--error-red); animation: shake 0.3s; }
        .info { color: var(--neon-blue); }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← AKADÉMIA</a>
    
    <div style="text-align: center; margin-bottom: 5px;">
        <h1>PRO RITMUS TRÉNER 5.2</h1>
    </div>

    <div class="master-panel">
        <div class="button-group">
            <button id="btnTreble" class="cfg-btn clef-treble active" onclick="setClef('treble')">VIOLIN KULCS</button>
            <button id="btnBass" class="cfg-btn clef-bass" onclick="setClef('bass')">BASSZUS KULCS</button>
            
            <div class="bpm-container">
                <span style="color:#888; font-size:11px; font-weight:bold;">TEMPÓ:</span>
                <input type="range" id="bpmSlider" min="50" max="140" value="80">
                <span id="bpmDisplay" style="color:var(--neon-orange); font-weight:bold; font-size: 13px; width: 55px;">80 BPM</span>
            </div>
            
            <button id="audioToggle" class="cfg-btn toggle-btn on" onclick="toggleAudio()">ZONGORA: ON</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box stat-good"><div class="stat-label">Pontos (Ritmus)</div><div id="scoreOk" class="stat-value">0</div></div>
        <div class="stat-box stat-bad"><div class="stat-label">Hibás / Pontatlan</div><div id="scoreBad" class="stat-value">0</div></div>
        <div class="stat-box stat-acc"><div class="stat-label">Zenei Pontosság</div><div id="scoreAcc" class="stat-value">0%</div></div>
    </div>

    <button id="btnStart" onclick="handleMainButton()">▶ MIDI ÉLESÍTÉSE & INDÍTÁS</button>
    <canvas id="staffCanvas" width="850" height="480"></canvas>
    <div id="status" class="info">Kattints a gombra a kezdéshez!</div>

    <script>
        const canvas = document.getElementById('staffCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        
        let scoreOk = 0, scoreBad = 0;
        const elOk = document.getElementById('scoreOk'), elBad = document.getElementById('scoreBad'), elAcc = document.getElementById('scoreAcc');
        const bpmSlider = document.getElementById('bpmSlider'), bpmDisplay = document.getElementById('bpmDisplay');
        
        let audioCtx, audioOn = true, isSystemReady = false;
        let currentClef = 'treble', bpm = 80;
        
        let measureNotes = [], currentNoteIndex = 0, exerciseStartTime = 0;
        let isPlaying = false, animationFrameId;

        const trebleY = 120, bassY = 360; // 480px canvas optimalizálva

        const trebleNotes = [
            { name: 'C4', offset: -6, m: 60 }, { name: 'D4', offset: -5, m: 62 },
            { name: 'E4', offset: -4, m: 64 }, { name: 'F4', offset: -3, m: 65 },
            { name: 'G4', offset: -2, m: 67 }, { name: 'A4', offset: -1, m: 69 },
            { name: 'B4', offset: 0, m: 71 },  { name: 'C5', offset: 1, m: 72 }
        ];

        const bassNotes = [
            { name: 'C3', offset: -1, m: 48 }, { name: 'D3', offset: 0, m: 50 },
            { name: 'E3', offset: 1, m: 52 },  { name: 'F3', offset: 2, m: 53 },
            { name: 'G3', offset: 3, m: 55 },  { name: 'A3', offset: 4, m: 57 },
            { name: 'B3', offset: 5, m: 59 },  { name: 'C4', offset: 6, m: 60 }
        ];

        bpmSlider.addEventListener('input', (e) => { bpm = e.target.value; bpmDisplay.innerText = `${bpm} BPM`; });

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleAudio() {
            audioOn = !audioOn;
            const btn = document.getElementById('audioToggle');
            btn.innerText = `ZONGORA: ${audioOn ? 'ON' : 'OFF'}`;
            btn.classList.toggle('on', audioOn);
            if (audioOn) initAudio();
        }

        function setClef(clef) {
            currentClef = clef;
            document.getElementById('btnTreble').classList.toggle('active', clef === 'treble');
            document.getElementById('btnBass').classList.toggle('active', clef === 'bass');
            if(!isPlaying) drawStaffAndNotes(-100);
        }

        function playTone(midiNumber, velocity, duration = 0.5) {
            if (!audioOn || !audioCtx) return;
            const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.frequency.value = 440 * Math.pow(2, (midiNumber - 69) / 12);
            osc.type = 'triangle'; 
            const vol = (velocity / 127) * 0.8;
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playClick(isHigh) {
            if (!audioCtx) return; 
            const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.frequency.value = isHigh ? 1000 : 500;
            osc.type = 'square';
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function generateMeasure() {
            measureNotes = [];
            let noteList = currentClef === 'treble' ? trebleNotes : bassNotes;
            const startX = 220, xStep = 140;
            for(let i=0; i<4; i++) {
                let baseNote = noteList[Math.floor(Math.random() * noteList.length)];
                measureNotes.push({ ...baseNote, x: startX + (i * xStep), beatIndex: i, hitStatus: null });
            }
        }

        function drawLedgers(x, offset, baseLineY) { 
            ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 2; 
            if (offset <= -6) {
                for (let p = -6; p >= offset; p -= 2) { 
                    let py = baseLineY - (p * 12); 
                    ctx.beginPath(); ctx.moveTo(x - 22, py); ctx.lineTo(x + 22, py); ctx.stroke(); 
                }
            }
            if (offset >= 6) {
                for (let p = 6; p <= offset; p += 2) { 
                    let py = baseLineY - (p * 12); 
                    ctx.beginPath(); ctx.moveTo(x - 22, py); ctx.lineTo(x + 22, py); ctx.stroke(); 
                }
            }
        }

        function drawStaffAndNotes(playheadX) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0;
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            
            for(let i=-2; i<=2; i++){ 
                ctx.beginPath(); ctx.moveTo(50, trebleY+i*24); ctx.lineTo(800, trebleY+i*24); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(50, bassY+i*24); ctx.lineTo(800, bassY+i*24); ctx.stroke();
            }
            
            ctx.font='240px serif'; ctx.fillStyle='#bf5af2'; ctx.fillText('\uD834\uDD1E', 95, trebleY+72);
            ctx.font='130px serif'; ctx.fillStyle='#0a84ff'; ctx.fillText('\uD834\uDD22', 95, bassY+36);

            for(let n of measureNotes) {
                let baseLineY = currentClef === 'treble' ? trebleY : bassY;
                let noteY = baseLineY - (n.offset * 12);
                
                if(n.hitStatus === 'perfect') ctx.fillStyle = '#32d74b';
                else if(n.hitStatus === 'early') ctx.fillStyle = '#ffaa00';
                else if(n.hitStatus === 'late') ctx.fillStyle = '#ff9f0a';
                else if(n.hitStatus === 'miss') ctx.fillStyle = '#ff3b30';
                else ctx.fillStyle = currentClef === 'treble' ? '#00d4ff' : '#ffaa00';

                drawLedgers(n.x, n.offset, baseLineY);
                ctx.beginPath(); ctx.ellipse(n.x, noteY, 16, 12, Math.PI / 8, 0, 2 * Math.PI); ctx.fill();

                ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 2;
                ctx.beginPath();
                if (n.offset < 0) { 
                    ctx.moveTo(n.x + 14, noteY); ctx.lineTo(n.x + 14, noteY - 50);
                } else { 
                    ctx.moveTo(n.x - 14, noteY); ctx.lineTo(n.x - 14, noteY + 50);
                }
                ctx.stroke();

                if(!n.hitStatus) {
                    ctx.fillStyle = '#888'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(n.name, n.x, noteY + (n.offset < 0 ? 35 : -35));
                }
            }

            if(isPlaying) {
                ctx.strokeStyle = 'rgba(255, 170, 0, 0.8)'; ctx.lineWidth = 3;
                ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 15;
                ctx.beginPath(); ctx.moveTo(playheadX, 30); ctx.lineTo(playheadX, canvas.height - 30); ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function updateScore() {
            let total = scoreOk + scoreBad;
            let acc = total === 0 ? 0 : Math.round((scoreOk / total) * 100);
            elOk.innerText = scoreOk; elBad.innerText = scoreBad; elAcc.innerText = acc + "%";
        }

        function animateExercise() {
            if(!isPlaying) return;
            let elapsedMs = performance.now() - exerciseStartTime;
            let msPerBeat = (60 / bpm) * 1000;
            let totalExerciseTime = msPerBeat * 4;

            let currentBeatFloat = elapsedMs / msPerBeat;
            let playheadX = 220 + (currentBeatFloat * 140);

            drawStaffAndNotes(playheadX);

            if (elapsedMs > totalExerciseTime + 300) {
                isPlaying = false;
                for(let i=currentNoteIndex; i<4; i++) { measureNotes[i].hitStatus = 'miss'; scoreBad++; }
                updateScore();
                
                statusDiv.innerHTML = `<span class="info">Ütem vége! Felkészülés a következőre...</span>`;
                drawStaffAndNotes(-100); 
                setTimeout(() => { if(isSystemReady) startExerciseSequence(); }, 1500); 
                return;
            }
            animationFrameId = requestAnimationFrame(animateExercise);
        }

        function startExerciseSequence() {
            if (!isSystemReady) return;
            isPlaying = false; cancelAnimationFrame(animationFrameId);
            
            generateMeasure(); currentNoteIndex = 0; drawStaffAndNotes(-100);
            
            let msPerBeat = (60 / bpm) * 1000;
            statusDiv.innerHTML = `<span class="early">Készülj... (Beszámolás)</span>`;
            
            for(let i=0; i<4; i++) { setTimeout(() => { playClick(i === 0); }, i * msPerBeat); }

            setTimeout(() => {
                statusDiv.innerHTML = `<span class="correct">JÁTÉK!</span>`;
                exerciseStartTime = performance.now(); isPlaying = true;
                
                for(let i=0; i<4; i++) { setTimeout(() => { playClick(i===0); }, i * msPerBeat); }
                animateExercise();
            }, 4 * msPerBeat);
        }

        function handleMainButton() {
            const btn = document.getElementById('btnStart');
            if (!isSystemReady) {
                initAudio();
                if (navigator.requestMIDIAccess) { 
                    navigator.requestMIDIAccess().then(onMIDISuccess, onMIDIFailure); 
                }
                return;
            }

            if (isPlaying || btn.classList.contains('running')) {
                isPlaying = false; cancelAnimationFrame(animationFrameId);
                btn.innerText = "▶ GYAKORLAT INDÍTÁSA"; btn.classList.remove('running');
                statusDiv.innerHTML = `<span class="info">Gyakorlat leállítva.</span>`;
                drawStaffAndNotes(-100);
            } else {
                btn.innerText = "◼ STOP / RESET"; btn.classList.add('running');
                startExerciseSequence();
            }
        }

        function onMIDIMessage(event) {
            if (!isPlaying) return;
            let data = event.data; let type = data[0] & 0xf0; let midiNote = data[1]; let velocity = data[2];    
            
            if (type === 144 && velocity > 0) {
                playTone(midiNote, velocity); 
                if(currentNoteIndex < 4) {
                    let targetNote = measureNotes[currentNoteIndex];
                    let msPerBeat = (60 / bpm) * 1000;
                    let expectedTime = targetNote.beatIndex * msPerBeat;
                    let actualTime = performance.now() - exerciseStartTime;
                    let diff = actualTime - expectedTime;
                    let tolerance = 150; 

                    if(midiNote !== targetNote.m) {
                        targetNote.hitStatus = 'miss'; scoreBad++;
                        statusDiv.innerHTML = `<span class="wrong">ROSSZ HANG!</span>`;
                    } else {
                        if(Math.abs(diff) <= tolerance) {
                            targetNote.hitStatus = 'perfect'; scoreOk++;
                            statusDiv.innerHTML = `<span class="correct">PONTOS! (Tökéletes ritmus)</span>`;
                        } else if (diff < -tolerance) {
                            targetNote.hitStatus = 'early'; scoreBad++; 
                            statusDiv.innerHTML = `<span class="early">SIETSZ! (-${Math.abs(Math.round(diff))}ms)</span>`;
                        } else if (diff > tolerance) {
                            targetNote.hitStatus = 'late'; scoreBad++;
                            statusDiv.innerHTML = `<span class="late">KÉSEL! (+${Math.abs(Math.round(diff))}ms)</span>`;
                        }
                    }
                    currentNoteIndex++; updateScore();
                }
            }
        }

        function onMIDISuccess(midiAccess) {
            for (var input of midiAccess.inputs.values()) { input.onmidimessage = onMIDIMessage; }
            isSystemReady = true;
            document.getElementById('btnStart').innerText = "▶ GYAKORLAT INDÍTÁSA";
            statusDiv.innerHTML = `<span class="correct">MIDI kész! Indítsd a gyakorlatot.</span>`;
        }
        function onMIDIFailure() { statusDiv.innerHTML = `<span class="wrong">Hiba: Nincs MIDI kapcsolat.</span>`; }

        drawStaffAndNotes(-100);
    </script>
</body>
</html>
