<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Hanon Pro Academy - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #0a84ff; --neon-orange: #ff9f0a; --success-green: #32d74b;
            --bg-dark: #050508; --panel-bg: rgba(20, 20, 30, 0.85); --border-color: rgba(255, 255, 255, 0.2);
        }
        body {
            font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow-x: hidden;
        }

        /* VEZÉRLŐPULT */
        .master-panel { background: var(--panel-bg); padding: 15px 30px; border-radius: 15px; border: 1px solid var(--border-color); width: 850px; backdrop-filter: blur(15px); margin-bottom: 10px; }
        .button-row { display: flex; gap: 15px; justify-content: space-between; align-items: flex-end; }
        .btn-group-container { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .group-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        
        button.cfg-btn { padding: 8px 14px; background: rgba(0,0,0,0.5); color: #aaa; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        button.cfg-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(10, 132, 255, 0.15); }

        #btnStart { padding: 15px 80px; background: var(--success-green); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; margin: 15px 0; transition: 0.3s; box-shadow: 0 0 20px rgba(50, 215, 75, 0.2); }
        #btnStart:disabled { opacity: 0.5; cursor: wait; }

        /* KOTTA */
        canvas { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }

        /* ZONGORA */
        .piano-container { display: flex; background: #000; padding: 10px; border-radius: 10px; border: 2px solid #222; margin-top: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .key { width: 32px; height: 130px; border: 1px solid #111; border-radius: 0 0 5px 5px; cursor: pointer; position: relative; display: flex; align-items: flex-end; justify-content: center; font-size: 9px; color: #555; user-select: none; transition: 0.1s; }
        .white { background: linear-gradient(to bottom, #eee 0%, #fff 100%); }
        .white.pressed { background: var(--neon-blue) !important; color: #fff; transform: translateY(2px); }
        .black { background: linear-gradient(to bottom, #333 0%, #000 100%); width: 22px; height: 85px; margin-left: -11px; margin-right: -11px; z-index: 2; border-radius: 0 0 3px 3px; color: #fff; }
        .black.pressed { background: var(--neon-orange) !important; transform: translateY(2px); }

        #status { color: var(--neon-blue); font-weight: bold; margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>Hanon Pro Academy</h1>

    <div class="master-panel">
        <div class="button-row">
            <div class="btn-group-container">
                <div class="group-title">Kezek</div>
                <div style="display:flex; gap:6px;">
                    <button id="handRH" class="cfg-btn active" onclick="toggleHand('RH')">JOBB</button>
                    <button id="handLH" class="cfg-btn active" onclick="toggleHand('LH')">BAL</button>
                </div>
            </div>
            <div class="btn-group-container">
                <div class="group-title">Erősítés</div>
                <button class="cfg-btn active">Boost: +200%</button>
            </div>
            <div class="btn-group-container">
                <div class="group-title">Dinamika</div>
                <button id="dynToggle" class="cfg-btn active" onclick="toggleDynamics()">BEKAPCSOLVA</button>
            </div>
        </div>
    </div>

    <button id="btnStart" onclick="initApp()">▶ RENDSZER AKTIVÁLÁSA</button>
    
    <canvas id="staffCanvas" width="850" height="300"></canvas>

    <div class="piano-container" id="piano"></div>
    <div id="status">VÁRAKOZÁS...</div>

    <script>
        const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');
        let audioCtx, compressor, audioBuffers = {}, isRunning = false;
        let rhActive = true, lhActive = true, useDynamics = true;
        let rootIndex = 14, currentIndex = 0, isAscending = true;

        const noteNames = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
        const whiteKeysMidi = [36,38,40,41,43,45,47, 48,50,52,53,55,57,59, 60,62,64,65,67,69,71, 72,74,76,77,79,81,83, 84];
        const patternAsc = [0, 2, 3, 4, 5, 4, 3, 2];
        const samplePath = "audio/piano/";

        // 1. Zongora felépítése
        function createPiano() {
            const piano = document.getElementById('piano');
            for (let i = 48; i <= 72; i++) {
                const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
                const key = document.createElement('div');
                key.className = `key ${isBlack ? 'black' : 'white'}`;
                key.id = `key-${i}`;
                key.innerHTML = `<span>${noteNames[i%12]}</span>`;
                key.onmousedown = (e) => { e.preventDefault(); handleInput(i, 100); };
                piano.appendChild(key);
            }
        }

        // 2. Rendszer indítása
        async function initApp() {
            const btn = document.getElementById('btnStart');
            if (isRunning) { stopPractice(); return; }

            if (btn.innerText === "▶ RENDSZER AKTIVÁLÁSA") {
                btn.disabled = true; btn.innerText = "Betöltés...";
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    // Hangerő optimalizálás (Kompresszor)
                    compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.setValueAtTime(-20, audioCtx.currentTime);
                    compressor.knee.setValueAtTime(30, audioCtx.currentTime);
                    compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                    compressor.connect(audioCtx.destination);
                }
                
                // Hangok betöltése (C3-C5)
                for(let i = 48; i <= 72; i++) {
                    const name = noteNames[i % 12] + (Math.floor(i / 12) - 1);
                    try {
                        let r = await fetch(`${samplePath}${name}.mp3`);
                        if(!r.ok) r = await fetch(`${samplePath}${name.toLowerCase()}.mp3`);
                        if(r.ok) {
                            const ab = await r.arrayBuffer();
                            audioBuffers[i] = await audioCtx.decodeAudioData(ab);
                        }
                    } catch(e) {}
                }
                
                initMidi();
                btn.disabled = false; btn.innerText = "▶ GYAKORLAT INDÍTÁSA";
                document.getElementById('status').innerText = "AUDIO KÉSZ. JÁTSZHATSZ!";
                draw();
                return;
            }
            startPractice();
        }

        function initMidi() {
            if (navigator.requestMIDIAccess) {
                navigator.requestMIDIAccess().then(access => {
                    for (let input of access.inputs.values()) {
                        input.onmidimessage = (e) => {
                            let [s, n, v] = e.data;
                            if ((s & 0xf0) === 0x90 && v > 0) handleInput(n, v);
                        };
                    }
                });
            }
        }

        function handleInput(note, vel) {
            playNote(note, vel);
            const k = document.getElementById(`key-${note}`);
            if(k) { k.classList.add('pressed'); setTimeout(()=>k.classList.remove('pressed'), 150); }

            if (isRunning) {
                let targetIdx = rootIndex + patternAsc[currentIndex];
                let tRH = whiteKeysMidi[targetIdx], tLH = whiteKeysMidi[targetIdx - 7];
                
                if ((rhActive && note === tRH) || (lhActive && note === tLH) || (rhActive && lhActive && (note === tRH || note === tLH))) {
                    currentIndex++;
                    if (currentIndex >= 8) { currentIndex = 0; rootIndex++; }
                    if (rootIndex > 20) rootIndex = 14; 
                    draw();
                }
            }
        }

        function playNote(midi, vel) {
            if (!audioCtx) return;
            const gainNode = audioCtx.createGain();
            let volume = (vel / 127) * 2.5; // <--- ITT AZ ERŐSÍTÉS (2.5x)
            gainNode.gain.setValueAtTime(useDynamics ? volume : 1.2, audioCtx.currentTime);

            if (audioBuffers[midi]) {
                const s = audioCtx.createBufferSource();
                s.buffer = audioBuffers[midi];
                s.connect(gainNode);
                gainNode.connect(compressor); // Kompresszorra kötve
                s.start(0);
            } else {
                // Tartalék szinti hang
                const osc = audioCtx.createOscillator();
                osc.frequency.setValueAtTime(440 * Math.pow(2, (midi - 69) / 12), audioCtx.currentTime);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function startPractice() { isRunning = true; document.getElementById('btnStart').innerText = "◼ LEÁLLÍTÁS"; draw(); }
        function stopPractice() { isRunning = false; document.getElementById('btnStart').innerText = "▶ GYAKORLAT INDÍTÁSA"; draw(); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
            for(let i=-2; i<=2; i++){
                ctx.beginPath(); ctx.moveTo(50, 100+i*20); ctx.lineTo(800, 100+i*20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(50, 220+i*20); ctx.lineTo(800, 220+i*20); ctx.stroke();
            }
            if(isRunning) {
                let targetIdx = rootIndex + patternAsc[currentIndex];
                if(rhActive) drawNote(200 + currentIndex * 75, 100 - (targetIdx - 20) * 10, '#0a84ff');
                if(lhActive) drawNote(200 + currentIndex * 75, 220 - (targetIdx - 7 - 8) * 10, '#ff9f0a');
            }
        }

        function drawNote(x, y, color) {
            ctx.fillStyle = color; ctx.beginPath();
            ctx.ellipse(x, y, 12, 9, Math.PI/8, 0, 2*Math.PI); ctx.fill();
        }

        function toggleHand(h) { 
            if(h==='RH') rhActive=!rhActive; else lhActive=!lhActive; 
            document.getElementById('hand'+h).classList.toggle('active'); draw(); 
        }
        function toggleDynamics() { 
            useDynamics=!useDynamics; 
            document.getElementById('dynToggle').classList.toggle('active');
            document.getElementById('dynToggle').innerText = useDynamics ? "BEKAPCSOLVA" : "KIKAPCSOLVA";
        }

        createPiano();
        window.onload = draw;
    </script>
</body>
</html>
