<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Akíra Piano Academy | Workstation - Sight Read</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --rack-bg: #1a1a1d; --rack-border: #2a2a2d;
            --btn-dark: #101012; --btn-border: #050505; --text-dim: #555;
            --lcd-bg-dark: #111211; --lcd-label-color: #557799; --oled-text: #b3e6ff;
        }
        body { font-family:'Inter',sans-serif; background:#000; margin:0; padding:0; height:100vh; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; color:#fff; -webkit-user-select:none; user-select:none; }
        .sheet-container { flex-grow:1; display:flex; align-items:center; justify-content:center; padding:10px 20px; width:100%; box-sizing:border-box; overflow:visible; }
        .sheet-viewport { width:100%; max-width:2450px; aspect-ratio:2450/480; position:relative; overflow:visible; background:transparent; }
        .sheet-image { width:100%; height:100%; object-fit:contain; z-index:1; position:absolute; opacity:0.35; pointer-events:none; }
        #staffCanvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }
        .lower-section { width:100%; display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
        .workstation-chassis { display:flex; width:100%; max-width:2560px; position:relative; box-shadow:0 -10px 40px rgba(0,0,0,0.9); border-radius:6px 6px 0 0; background:var(--rack-bg); }
        .wood-cheek { width:24px; background:linear-gradient(to right,#3a1c0d,#1a0c05); box-shadow:inset 1px 0 2px rgba(255,255,255,0.1),inset -2px 0 5px rgba(0,0,0,0.8); border-radius:6px 0 0 0; z-index:10; }
        .wood-cheek.right { border-radius:0 6px 0 0; background:linear-gradient(to left,#3a1c0d,#1a0c05); }
        .synth-core { flex-grow:1; display:flex; flex-direction:column; position:relative; }
        .info-bar-integrated { width:100%; height:45px; background-color:var(--lcd-bg-dark); border-bottom:2px solid #080808; display:flex; align-items:center; justify-content:center; z-index:10; box-shadow:inset 0 3px 10px rgba(0,0,0,0.9); }
        .info-bar-text { font-family:'Share Tech Mono',monospace; font-size:18px; font-weight:bold; color:var(--oled-text); text-transform:uppercase; letter-spacing:2px; }
        .settings-bar { position:absolute; bottom:100%; left:0; width:100%; height:85px; background:var(--lcd-bg-dark); display:none; align-items:center; justify-content:space-around; z-index:50; border-top:2px solid #333; box-shadow:0 -10px 30px #000; padding:0 20px; box-sizing:border-box; }
        .settings-control { display:flex; flex-direction:column; align-items:center; gap:8px; width:150px; z-index:2; position:relative; }
        .settings-control label { font-size:11px; color:var(--lcd-label-color); font-family:'Share Tech Mono',monospace; cursor:pointer; text-transform:uppercase; font-weight:bold; }
        .settings-control input[type="range"] { -webkit-appearance:none; width:100%; height:6px; background:#111; border-radius:3px; outline:none; cursor:pointer; }
        .settings-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:20px; background:#888; border:1px solid #111; border-radius:2px; cursor:grab; }
        .master-dashboard { display:flex; justify-content:space-between; align-items:center; background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px); background-size:100% 3px; padding:25px 30px; border-top:1px solid #333; position:relative; width:100%; box-sizing:border-box; }
        .dashboard-logo { position:absolute; top:-35px; left:30px; z-index:5; pointer-events:none; }
        .control-group { display:flex; align-items:center; gap:8px; z-index:10; }
        .hardware-btn { width:95px; height:38px; background-color:var(--btn-dark); color:var(--text-dim); border:1px solid var(--btn-border); border-radius:3px; cursor:pointer; font-weight:700; font-size:12px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; text-decoration:none; box-shadow:0 3px 0 #000; transition:transform 0.1s; }
        .hardware-btn:active { transform:translateY(2px); box-shadow:0 0 0 #000; }
        .hardware-btn.active { color:#fff; background-color:#121214; }
        #btnStart { width:110px; font-weight:800; font-size:14px; letter-spacing:1px; box-shadow:0 4px 0 #000; margin-left:20px; }
        #btnStart:active { transform:translateY(4px); box-shadow:0 0 0 #000; }
        #btnStart.running { color:#fff; background-color:#1a1a1c; border-color:#333; }
        .center-console { flex:1; display:flex; justify-content:center; position:relative; }
        .lcd-arrow-wrapper { display:flex; flex-direction:column; align-items:center; width:620px; }
        .arrow-row { display:flex; width:100%; justify-content:space-around; margin:4px 0; }
        .nav-disk-btn { width:22px; height:22px; background:#222; border:1px solid #111; border-radius:50%; color:#888; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 2px rgba(0,0,0,0.6); transition:0.1s; flex-shrink:0; }
        .nav-disk-btn:active { transform:translateY(2px); }
        .oled-wrapper { background:#111; padding:2px; border-radius:4px; width:100%; box-sizing:border-box; }
        .oled-screen { background:var(--lcd-bg-dark); border:2px solid #222; border-radius:2px; display:flex; box-shadow:inset 0 3px 8px rgba(0,0,0,0.9); overflow:hidden; }
        .oled-section { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:10px 0; cursor:pointer; }
        .oled-divider { width:1px; background:rgba(255,255,255,0.05); margin:5px 0; }
        .oled-header { font-size:11px; color:var(--lcd-label-color); font-family:'Share Tech Mono'; text-transform:uppercase; font-weight:bold; margin-bottom:2px; }
        .oled-main { font-size:18px; color:var(--oled-text); font-family:'Share Tech Mono'; font-weight:bold; text-transform:uppercase; }
        .piano-crop-wrapper { width:100%; position:relative; aspect-ratio:2500/248; background:#000; overflow:visible; border-top:2px solid #000; }
        .piano-inner { width:100%; aspect-ratio:2500/284; position:absolute; top:0; left:0; }
        .piano-img { width:100%; height:100%; display:block; filter:grayscale(100%); pointer-events:none; }
        .hitbox-layer { position:absolute; top:0; left:0; width:100%; height:100%; z-index:100; }
        .key-glow { position:absolute; top:0; cursor:pointer; }
        .key-glow.pressed::after { content:''; position:absolute; pointer-events:none; z-index:150; top:0; left:0; width:100%; height:100%; border-radius:0 0 4px 4px; background:rgba(0,0,0,0.11); box-shadow:inset 6px 0 10px -2px rgba(0,0,0,0.6); }
        .black-glow.pressed::after { top:3px; left:3px; width:calc(100% - 6px); height:calc(100% - 13px); border-radius:3px; background:rgba(255,255,255,0.15); box-shadow:inset 0 -10px 15px rgba(255,255,255,0.3); z-index:40; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; justify-content:center; align-items:center; }
        .modal-content { background:var(--rack-bg); padding:30px; border:2px solid var(--rack-border); border-radius:6px; text-align:center; max-width:550px; width:90%; box-shadow:0 20px 50px rgba(0,0,0,1); }
        .modal-title { color:#aaa; text-transform:uppercase; letter-spacing:2px; font-weight:800; font-size:16px; margin-top:0; margin-bottom:25px; border-bottom:2px solid #111; padding-bottom:15px; }
        .modal-stats { display:flex; justify-content:space-around; margin-bottom:20px; }
        .modal-stat-box { display:flex; flex-direction:column; align-items:center; gap:4px; }
        .modal-stat-label { font-size:10px; color:var(--lcd-label-color); font-family:'Share Tech Mono'; text-transform:uppercase; letter-spacing:1px; font-weight:bold; }
        .modal-stat-value { font-family:'Share Tech Mono'; font-size:28px; color:var(--oled-text); font-weight:bold; }
        .modal-stat-value.err { color:#ff6666; }
        .modal-btn { background-color:var(--btn-dark); color:#aaa; border:1px solid var(--btn-border); border-radius:4px; font-weight:800; cursor:pointer; text-transform:uppercase; font-size:14px; padding:12px 40px; box-shadow:0 3px 0 #000; transition:0.1s; letter-spacing:1px; }
        .modal-btn:active { transform:translateY(3px); box-shadow:0 0 0 #000; }
        body.help-mode-active { cursor:help; } body.help-mode-active * { cursor:help !important; }
    </style>
</head>
<body>
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Session Complete</h2>
            <div class="modal-stats">
                <div class="modal-stat-box"><div class="modal-stat-label">Speed</div><div id="modalBpm" class="modal-stat-value">0 BPM</div></div>
                <div class="modal-stat-box"><div class="modal-stat-label">Accuracy</div><div id="modalUni" class="modal-stat-value">100%</div></div>
                <div class="modal-stat-box"><div class="modal-stat-label">Mistakes</div><div id="modalMistakes" class="modal-stat-value err">0</div></div>
            </div>
            <button class="modal-btn" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <div class="sheet-container">
        <div class="sheet-viewport">
            <img src="kottavonal_feher.png" class="sheet-image" id="sheetBg">
            <canvas id="staffCanvas" width="2450" height="480"></canvas>
        </div>
    </div>

    <div class="lower-section">
        <div class="workstation-chassis">
            <div class="wood-cheek"></div>
            <div class="synth-core">
                <div id="mixerBar" class="settings-bar">
                    <div class="settings-control"><label onclick="document.getElementById('vst_a').value=0.01">Attack</label><input type="range" id="vst_a" min="0" max="1" step="0.01" value="0.01"></div>
                    <div class="settings-control"><label onclick="document.getElementById('vst_e').value=5.0">Decay</label><input type="range" id="vst_e" min="1" max="10" step="0.1" value="5.0"></div>
                    <div class="settings-control"><label onclick="document.getElementById('vst_r').value=0.8">Release</label><input type="range" id="vst_r" min="0.1" max="3" step="0.1" value="0.8"></div>
                    <div class="settings-control"><label onclick="document.getElementById('vst_d').value=1.0">Velocity</label><input type="range" id="vst_d" min="0.1" max="2" step="0.1" value="1.0"></div>
                    <div class="settings-control"><label onclick="document.getElementById('vst_rev').value=0;if(reverbGain)reverbGain.gain.value=0;">Reverb</label><input type="range" id="vst_rev" min="0" max="1" step="0.05" value="0"></div>
                    <div class="settings-control"><label onclick="document.getElementById('vst_wide').value=0">Stereo Wide</label><input type="range" id="vst_wide" min="0" max="1" step="0.05" value="0"></div>
                </div>
                <div class="info-bar-integrated">
                    <div id="infoBarText" class="info-bar-text">SYSTEM READY — SELECT MODE AND PRESS START</div>
                </div>
                <div class="master-dashboard">
                    <div class="dashboard-logo">
                        <svg viewBox="0 0 300 40" style="height:25px;filter:drop-shadow(0 2px 2px rgba(0,0,0,0.8));">
                            <text x="60" y="30" fill="#666" font-family="'Inter',sans-serif" font-weight="800" font-size="32" text-anchor="end">AK</text>
                            <path d="M 64 30 L 72 30 L 72 12 L 68 12 L 68 0 L 64 0 Z" fill="#555"/>
                            <text x="76" y="30" fill="#666" font-family="'Inter',sans-serif" font-weight="800" font-size="32" text-anchor="start">RA</text>
                            <text x="135" y="28" fill="#444" font-family="'Inter',sans-serif" font-weight="600" font-size="14" letter-spacing="3">WORKSTATION</text>
                        </svg>
                    </div>
                    <div class="control-group">
                        <a href="index.html" class="hardware-btn" style="text-decoration:none;" data-help="HOME: RETURN TO MAIN MENU">Home</a>
                        <button id="handRH" class="hardware-btn active" onclick="if(!helpActive) toggleHand('RH')" data-help="TOP CLEF: TOGGLES TREBLE CLEF NOTE GENERATION">Top</button>
                        <button id="handLH" class="hardware-btn active" onclick="if(!helpActive) toggleHand('LH')" data-help="BOTTOM CLEF: TOGGLES BASS CLEF NOTE GENERATION">Bottom</button>
                        <button id="btnHintName" class="hardware-btn" onclick="if(!helpActive) toggleHint()" data-help="HINTS: DISPLAYS NOTE NAMES NEXT TO NOTEHEADS">Hints</button>
                    </div>
                    <div class="center-console">
                        <div class="lcd-arrow-wrapper">
                            <div class="arrow-row">
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleModule(-1)">▲</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) toggleMode()">▲</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleLevel(1)">▲</button>
                                <button class="nav-disk-btn" style="opacity:0;pointer-events:none;">▲</button>
                            </div>
                            <div class="oled-wrapper">
                                <div class="oled-screen">
                                    <div class="oled-section" onclick="if(!helpActive) loadModule()" data-help="MODULE: CLICK TO NAVIGATE TO ANOTHER MODULE">
                                        <div class="oled-header">Module</div><div class="oled-main" id="lcdModuleText">SIGHT READ</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" onclick="if(!helpActive) toggleMode()" data-help="MODE: SESSION (ONE ROUND + RESULTS) OR FLOW (ENDLESS AUTO-CONTINUE)">
                                        <div class="oled-header">Mode</div><div class="oled-main" id="lcdModeText">SESSION</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" onclick="if(!helpActive) cycleLevel(1)" data-help="LEVEL: DIATONIC → RHYTHM → CHROMATIC (ACCIDENTALS)">
                                        <div class="oled-header">Level</div><div class="oled-main" id="lcdLevelText">DIATONIC</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" data-help="STATS: REAL-TIME BPM AND MISTAKE COUNTER">
                                        <div class="oled-header">BPM / ERR</div><div class="oled-main" id="lcdStats" style="font-size:14px;">0 / 0</div>
                                    </div>
                                </div>
                            </div>
                            <div class="arrow-row">
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleModule(1)">▼</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) toggleMode()">▼</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleLevel(-1)">▼</button>
                                <button class="nav-disk-btn" style="opacity:0;pointer-events:none;">▼</button>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <button id="btnStart" class="hardware-btn" onclick="if(!helpActive) handleMainButton()" data-help="START/STOP: BEGIN OR END THE SIGHT READING SESSION">START</button>
                        <button id="audioToggle" class="hardware-btn active" onclick="if(!helpActive) toggleAudio()" data-help="PIANO AUDIO: TOGGLE INTERNAL SYNTHESIZER">Piano</button>
                        <button id="btnVst" class="hardware-btn" onclick="if(!helpActive) toggleVst()" data-help="MIXER: OPEN ADSR + REVERB PANEL">Mixer</button>
                        <button id="btnFullscreen" class="hardware-btn" onclick="if(!helpActive) toggleFullScreen()" data-help="FULLSCREEN: IMMERSIVE STUDIO MODE">Fullscr</button>
                        <button id="btnHelp" class="hardware-btn" onclick="toggleHelp()" data-help="HELP: CLICK ANY ELEMENT TO READ ITS DESCRIPTION">Help</button>
                    </div>
                </div>
                <div class="piano-crop-wrapper">
                    <div class="piano-inner">
                        <img src="grandpiano-keys.png" class="piano-img">
                        <div id="hb-wrap" class="hitbox-layer"></div>
                    </div>
                </div>
            </div>
            <div class="wood-cheek right"></div>
        </div>
    </div>

<script>
    const TREBLE_NOTES=[{off:-6,m:60,n:'C4'},{off:-5,m:62,n:'D4'},{off:-4,m:64,n:'E4'},{off:-3,m:65,n:'F4'},{off:-2,m:67,n:'G4'},{off:-1,m:69,n:'A4'},{off:0,m:71,n:'H4'},{off:1,m:72,n:'C5'},{off:2,m:74,n:'D5'},{off:3,m:76,n:'E5'},{off:4,m:77,n:'F5'},{off:5,m:79,n:'G5'}];
    const BASS_NOTES=[{off:-5,m:41,n:'F2'},{off:-4,m:43,n:'G2'},{off:-3,m:45,n:'A2'},{off:-2,m:47,n:'H2'},{off:-1,m:48,n:'C3'},{off:0,m:50,n:'D3'},{off:1,m:52,n:'E3'},{off:2,m:53,n:'F3'},{off:3,m:55,n:'G3'},{off:4,m:57,n:'A3'},{off:5,m:59,n:'H3'},{off:6,m:60,n:'C4'}];
    const TREBLE_BASE_Y=141.5, TREBLE_SP_Y=11.14, BASS_BASE_Y=376.16, BASS_SP_Y=10.71;
    const LEVEL_NAMES=['DIATONIC','RHYTHM','CHROMATIC'];
    const modules=[{name:'EAR TRAIN',url:'hallasfejleszto.html'},{name:'SIGHT READ',url:'kottaolvasas.html'},{name:'CHORDS',url:'akkordok.html'},{name:'SCALES',url:'skalak.html'},{name:'HANON',url:'hanon.html'},{name:'RHYTHM',url:'ritmus.html'}];

    let isRunning=false, showNames=false, helpActive=false, audioOn=true;
    let activeRH=true, activeLH=true, currentMode='manual', currentLevel=1;
    let currentModuleIdx=1;
    let seq=[], currentStep=0, activeMidiNotes=new Set();
    let audioCtx, sampleBuffers={}, activeNodes={}, masterReverb, reverbGain;
    let mistakes=0, hitIntervals=[], lastHitTime=0;

    function cycleModule(dir){if(helpActive)return;currentModuleIdx=(currentModuleIdx+dir+modules.length)%modules.length;document.getElementById('lcdModuleText').innerText=modules[currentModuleIdx].name;}
    function loadModule(){if(helpActive)return;if(currentModuleIdx!==1)window.location.href=modules[currentModuleIdx].url;}
    function toggleHelp(){helpActive=!helpActive;document.getElementById('btnHelp').classList.toggle('active',helpActive);if(helpActive){document.body.classList.add('help-mode-active');document.getElementById('infoBarText').innerHTML="HELP MODE — CLICK ANY ELEMENT TO READ ITS DESCRIPTION";}else{document.body.classList.remove('help-mode-active');updateInfoBar();}}
    document.addEventListener('click',(e)=>{if(e.target.closest('#btnHelp'))return;if(helpActive){e.preventDefault();e.stopPropagation();const t=e.target.closest('[data-help]');if(t)document.getElementById('infoBarText').innerHTML=t.dataset.help;}},true);
    function toggleFullScreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else if(document.exitFullscreen)document.exitFullscreen();}
    document.addEventListener('fullscreenchange',()=>{document.getElementById('btnFullscreen').classList.toggle('active',!!document.fullscreenElement);});
    function toggleHand(h){if(h==='RH')activeRH=!activeRH;else activeLH=!activeLH;if(!activeRH&&!activeLH){activeRH=true;activeLH=true;}document.getElementById('handRH').classList.toggle('active',activeRH);document.getElementById('handLH').classList.toggle('active',activeLH);if(isRunning)stopPractice();else{buildSequence();draw();}}
    function toggleMode(){if(helpActive)return;currentMode=currentMode==='manual'?'auto':'manual';document.getElementById('lcdModeText').innerText=currentMode==='manual'?'SESSION':'FLOW';if(isRunning)stopPractice();else draw();}
    function cycleLevel(dir){if(helpActive)return;currentLevel=((currentLevel-1+dir+3)%3)+1;document.getElementById('lcdLevelText').innerText=LEVEL_NAMES[currentLevel-1];if(isRunning)stopPractice();}
    function toggleHint(){if(helpActive)return;showNames=!showNames;document.getElementById('btnHintName').classList.toggle('active',showNames);draw();}
    function toggleAudio(){audioOn=!audioOn;document.getElementById('audioToggle').classList.toggle('active',audioOn);if(audioOn&&!audioCtx)initAudio();}
    function toggleVst(){if(helpActive)return;let mb=document.getElementById('mixerBar');mb.style.display=(mb.style.display==='flex')?'none':'flex';document.getElementById('btnVst').classList.toggle('active');}

    function updateInfoBar(){
        if(helpActive)return;
        if(isRunning){
            let bpm=hitIntervals.length>0?Math.round(60000/(hitIntervals.reduce((a,b)=>a+b)/hitIntervals.length)):0;
            document.getElementById('infoBarText').innerHTML=`BPM: <span style="color:var(--oled-text)">${bpm}</span> &nbsp;&nbsp;&nbsp; MISTAKES: <span style="color:#ff4444">${mistakes}</span> &nbsp;&nbsp;&nbsp; NOTE: <span style="color:var(--oled-text)">${currentStep+1} / 16</span>`;
            document.getElementById('lcdStats').innerText=`${bpm} / ${mistakes}`;
        } else {
            document.getElementById('infoBarText').innerText='SYSTEM READY — SELECT MODE AND PRESS START';
            document.getElementById('lcdStats').innerText='0 / 0';
        }
    }

    function buildSequence(){
        seq=[];
        for(let i=0;i<16;i++){
            let clef='treble';
            if(activeRH&&activeLH)clef=Math.random()>0.5?'treble':'bass';
            else if(activeLH&&!activeRH)clef='bass';
            let pool=clef==='treble'?TREBLE_NOTES:BASS_NOTES;
            let base=pool[Math.floor(Math.random()*pool.length)];
            let s='',m=base.m;
            if(currentLevel===3&&Math.random()>0.7){if(Math.random()>0.5){s='♯';m++;}else{s='♭';m--;}}
            let dur=1;
            if(currentLevel>=2){dur=Math.random()<0.4?1:2;}
            seq.push({clef,off:base.off,s,m,dur,n:base.n,isError:false});
        }
        currentStep=0;mistakes=0;hitIntervals=[];lastHitTime=0;updateInfoBar();
    }

    async function initAudio(){
        if(audioCtx)return;
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        let len=audioCtx.sampleRate*2.5;
        let impulse=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
        for(let i=0;i<len;i++){let d=Math.pow(1-i/len,3);impulse.getChannelData(0)[i]=(Math.random()*2-1)*d;impulse.getChannelData(1)[i]=(Math.random()*2-1)*d;}
        masterReverb=audioCtx.createConvolver();masterReverb.buffer=impulse;
        reverbGain=audioCtx.createGain();reverbGain.gain.value=parseFloat(document.getElementById('vst_rev').value)||0;
        masterReverb.connect(reverbGain).connect(audioCtx.destination);
        const s={21:'A0',36:'C2',48:'C3',60:'C4',72:'C5',84:'C6'};
        for(let k in s){try{const r=await fetch(`https://tonejs.github.io/audio/salamander/${s[k]}.mp3`);sampleBuffers[k]=await audioCtx.decodeAudioData(await r.arrayBuffer());}catch(e){}}
        if(navigator.requestMIDIAccess){navigator.requestMIDIAccess().then(m=>{m.inputs.forEach(input=>input.onmidimessage=(msg)=>{const cmd=msg.data[0]>>4,n=msg.data[1],v=msg.data[2];if(cmd===9&&v>0){document.getElementById(`k-${n}`)?.classList.add('pressed');handleNoteOn(n,v);}else if(cmd===8||(cmd===9&&v===0)){document.getElementById(`k-${n}`)?.classList.remove('pressed');handleNoteOff(n);}});}).catch(()=>{});}
    }

    function playTone(note,vel){
        if(!audioCtx||!audioOn||Object.keys(sampleBuffers).length===0)return;
        if(activeNodes[note]){try{activeNodes[note].source.stop();}catch(e){}delete activeNodes[note];}
        const source=audioCtx.createBufferSource();let closest=36,minDiff=999;
        for(let b in sampleBuffers){let d=Math.abs(note-b);if(d<minDiff){minDiff=d;closest=b;}}
        source.buffer=sampleBuffers[closest];source.playbackRate.value=Math.pow(2,(note-closest)/12);
        const gain=audioCtx.createGain();const panner=audioCtx.createStereoPanner();
        let wide=parseFloat(document.getElementById('vst_wide').value)||0;
        panner.pan.setValueAtTime(Math.max(-1,Math.min(1,((note-60)/30)*wide)),audioCtx.currentTime);
        let atk=parseFloat(document.getElementById('vst_a').value)||0.01;
        let dec=parseFloat(document.getElementById('vst_e').value)||10;
        let velo=parseFloat(document.getElementById('vst_d').value)||1;
        if(reverbGain)reverbGain.gain.value=parseFloat(document.getElementById('vst_rev').value)||0;
        gain.gain.setValueAtTime(0,audioCtx.currentTime);
        if(atk>0.05)gain.gain.linearRampToValueAtTime((vel/127)*velo,audioCtx.currentTime+atk);
        else gain.gain.setValueAtTime((vel/127)*velo,audioCtx.currentTime);
        if(dec<9.5)gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dec);
        source.connect(gain);gain.connect(panner);panner.connect(audioCtx.destination);gain.connect(masterReverb);
        source.start();activeNodes[note]={source,gain};
    }

    function handleNoteOff(midi){
        activeMidiNotes.delete(midi);
        if(!activeNodes[midi])return;
        let rel=parseFloat(document.getElementById('vst_r').value)||0.8;
        const g=activeNodes[midi].gain;g.gain.cancelScheduledValues(audioCtx.currentTime);g.gain.setValueAtTime(g.gain.value,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+rel);activeNodes[midi].source.stop(audioCtx.currentTime+rel+0.1);delete activeNodes[midi];
    }

    function handleNoteOn(midi,vel=100){
        activeMidiNotes.add(midi);playTone(midi,vel);
        if(!isRunning||seq.length===0||currentStep>=16)return;
        let target=seq[currentStep];
        if(midi===target.m){
            target.isError=false;
            let now=performance.now();if(lastHitTime>0)hitIntervals.push(now-lastHitTime);lastHitTime=now;
            currentStep++;updateInfoBar();
            if(currentStep>=16){if(currentMode==='auto'){setTimeout(()=>{buildSequence();draw();},400);}else{setTimeout(()=>{showResults();},400);}}
        } else {target.isError=true;mistakes++;updateInfoBar();}
        draw();
    }

    function handleMainButton(){
        if(!isRunning){initAudio();buildSequence();isRunning=true;document.getElementById('btnStart').innerText='STOP';document.getElementById('btnStart').classList.add('running');updateInfoBar();draw();}
        else stopPractice();
    }
    function stopPractice(){isRunning=false;currentStep=0;document.getElementById('btnStart').innerText='START';document.getElementById('btnStart').classList.remove('running');updateInfoBar();draw();}
    function showResults(){
        let avgBpm=hitIntervals.length?Math.round(60000/(hitIntervals.reduce((a,b)=>a+b)/hitIntervals.length)):0;
        let accuracy=Math.round(Math.max(0,((16-mistakes)/16)*100));
        document.getElementById('modalBpm').innerText=avgBpm+' BPM';
        document.getElementById('modalUni').innerText=accuracy+'%';
        document.getElementById('modalMistakes').innerText=mistakes;
        document.getElementById('resultModal').style.display='flex';
        isRunning=false;document.getElementById('btnStart').innerText='START';document.getElementById('btnStart').classList.remove('running');
    }
    function closeModal(){document.getElementById('resultModal').style.display='none';handleMainButton();}

    const canvas=document.getElementById('staffCanvas'),ctx=canvas.getContext('2d');
    function drawLedgers(x,offset,baseLineY,spacing,color){
        ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.shadowBlur=0;
        if(offset<=-6)for(let p=-6;p>=offset;p-=2){let py=baseLineY-(p*spacing);ctx.beginPath();ctx.moveTo(x-22,py);ctx.lineTo(x+22,py);ctx.stroke();}
        if(offset>=6)for(let p=6;p<=offset;p+=2){let py=baseLineY-(p*spacing);ctx.beginPath();ctx.moveTo(x-22,py);ctx.lineTo(x+22,py);ctx.stroke();}
    }
    function draw(){
        ctx.clearRect(0,0,2450,480);if(!seq.length)return;
        const activeColor='#b3e6ff',inactiveColor='rgba(179,230,255,0.3)',errorColor='#ff4444',ledgerColor='rgba(179,230,255,0.2)';
        const startX=180,endX=2380,xSpacing=(endX-startX)/15;
        seq.forEach((item,i)=>{
            let color;
            if(isRunning&&i===currentStep)color=item.isError?errorColor:activeColor;
            else if(isRunning&&i<currentStep)color=inactiveColor;
            else if(!isRunning&&i===0)color=activeColor;
            else color=inactiveColor;
            let x=startX+i*xSpacing;
            let baseLineY=item.clef==='treble'?TREBLE_BASE_Y:BASS_BASE_Y;
            let spacing=item.clef==='treble'?TREBLE_SP_Y:BASS_SP_Y;
            let noteY=baseLineY-(item.off*spacing);
            drawLedgers(x,item.off,baseLineY,spacing,ledgerColor);
            ctx.fillStyle=color;ctx.shadowBlur=0;
            if(item.s!==''){ctx.font=item.s==='♭'?'46px Arial':'34px Arial';ctx.textAlign='right';ctx.textBaseline='alphabetic';ctx.fillText(item.s,x-22,noteY+(item.s==='♭'?8:14));}
            if(item.dur===2){ctx.beginPath();ctx.lineWidth=2.5;ctx.strokeStyle=color;let up=item.off<0;if(up){ctx.moveTo(x+13,noteY+2);ctx.lineTo(x+13,noteY-66);}else{ctx.moveTo(x-13,noteY-2);ctx.lineTo(x-13,noteY+66);}ctx.stroke();}
            ctx.beginPath();ctx.ellipse(x,noteY,14,10,-Math.PI/10,0,2*Math.PI);
            if(item.dur===1){ctx.fillStyle='#000';ctx.fill();ctx.lineWidth=3.5;ctx.strokeStyle=color;ctx.stroke();}
            else{ctx.fillStyle=color;ctx.fill();}
            if(showNames){ctx.fillStyle=color;ctx.font='bold 18px Inter';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(item.n+(item.s||''),x+28,noteY);}
        });
        ctx.globalAlpha=1.0;
    }

    window.onload=()=>{
        const wrap=document.getElementById('hb-wrap');const whites=[0,2,4,5,7,9,11];let wIdx=0;
        for(let m=21;m<=108;m++){const k=document.createElement('div');const isW=whites.includes(m%12);k.id=`k-${m}`;k.className=`key-glow ${isW?'white-glow':'black-glow'}`;if(isW){k.style.left=(wIdx*1.92307)+'%';k.style.width='1.92307%';k.style.height='100%';wIdx++;}else{k.style.left=((wIdx*1.92307)-0.6)+'%';k.style.width='1.2%';k.style.height='65%';k.style.zIndex='200';}k.onmousedown=(e)=>{e.preventDefault();k.classList.add('pressed');handleNoteOn(m,100);};k.onmouseup=()=>{k.classList.remove('pressed');handleNoteOff(m);};k.onmouseleave=()=>{k.classList.remove('pressed');handleNoteOff(m);};wrap.appendChild(k);}
        buildSequence();draw();
        window.addEventListener('pointerdown',()=>initAudio(),{once:true});
    };
</script>
</body>
