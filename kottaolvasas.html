<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Akíra Piano Academy | Sight Read</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Hardver alapok */
            --rack-bg: #1a1a1d; 
            --rack-border: #2a2a2d;
            --btn-dark: #101012; 
            --btn-border: #050505;
            --text-dim: #777; 
            
            /* TÉMA VÁLTOZÓK (Alap: Az eredeti, gyönyörű GREEN) */
            --theme-r: 170; --theme-g: 204; --theme-b: 170;
            --lcd-bg-dark: #222522; /* Visszaállítva a derengő zöldre! */
            --lcd-label-color: #667766; /* Tompa, nem vakító feliratszín */
            
            --led-play: #33ff33; 
            --led-sys: #00AACC;
        }

        /* ── TÉMÁK (THEMES) ── */
        body.theme-cyan {
            --theme-r: 136; --theme-g: 221; --theme-b: 255;
            --lcd-bg-dark: #182226; --lcd-label-color: #557788; --led-play: #00ffff;
        }
        body.theme-amber {
            --theme-r: 255; --theme-g: 204; --theme-b: 102;
            --lcd-bg-dark: #262218; --lcd-label-color: #887755; --led-play: #ffcc00;
        }
        body.theme-orange {
            --theme-r: 255; --theme-g: 136; --theme-b: 68;
            --lcd-bg-dark: #261b15; --lcd-label-color: #886655; --led-play: #ff6600;
        }
        body.theme-mono {
            --theme-r: 221; --theme-g: 221; --theme-b: 221;
            --lcd-bg-dark: #222222; --lcd-label-color: #777777; --led-play: #ffffff;
        }
        
        body { 
            font-family: 'Inter', sans-serif; background-color: #050508;
            background-image: radial-gradient(circle at 50% 50%, #151518 0%, #050508 100%);
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; color: #fff;
            
            /* MOBIL OPTIMALIZÁLÁS */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .lcd-text-color { color: rgb(var(--theme-r), var(--theme-g), var(--theme-b)); }
        .lcd-shadow-effect { text-shadow: 0 0 6px rgba(var(--theme-r), var(--theme-g), var(--theme-b), 0.6); }
        .lcd-box-shadow { box-shadow: 0 0 6px rgba(var(--theme-r), var(--theme-g), var(--theme-b), 0.6); }
        .led-color { background-color: rgb(var(--theme-r), var(--theme-g), var(--theme-b)); box-shadow: 0 0 10px rgb(var(--theme-r), var(--theme-g), var(--theme-b)); }

        /* ── FEJLÉC ── */
        .top-nav {
            width: 100%; background: #0a0a0c; border-bottom: 2px solid #000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); display: flex; justify-content: center; padding: 12px 0; z-index: 1000;
        }
        .nav-content { width: 100%; max-width: 2450px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-svg { height: 40px; cursor: pointer; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }

        .main-menu { display: flex; gap: 15px; flex: 1; justify-content: center; margin: 0 40px;}
        .sys-menu { display: flex; gap: 10px; flex: 0 0 auto; border-left: 2px solid #1a1a1d; padding-left: 20px; }
        
        .nav-btn { 
            width: 120px; height: 38px; background-color: var(--btn-dark); color: var(--text-dim);
            border: 1px solid var(--btn-border); border-radius: 4px; cursor: pointer;
            font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s; display: flex; align-items: center; justify-content: center; text-decoration: none;
            position: relative; box-shadow: 0 3px 0 #000, 0 4px 6px rgba(0,0,0,0.5);
        }
        .nav-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000, 0 1px 2px rgba(0,0,0,0.4); }
        .nav-btn.active { color: var(--text-dim); background-color: #121214; }
        .main-menu .nav-btn.active::after {
            content: ''; position: absolute; top: 6px; right: 8px; width: 6px; height: 6px; border-radius: 50%;
            background-color: rgb(var(--theme-r), var(--theme-g), var(--theme-b)); 
            box-shadow: 0 0 10px rgb(var(--theme-r), var(--theme-g), var(--theme-b));
        }
        .sys-menu .nav-btn.active::after {
            content: ''; position: absolute; top: 6px; right: 8px; width: 6px; height: 6px; border-radius: 50%;
            background-color: var(--led-sys); box-shadow: 0 0 10px var(--led-sys);
        }
        .lang-btn { width: 45px !important; color: #fff !important; }

        /* ── A STÚDIÓ RACK PANEL ── */
        .ui-container { width: 100%; max-width: 2450px; margin-top: 20px; z-index: 100; align-self: center; padding: 0 20px; box-sizing: border-box;}
        
        .master-dashboard { 
            display: flex; justify-content: space-between; align-items: center; gap: 30px; flex-wrap: wrap;
            background-color: var(--rack-bg);
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 3px; border: 2px solid var(--rack-border);
            border-radius: 8px; padding: 25px 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05);
            position: relative;
        }
        
        .master-dashboard::before, .master-dashboard::after {
            content: ''; position: absolute; width: 10px; height: 10px; background: #222; border-radius: 50%; border: 1px solid #000; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .master-dashboard::before { top: 12px; left: 12px; }
        .master-dashboard::after { top: 12px; right: 12px; }

        .control-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; }

        /* HARDVER GOMBOK */
        .hardware-btn { 
            width: 140px; height: 42px; background-color: var(--btn-dark); color: var(--text-dim);
            border: 1px solid var(--btn-border); border-radius: 4px; cursor: pointer;
            font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.1s; display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 3px 0 #000, 0 5px 6px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .hardware-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000, 0 2px 3px rgba(0,0,0,0.4); }
        .hardware-btn.active { color: var(--text-dim); background-color: #121214; }
        .hardware-btn.active::after {
            content: ''; position: absolute; top: 6px; right: 8px; width: 6px; height: 6px; border-radius: 50%;
            background-color: rgb(var(--theme-r), var(--theme-g), var(--theme-b)); 
            box-shadow: 0 0 10px rgb(var(--theme-r), var(--theme-g), var(--theme-b));
        }

        /* START GOMB */
        #btnStart { 
            width: 150px; height: 50px; background-color: var(--btn-dark); color: var(--text-dim); 
            border: 1px solid var(--btn-border); border-radius: 4px; 
            font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 3px 0 #000, 0 5px 8px rgba(0,0,0,0.4);
            flex-shrink: 0; position: relative; margin-left: 10px;
        }
        #btnStart:active { transform: translateY(3px); box-shadow: 0 0 0 #000; }
        #btnStart.running::after {
            content: ''; position: absolute; top: 8px; right: 10px; width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--led-play); box-shadow: 0 0 12px var(--led-play);
        }

        /* ── KÖZÖS LCD STÍLUSOK ── */
        .lcd-base {
            background-color: var(--lcd-bg-dark); border: 3px solid #080808; 
            border-radius: 2px; box-sizing: border-box; box-shadow: inset 0 3px 8px rgba(0,0,0,0.9); 
            position: relative; overflow: hidden;
        }
        .lcd-base::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGBkgAsgC6ALoAtgAgC5XwYCh04S9AAAAABJRU5ErkJggg==');
            opacity: 0.2; pointer-events: none; z-index: 20;
        }
        .lcd-label { font-size: 9px; color: var(--lcd-label-color); font-family: 'Inter', sans-serif; text-transform: uppercase; font-weight: 800; letter-spacing: 2px; margin-bottom: 2px; z-index: 2; position: relative; }
        .lcd-text { font-family: 'Share Tech Mono', monospace; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; z-index: 2; position: relative; }

        /* OSZTOTT LCD (MODE / LEVEL) */
        .lcd-display-module { display: flex; align-items: center; gap: 12px; }
        .lcd-mode-level { width: 260px; height: 50px; display: flex; flex-direction: row; align-items: stretch; }
        .nav-disk-btn {
            width: 32px; height: 32px; background: #222; border: 2px solid #111; border-radius: 50%;
            color: #888; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 2px rgba(0,0,0,0.6); transition: 0.1s; flex-shrink: 0;
        }
        .nav-disk-btn:active { transform: translateY(2px); box-shadow: 0 0 1px rgba(0,0,0,0.6); }
        .lcd-half { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; position: relative; }
        .lcd-divider { width: 1px; background: rgba(255,255,255,0.15); margin: 5px 0; z-index: 2; position: relative; }

        /* ── INFO BAR ── */
        .info-bar { 
            width: 100%; margin: 15px auto 0 auto; height: 45px;
            display: none; align-items: center; gap: 15px; padding: 0 25px;
        }
        .info-bar-title { color: var(--lcd-label-color); font-family: 'Inter', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; min-width: 90px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px; z-index: 2; position: relative;}
        .info-bar-text { flex: 1; transition: text-align 0.2s; font-family: 'Share Tech Mono', monospace; font-size: 15px; text-transform: uppercase; z-index: 2; position: relative;}

        /* ── VÍZSZINTES BEÁLLÍTÓ LCD SÁVOK (MIXER ÉS VISUAL) ── */
        .settings-bar { 
            width: 100%; margin: 15px auto 0 auto; height: 75px;
            display: none; align-items: center; justify-content: space-around; padding: 0 25px; flex-wrap: wrap;
        }
        
        .settings-control { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 180px; z-index: 2; position: relative; }
        
        .settings-control label { 
            font-size: 11px; color: var(--lcd-label-color); font-family: 'Share Tech Mono', monospace; 
            cursor: pointer; text-shadow: none; letter-spacing: 1px; transition: color 0.1s;
        }
        .settings-control label:hover { color: #fff; }
        .settings-control label:active { transform: translateY(1px); }
        
        .settings-control input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 8px;
            background: #111; border: 1px solid #222; border-radius: 4px;
            outline: none; cursor: pointer; box-shadow: inset 0 1px 4px rgba(0,0,0,0.9);
        }
        .settings-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 24px;
            background: #888; border: 1px solid #111; border-radius: 2px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.7); cursor: grab;
            background-image: linear-gradient(to right, transparent 45%, #222 45%, #222 55%, transparent 55%);
            margin-top: -9px;
        }
        .settings-control input[type="range"]:active::-webkit-slider-thumb { cursor: grabbing; background: #aaa; }

        .theme-btn {
            width: 160px; height: 34px; background: #111; border: 2px solid #222; border-radius: 4px;
            font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: transform 0.1s;
        }
        .theme-btn:active { transform: translateY(2px); }

        body.help-mode-active { cursor: help; }
        body.help-mode-active * { cursor: help !important; }

        /* ── MODAL KIÉRTÉKELÉS ── */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--rack-bg); padding: 40px; border-radius: 8px; border: 2px solid var(--rack-border); text-align: center; width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .modal-highlight { font-family: 'Share Tech Mono', monospace; font-size: 36px; color: rgb(var(--theme-r), var(--theme-g), var(--theme-b)); }

        /* ── KOTTA LCD KIJELZŐ ── */
        .granite-base { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: auto; }
        
        .sheet-viewport { 
            width: 100%; max-width: 2450px; aspect-ratio: 2450 / 480; 
            margin-bottom: 30px; border: 4px solid #111; border-radius: 8px; position: relative; overflow: hidden; 
            box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 10px 30px rgba(0,0,0,0.8);
        }
        .sheet-viewport::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGBkgAsgC6ALoAtgAgC5XwYCh04S9AAAAABJRU5ErkJggg==');
            opacity: 0.2; pointer-events: none; z-index: 20;
        }
        
        .sheet-image { width: 100%; height: 100%; object-fit: contain; z-index: 1; position: absolute; pointer-events: none; }
        #staffCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        .piano-wrapper { width: 100%; max-width: 2560px; position: relative; aspect-ratio: 2500/284; background: #000; overflow: hidden; box-shadow: 0 -10px 50px rgba(0,0,0,0.9); border-top: 4px solid #111; }
        .piano-img { width: 100%; height: 100%; display: block; pointer-events: none; filter: grayscale(100%); }
        .hitbox-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        .key-glow { position: absolute; top: 0; cursor: pointer; }
        .key-glow.pressed::after { content: ''; position: absolute; pointer-events: none; z-index: 150; top: 0; left: 0; width: 100%; height: 100%; border-radius: 0 0 4px 4px; background: rgba(0, 0, 0, 0.11); box-shadow: inset 6px 0 10px -2px rgba(0,0,0,0.6); }
        .black-glow.pressed::after { top: 3px; left: 3px; width: calc(100% - 6px); height: calc(100% - 13px); border-radius: 3px; background: rgba(255, 255, 255, 0.15); box-shadow: inset 0 -10px 15px rgba(255, 255, 255, 0.3); z-index: 40; }
        
        .font-loader { position: absolute; left: -9999px; visibility: hidden; font-family: 'Share Tech Mono'; }

        @media (max-width: 1400px) {
            .master-dashboard { justify-content: center; gap: 20px; }
            .nav-content { flex-direction: column; gap: 15px; padding: 15px; }
            .main-menu, .sys-menu { flex-wrap: wrap; justify-content: center; border: none; padding: 0;}
            .settings-bar { flex-wrap: wrap; height: auto; padding: 15px; gap: 15px;}
        }
    </style>
</head>

            </div>
            <div class="settings-control" data-help="DECAY: CONTROLS HOW QUICKLY THE SOUND DROPS TO THE SUSTAIN LEVEL.">
                <label class="lcd-text-color" onclick="document.getElementById('vst_e').value = 5.0;">Decay</label>
                <input type="range" id="vst_e" min="1" max="10" step="0.1" value="5.0">
            </div>
            <div class="settings-control" data-help="RELEASE: CONTROLS HOW QUICKLY THE SOUND FADES AFTER THE KEY IS RELEASED.">
                <label class="lcd-text-color" onclick="document.getElementById('vst_r').value = 0.8;">Release</label>
                <input type="range" id="vst_r" min="0.1" max="3" step="0.1" value="0.8">
            </div>
            <div class="settings-control" data-help="VELOCITY: OVERALL OUTPUT VOLUME OR STRENGTH OF THE SYNTHESIZER.">
                <label class="lcd-text-color" onclick="document.getElementById('vst_d').value = 1.0;">Velocity</label>
                <input type="range" id="vst_d" min="0.1" max="2" step="0.1" value="1.0">
            </div>
            <div class="settings-control" data-help="REVERB: CONTROLS THE AMOUNT OF ROOM ECHO/REVERBERATION.">
                <label class="lcd-text-color notranslate" id="lblRev" onclick="document.getElementById('vst_rev').value = 0; if(reverbGain) reverbGain.gain.value = 0;">Reverb</label>
                <input type="range" id="vst_rev" min="0" max="1" step="0.05" value="0">
            </div>
            <div class="settings-control" data-help="STEREO WIDE: CONTROLS THE STEREO SPREAD OF THE KEYBOARD.">
                <label class="lcd-text-color notranslate" id="lblWide" onclick="document.getElementById('vst_wide').value = 0;">Stereo Wide</label>
                <input type="range" id="vst_wide" min="0" max="1" step="0.05" value="0">
            </div>
        </div>

        <div id="visualBar" class="lcd-base settings-bar">
            <div class="settings-control" data-help="THEME SELECTOR: CHANGES THE GLOBAL COLOR SCHEME OF ALL LCD SCREENS.">
                <button class="theme-btn lcd-text-color lcd-box-shadow notranslate" onclick="cycleTheme()" id="btnTheme">THEME: GREEN</button>
            </div>
            
            <div style="width:1px; height: 40px; background: rgba(255, 255, 255, 0.1); z-index:2;"></div>

            <div class="settings-control" data-help="BACKLIGHT: INVERTS AND ILLUMINATES THE SHEET MUSIC DISPLAY.">
                <label class="lcd-text-color notranslate" id="lblBack" onclick="document.getElementById('vis_backlight').value = 0; draw();">Backlight</label>
                <input type="range" id="vis_backlight" min="0" max="1" step="0.05" value="0" oninput="draw()">
            </div>
            <div class="settings-control" data-help="STAFF LINES: ADJUST THE INTENSITY OF THE MUSICAL STAFF FROM BLACK TO BRIGHT.">
                <label class="lcd-text-color notranslate" id="lblStaff" onclick="document.getElementById('vis_staff').value = 0.25; draw();">Staff Lines</label>
                <input type="range" id="vis_staff" min="0" max="1" step="0.05" value="0.25" oninput="draw()">
            </div>
            <div class="settings-control" data-help="NOTES CONTRAST: ADJUST THE BRIGHTNESS/OPACITY OF THE ACTIVE SHEET MUSIC NOTES.">
                <label class="lcd-text-color notranslate" id="lblNotes" onclick="document.getElementById('vis_notes').value = 1.0; draw();">Notes Intensity</label>
                <input type="range" id="vis_notes" min="0.1" max="1.0" step="0.05" value="1.0" oninput="draw()">
            </div>
        </div>

    </div>

    <div class="granite-base">
        <div id="sheetViewport" class="lcd-base sheet-viewport">
            <img src="kottavonal_feher.png" class="sheet-image" id="sheetBg">
            <canvas id="staffCanvas" width="2450" height="480"></canvas>
        </div>
        <div class="piano-wrapper">
            <img src="grandpiano-keys.png" class="piano-img">
            <div id="hb-wrap" class="hitbox-layer"></div>
        </div>
    </div>

<script>
    // --- NYELVVÁLTÓ LOGIKA ---
    let currentLang = 'EN';
    const TRANSLATIONS = {
        EN: { m_ear: "Ear Train", m_sight: "Sight Read", m_chords: "Chords", m_scales: "Scales", m_hanon: "Hanon", m_rhythm: "Rhythm", btnVisual: "Visual", btnHelp: "Help", lblMode: "Mode", lblLevel: "Level", lblInfo: "INFO", lblRev: "Reverb", lblWide: "Stereo Wide", lblBack: "Backlight", lblStaff: "Staff Lines", lblNotes: "Notes Intensity", modalTitle: "Session Complete", lblSpeed: "SPEED", lblAccu: "ACCURACY", btnContinue: "CONTINUE" },
        HU: { m_ear: "Hallás", m_sight: "Kottaolvasás", m_chords: "Akkordok", m_scales: "Skálák", m_hanon: "Hanon", m_rhythm: "Ritmus", btnVisual: "Vizuális", btnHelp: "Súgó", lblMode: "Mód", lblLevel: "Szint", lblInfo: "INFÓ", lblRev: "Zengés", lblWide: "Sztereó", lblBack: "Háttérfény", lblStaff: "Kottavonal", lblNotes: "Fényerő", modalTitle: "Gyakorlat Vége", lblSpeed: "SEBESSÉG", lblAccu: "PONTOSSÁG", btnContinue: "FOLYTATÁS" }
    };

    function toggleLang() {
        currentLang = currentLang === 'EN' ? 'HU' : 'EN';
        document.getElementById('btnLang').innerText = currentLang;
        const lang = TRANSLATIONS[currentLang];
        for (let id in lang) { if(document.getElementById(id)) document.getElementById(id).innerText = lang[id]; }
        updateLCD();
    }

    // --- KOTTAOLVASÁS SPECIFIKUS MATEK ÉS TÖMBÖK ---
    const TREBLE_NOTES = [
        {off: -6, m: 60, n: 'C4'}, {off: -5, m: 62, n: 'D4'}, {off: -4, m: 64, n: 'E4'}, 
        {off: -3, m: 65, n: 'F4'}, {off: -2, m: 67, n: 'G4'}, {off: -1, m: 69, n: 'A4'}, 
        {off: 0, m: 71, n: 'H4'}, {off: 1, m: 72, n: 'C5'}, {off: 2, m: 74, n: 'D5'}, 
        {off: 3, m: 76, n: 'E5'}, {off: 4, m: 77, n: 'F5'}, {off: 5, m: 79, n: 'G5'}
    ];
    const BASS_NOTES = [
        {off: -5, m: 41, n: 'F2'}, {off: -4, m: 43, n: 'G2'}, {off: -3, m: 45, n: 'A2'}, 
        {off: -2, m: 47, n: 'H2'}, {off: -1, m: 48, n: 'C3'}, {off: 0, m: 50, n: 'D3'}, 
        {off: 1, m: 52, n: 'E3'}, {off: 2, m: 53, n: 'F3'}, {off: 3, m: 55, n: 'G3'}, 
        {off: 4, m: 57, n: 'A3'}, {off: 5, m: 59, n: 'H3'}, {off: 6, m: 60, n: 'C4'}
    ];

    const TREBLE_BASE_Y = 141.5; const TREBLE_SP_Y = 11.14;
    const BASS_BASE_Y = 376.16; const BASS_SP_Y = 10.71;

    let isRunning = false, showNames = false, helpActive = false, audioOn = true;
    let visualActive = false, mixerActive = false;
    let activeRH = true, activeLH = true;
    
    let currentMode = 'manual'; 
    let currentLevel = 1; 

    const THEMES = ['green', 'cyan', 'amber', 'orange', 'mono'];
    let currentThemeIdx = 0;

    let seq = [], currentStep = 0, activeMidiNotes = new Set();
    let audioCtx, sampleBuffers = {}, activeNodes = {};
    let masterReverb, reverbGain;
    let mistakes = 0, hitIntervals = [], lastHitTime = 0;

    function cycleTheme() {
        if (helpActive) return;
        currentThemeIdx = (currentThemeIdx + 1) % THEMES.length;
        document.body.className = `theme-${THEMES[currentThemeIdx]}`;
        document.getElementById('btnTheme').innerText = `THEME: ${THEMES[currentThemeIdx].toUpperCase()}`;
        draw();
    }

    function updateLCD() {
        const mNames = currentLang === 'EN' ? {manual:'SESSION', auto:'FLOW'} : {manual:'VIZSGA', auto:'FOLYAMAT'};
        const lNames = currentLang === 'EN' ? {1:'DIATONIC', 2:'RHYTHM', 3:'CHROMATIC'} : {1:'DIATONIKUS', 2:'RITMUS', 3:'KROMATIKUS'};
        document.getElementById('lcdModeText').innerText = mNames[currentMode];
        document.getElementById('lcdLevelText').innerText = lNames[currentLevel];
    }

    function updateStats() {
        if (!isRunning) return;
        let currentBpm = 0;
        if (hitIntervals.length > 0) {
            let avg = hitIntervals.reduce((a,b)=>a+b) / hitIntervals.length;
            currentBpm = Math.round(60000 / avg);
        }
        const infoBar = document.getElementById('infoBar');
        const infoBarText = document.getElementById('infoBarText');
        if (!helpActive) {
            infoBar.style.display = 'flex';
            infoBarText.style.textAlign = 'center';
            let hibaszoveg = currentLang === 'EN' ? 'MISTAKES' : 'HIBÁK';
            infoBarText.innerHTML = `BPM: <span class="lcd-text-color">${currentBpm}</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${hibaszoveg}: <span style="color:#ff4444">${mistakes}</span>`;
        }
    }

    document.addEventListener('fullscreenchange', () => {
        const isFull = !!document.fullscreenElement;
        document.getElementById('btnFullscreen').classList.toggle('active', isFull);
    });

    function toggleFullScreen() {
        if (helpActive) return;
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => console.log(err));
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    document.addEventListener('click', (e) => {
        if (e.target.closest('#btnHelp')) return; 
        if (document.body.classList.contains('help-mode-active')) {
            e.preventDefault(); e.stopPropagation();
            const target = e.target.closest('[data-help]');
            if (target) {
                const infoBarText = document.getElementById('infoBarText');
                infoBarText.innerHTML = target.dataset.help;
                
                const rect = target.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                if (centerX < window.innerWidth * 0.35) infoBarText.style.textAlign = 'left';
                else if (centerX > window.innerWidth * 0.65) infoBarText.style.textAlign = 'right';
                else infoBarText.style.textAlign = 'center';
            }
        }
    }, true);

    function toggleHelp() { 
        helpActive = !helpActive; 
        const btnHelp = document.getElementById('btnHelp');
        btnHelp.classList.toggle('active', helpActive); 
        const infoBar = document.getElementById('infoBar');
        
        if (helpActive) {
            if(visualActive) toggleVisual();
            if(mixerActive) toggleVst();
            document.body.classList.add('help-mode-active');
            document.getElementById('infoBarText').style.textAlign = 'right';
            document.getElementById('infoBarText').innerHTML = btnHelp.dataset.help;
            infoBar.style.display = 'flex';
        } else {
            document.body.classList.remove('help-mode-active');
            if (isRunning) updateStats(); else infoBar.style.display = 'none';
        }
    }

    function toggleVisual() {
        if (helpActive) return;
        visualActive = !visualActive;
        document.getElementById('btnVisual').classList.toggle('active', visualActive);
        if (visualActive) {
            if(mixerActive) toggleVst();
            document.getElementById('visualBar').style.display = 'flex';
        } else {
            document.getElementById('visualBar').style.display = 'none';
        }
    }

    function toggleVst() { 
        if (helpActive) return; 
        mixerActive = !mixerActive;
        document.getElementById('btnVst').classList.toggle('active', mixerActive);
        if (mixerActive) {
            if(visualActive) toggleVisual();
            document.getElementById('mixerBar').style.display = 'flex';
        } else {
            document.getElementById('mixerBar').style.display = 'none';
        }
    }

    function toggleHand(h) {
        if (helpActive) return;
        if(h === 'RH') activeRH = !activeRH; else activeLH = !activeLH;
        if(!activeRH && !activeLH) { activeRH = true; activeLH = true; }
        document.getElementById('handRH').classList.toggle('active', activeRH); 
        document.getElementById('handLH').classList.toggle('active', activeLH);
        if(isRunning) stopPractice();
    }

    function toggleMode() {
        if (helpActive) return;
        currentMode = (currentMode === 'manual') ? 'auto' : 'manual';
        updateLCD();
        if(isRunning) stopPractice(); else draw();
    }

    function toggleLevel() {
        if (helpActive) return;
        currentLevel = currentLevel === 1 ? 2 : (currentLevel === 2 ? 3 : 1);
        updateLCD();
        if(isRunning) stopPractice();
    }

    function toggleHint() { if (helpActive) return; showNames = !showNames; document.getElementById('btnHintName').classList.toggle('active', showNames); draw(); }
    function toggleAudio() { if (helpActive) return; audioOn = !audioOn; document.getElementById('audioToggle').classList.toggle('active', audioOn); if(audioOn && !audioCtx) initAudio(); }

    function buildSequence() {
        seq = [];
        for (let i = 0; i < 16; i++) {
            let clef = 'treble';
            if (activeRH && activeLH) clef = Math.random() > 0.5 ? 'treble' : 'bass';
            else if (activeLH && !activeRH) clef = 'bass';

            let pool = clef === 'treble' ? TREBLE_NOTES : BASS_NOTES;
            let baseNote = pool[Math.floor(Math.random() * pool.length)];
            
            let s = '', m = baseNote.m;
            // 3. Szint (CHROMATIC): Keresztek és Bék bevonása
            if (currentLevel === 3 && Math.random() > 0.7) {
                if (Math.random() > 0.5) { s = '♯'; m++; }
                else { s = '♭'; m--; }
            }
            
            // 2. Szinttől (RHYTHM): Ritmusok (negyed hangok is feltűnnek szárral)
            let dur = 1;
            if (currentLevel >= 2) {
                let d = Math.random();
                dur = d < 0.4 ? 1 : 2; // 1 = Egész (üres), 2 = Száras (kitöltött)
            }
            
            seq.push({ clef, off: baseNote.off, s, m, dur, n: baseNote.n, isError: false });
        }
        currentStep = 0;
        mistakes = 0;
        hitIntervals = [];
        lastHitTime = 0;
        updateStats();
    }

    async function initAudio() {
        if (audioCtx) return; 
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let len = audioCtx.sampleRate * 2.5; 
        let impulse = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
        for (let i = 0; i < len; i++) {
            let decay = Math.pow(1 - i / len, 3);
            impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * decay;
            impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * decay;
        }
        masterReverb = audioCtx.createConvolver();
        masterReverb.buffer = impulse;
        
        reverbGain = audioCtx.createGain();
        reverbGain.gain.value = parseFloat(document.getElementById('vst_rev').value) || 0;
        masterReverb.connect(reverbGain).connect(audioCtx.destination);

        const samples = {21:'A0', 36:'C2', 48:'C3', 60:'C4', 72:'C5', 84:'C6'};
        for(let k in samples) { try { const r = await fetch(`https://tonejs.github.io/audio/salamander/${samples[k]}.mp3`); sampleBuffers[k] = await audioCtx.decodeAudioData(await r.arrayBuffer()); } catch(e) {} }
        
        try {
            if(navigator.requestMIDIAccess) { 
                const m = await navigator.requestMIDIAccess(); 
                m.inputs.forEach(input => {
                    input.onmidimessage = (msg) => { 
                        const cmd = msg.data[0] >> 4, n = msg.data[1], v = msg.data[2]; 
                        if (cmd === 9 && v > 0) { document.getElementById(`k-${n}`)?.classList.add('pressed'); handleNoteOn(n, v); } 
                        else if (cmd === 8 || (cmd === 9 && v === 0)) { document.getElementById(`k-${n}`)?.classList.remove('pressed'); handleNoteOff(n); } 
                    };
                });
            }
        } catch(e) {}
    }

    function playTone(note, vel) {
        if(!audioCtx || !audioOn || Object.keys(sampleBuffers).length === 0) return;
        if (activeNodes[note]) { try { activeNodes[note].source.stop(); } catch(e){} delete activeNodes[note]; }
        const source = audioCtx.createBufferSource(); let closest = 36, minDiff = 999;
        for(let b in sampleBuffers) { let diff = Math.abs(note-b); if(diff < minDiff){ minDiff=diff; closest=b; } }
        source.buffer = sampleBuffers[closest]; source.playbackRate.value = Math.pow(2, (note-closest)/12);
        
        const gain = audioCtx.createGain(); 
        const panner = audioCtx.createStereoPanner();
        let wideAmount = parseFloat(document.getElementById('vst_wide').value) || 0;
        let notePan = Math.max(-1, Math.min(1, ((note - 60) / 30) * wideAmount));
        panner.pan.setValueAtTime(notePan, audioCtx.currentTime);
        
        let atk = parseFloat(document.getElementById('vst_a').value) || 0.01;
        let dec = parseFloat(document.getElementById('vst_e').value) || 10.0;
        let velo = parseFloat(document.getElementById('vst_d').value) || 1.0;
        
        if(reverbGain) reverbGain.gain.value = parseFloat(document.getElementById('vst_rev').value) || 0;
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime); 
        if (atk > 0.05) { gain.gain.linearRampToValueAtTime((vel/127) * velo, audioCtx.currentTime + atk); } 
        else { gain.gain.setValueAtTime((vel/127) * velo, audioCtx.currentTime); }
        
        if (dec < 9.5) { gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dec); }
        
        source.connect(gain); gain.connect(panner); panner.connect(audioCtx.destination); gain.connect(masterReverb);
        source.start(); activeNodes[note] = { source, gain };
    }

    function handleNoteOff(midi) { 
        activeMidiNotes.delete(midi);
        if (activeNodes[midi]) {
            let rel = parseFloat(document.getElementById('vst_r').value) || 0.8;
            const gainNode = activeNodes[midi].gain; gainNode.gain.cancelScheduledValues(audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + rel); 
            activeNodes[midi].source.stop(audioCtx.currentTime + rel + 0.1); delete activeNodes[midi]; 
        }
    }

    function handleNoteOn(midi, vel = 100) {
        activeMidiNotes.add(midi);
        playTone(midi, vel);
        
        if (!isRunning || seq.length === 0 || currentStep >= 16) return;
        
        let targetNote = seq[currentStep];
        
        if (midi === targetNote.m) {
            targetNote.isError = false;
            
            let now = performance.now();
            if (lastHitTime > 0) { hitIntervals.push(now - lastHitTime); }
            lastHitTime = now;
            
            currentStep++;
            updateStats();
            
            if (currentStep >= 16) {
                if (currentMode === 'auto') {
                    setTimeout(() => { buildSequence(); draw(); }, 400);
                } else {
                    setTimeout(() => { showResults(); }, 400);
                }
            }
        } else {
            targetNote.isError = true;
            mistakes++;
            updateStats();
        }
        draw();
    }

    function handleMainButton() { 
        if (helpActive) return;
        try {
            if(!isRunning) { 
                initAudio(); buildSequence(); isRunning = true; 
                document.getElementById('btnStart').classList.add('running'); draw(); 
            } else stopPractice(); 
        } catch(e) { console.error(e); }
    }
    
    function stopPractice() { 
        isRunning = false; 
        document.getElementById('btnStart').classList.remove('running'); 
        if (!helpActive) document.getElementById('infoBar').style.display = 'none';
        draw(); 
    }

    function showResults() {
        let avgBpm = hitIntervals.length ? Math.round(60000 / (hitIntervals.reduce((a,b)=>a+b)/hitIntervals.length)) : 0;
        let accuracy = Math.round(Math.max(0, ((16-mistakes)/16)*100));
        
        document.getElementById('modalBpm').innerText = avgBpm + " BPM";
        document.getElementById('modalUni').innerText = accuracy + "%";
        
        document.getElementById('resultModal').style.display = 'flex';
        stopPractice();
    }
    
    function closeModal() { 
        document.getElementById('resultModal').style.display = 'none'; 
        handleMainButton(); 
    }

    const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');
    
    function getThemeColor() {
        let rs = getComputedStyle(document.body);
        return { r: parseInt(rs.getPropertyValue('--theme-r')), g: parseInt(rs.getPropertyValue('--theme-g')), b: parseInt(rs.getPropertyValue('--theme-b')) };
    }

    function drawLedgers(x, offset, baseLineY, spacing, color) { 
        ctx.strokeStyle = color; ctx.lineWidth = 2.5; 
        ctx.shadowBlur = 0; // SZIGORÚAN 0 GLOW
        ctx.shadowColor = color; 
        if (offset <= -6) for (let p = -6; p >= offset; p -= 2) { let py = baseLineY - (p * spacing); ctx.beginPath(); ctx.moveTo(x - 22, py); ctx.lineTo(x + 22, py); ctx.stroke(); } 
        if (offset >= 6) for (let p = 6; p <= offset; p += 2) { let py = baseLineY - (p * spacing); ctx.beginPath(); ctx.moveTo(x - 22, py); ctx.stroke(); } 
    }

    function draw() {
        ctx.clearRect(0, 0, 2450, 480); 
        
        // PONTOSAN A MASTER CSS ÉS MATEK!
        let backlight = parseFloat(document.getElementById('vis_backlight').value) || 0;
        let staffOp = parseFloat(document.getElementById('vis_staff').value) || 0.25;
        let notesOp = parseFloat(document.getElementById('vis_notes').value) || 1.0;
        
        let tc = getThemeColor();
        
        let vp = document.getElementById('sheetViewport');
        vp.style.backgroundColor = `rgba(${tc.r}, ${tc.g}, ${tc.b}, ${backlight * 0.6})`;
        
        let sheetImg = document.getElementById('sheetBg');
        sheetImg.style.filter = `invert(${backlight})`;
        sheetImg.style.opacity = staffOp + (backlight * 0.2); 

        if (!seq.length) return;
        
        let noteR = Math.round(tc.r * (1 - backlight) + 10 * backlight);
        let noteG = Math.round(tc.g * (1 - backlight) + 20 * backlight);
        let noteB = Math.round(tc.b * (1 - backlight) + 10 * backlight);
        
        const activeColor = `rgba(${noteR}, ${noteG}, ${noteB}, ${notesOp})`;
        const inactiveColor = `rgba(${noteR}, ${noteG}, ${noteB}, ${notesOp * 0.3})`;
        const errorColor = backlight > 0.5 ? "#aa0000" : "#ff4444";
        
        let staffR = Math.round(noteR * staffOp);
        let staffG = Math.round(noteG * staffOp);
        let staffB = Math.round(noteB * staffOp);
        const ledgerColor = `rgba(${staffR}, ${staffG}, ${staffB}, 1.0)`;

        const startX = 180, endX = 2380, xSpacing = (endX - startX) / 15;

        seq.forEach((item, i) => {
            let color = (isRunning && i === currentStep) ? activeColor : inactiveColor;
            if (item.isError && i === currentStep) color = errorColor;
            
            ctx.globalAlpha = 1.0; 

            let x = startX + i * xSpacing;
            let baseLineY = item.clef === 'treble' ? TREBLE_BASE_Y : BASS_BASE_Y;
            let spacing = item.clef === 'treble' ? TREBLE_SP_Y : BASS_SP_Y;
            
            let noteY = baseLineY - (item.off * spacing);
            
            drawLedgers(x, item.off, baseLineY, spacing, ledgerColor);
            
            ctx.fillStyle = color; 
            ctx.shadowBlur = 0; // SZIGORÚAN 0 GLOW
            ctx.shadowColor = color; 
            
            if (item.s !== '') { 
                ctx.font = item.s === '♭' ? '46px Arial' : '34px Arial'; 
                ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
                ctx.fillText(item.s, x - 22, noteY + (item.s === '♭' ? 8 : 14)); 
            }
            
            // Szárak rajzolása (Kottaolvasás specifikus)
            if (item.dur === 2) {
                ctx.beginPath(); ctx.lineWidth = 2.5; ctx.strokeStyle = color; 
                let stemUp = (item.off < 0); 
                if(stemUp) { 
                    ctx.moveTo(x+13, noteY+2); ctx.lineTo(x+13, noteY-66); 
                } else { 
                    ctx.moveTo(x-13, noteY-2); ctx.lineTo(x-13, noteY+66); 
                } 
                ctx.stroke();
            }

            ctx.beginPath(); 
            ctx.ellipse(x, noteY, 14, 10, -Math.PI/10, 0, 2*Math.PI); 
            if (item.dur === 1) {
                // Egész hang (üres)
                ctx.fillStyle = '#050508'; ctx.fill(); 
                ctx.lineWidth = 3.5; ctx.strokeStyle = color; ctx.stroke();
            } else {
                // Negyed hang (teli)
                ctx.fill(); 
            }

            if (showNames) {
                ctx.fillStyle = color; ctx.font = 'bold 20px Inter'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0; // SZIGORÚAN 0 GLOW
                ctx.fillText(item.n, x + 28, noteY);
            }
        });
        ctx.globalAlpha = 1.0;
    }

    window.onload = () => {
        updateLCD(); 
        document.fonts.ready.then(draw);
        const wrap = document.getElementById('hb-wrap'); const whites = [0,2,4,5,7,9,11]; let wIdx = 0;
        for(let m=21; m<=108; m++) {
            const k = document.createElement('div'); const isW = whites.includes(m%12);
            k.id = `k-${m}`; k.className = `key-glow ${isW?'white-glow':'black-glow'}`;
            if(isW) { k.style.left = (wIdx * 1.92307) + "%"; k.style.width = "1.92307%"; k.style.height="100%"; wIdx++; }
            else { k.style.left = ((wIdx * 1.92307) - 0.6) + "%"; k.style.width = "1.2%"; k.style.height="65%"; k.style.zIndex="200"; }
            k.onmousedown = (e) => { e.preventDefault(); k.classList.add('pressed'); handleNoteOn(m, 100); }; k.onmouseup = () => { k.classList.remove('pressed'); handleNoteOff(m); }; k.onmouseleave = () => { k.classList.remove('pressed'); handleNoteOff(m); };
            wrap.appendChild(k);
        }
    };
</script>
</body>
