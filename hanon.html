<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Akíra Piano Academy | Workstation - Hanon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --rack-bg: #1a1a1d;
            --rack-border: #2a2a2d;
            --btn-dark: #101012;
            --btn-border: #050505;
            --text-dim: #555;
            --lcd-bg-dark: #111211;
            --lcd-label-color: #557799;
            --oled-text: #b3e6ff;
        }

        body {
            font-family: 'Inter', sans-serif; background: #000;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; color: #fff;
            -webkit-user-select: none; user-select: none;
        }

        /* ── KOTTA KIJELZŐ ── */
        .sheet-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px 20px; width: 100%; box-sizing: border-box; overflow: visible;
        }
        .sheet-viewport {
            width: 100%; max-width: 2450px; aspect-ratio: 2450 / 480; position: relative; overflow: visible;
            background: transparent;
        }
        .sheet-image { width: 100%; height: 100%; object-fit: contain; z-index: 1; position: absolute; opacity: 0.35; pointer-events: none; }
        #staffCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        /* ── WORKSTATION CHASSIS ── */
        .lower-section { width: 100%; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .workstation-chassis {
            display: flex; width: 100%; max-width: 2560px; position: relative;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9); border-radius: 6px 6px 0 0; background: var(--rack-bg);
        }
        .wood-cheek {
            width: 24px; background: linear-gradient(to right, #3a1c0d, #1a0c05);
            box-shadow: inset 1px 0 2px rgba(255,255,255,0.1), inset -2px 0 5px rgba(0,0,0,0.8);
            border-radius: 6px 0 0 0; z-index: 10;
        }
        .wood-cheek.right { border-radius: 0 6px 0 0; background: linear-gradient(to left, #3a1c0d, #1a0c05); }
        .synth-core { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        /* ── INFO SÁV ── */
        .info-bar-integrated {
            width: 100%; height: 45px; background-color: var(--lcd-bg-dark); border-bottom: 2px solid #080808;
            display: flex; align-items: center; justify-content: center; z-index: 10;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.9), 0 5px 15px rgba(0,0,0,0.5);
        }
        .info-bar-text {
            font-family: 'Share Tech Mono', monospace; font-size: 18px; font-weight: bold;
            color: var(--oled-text); text-transform: uppercase; letter-spacing: 2px;
        }

        /* ── MIXER OVERLAY ── */
        .settings-bar {
            position: absolute; bottom: 100%; left: 0; width: 100%; height: 85px; background: var(--lcd-bg-dark);
            display: none; align-items: center; justify-content: space-around; z-index: 50; border-top: 2px solid #333;
            box-shadow: 0 -10px 30px #000; padding: 0 20px; box-sizing: border-box;
        }
        .settings-control { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 150px; z-index: 2; position: relative; }
        .settings-control label { font-size: 11px; color: var(--lcd-label-color); font-family: 'Share Tech Mono', monospace; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .settings-control input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #111; border-radius: 3px; outline: none; cursor: pointer; box-shadow: inset 0 1px 3px #000; }
        .settings-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 20px; background: #888; border: 1px solid #111; border-radius: 2px; box-shadow: 0 2px 4px #000; cursor: grab; }

        /* ── MASTER DASHBOARD ── */
        .master-dashboard {
            display: flex; justify-content: space-between; align-items: center;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 3px;
            padding: 25px 30px; border-top: 1px solid #333; position: relative; width: 100%; box-sizing: border-box;
        }
        .dashboard-logo { position: absolute; top: -35px; left: 30px; z-index: 5; pointer-events: none; }
        .control-group { display: flex; align-items: center; gap: 8px; z-index: 10; }

        /* HARDVER GOMBOK */
        .hardware-btn {
            width: 95px; height: 38px; background-color: var(--btn-dark); color: var(--text-dim);
            border: 1px solid var(--btn-border); border-radius: 3px; cursor: pointer;
            font-weight: 700; font-size: 12px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-decoration: none;
            box-shadow: 0 3px 0 #000; transition: transform 0.1s; text-shadow: none !important;
        }
        .hardware-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #000; }
        .hardware-btn.active { color: #ffffff; background-color: #121214; }

        #btnStart { width: 110px; font-weight: 800; font-size: 14px; letter-spacing: 1px; box-shadow: 0 4px 0 #000; margin-left: 20px; }
        #btnStart:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        #btnStart.running { color: #ffffff; background-color: #1a1a1c; border-color: #333; }

        /* ── CENTER CONSOLE (4-részes OLED + nyilak) ── */
        .center-console { flex: 1; display: flex; justify-content: center; position: relative; }
        .lcd-arrow-wrapper { display: flex; flex-direction: column; align-items: center; width: 620px; }
        .arrow-row { display: flex; width: 100%; justify-content: space-around; margin: 4px 0; }
        .nav-disk-btn { width: 22px; height: 22px; background: #222; border: 1px solid #111; border-radius: 50%; color: #888; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 2px rgba(0,0,0,0.6); transition: 0.1s; flex-shrink: 0; }
        .nav-disk-btn:active { transform: translateY(2px); box-shadow: 0 0 1px rgba(0,0,0,0.6); }

        .oled-wrapper { background: #111; padding: 2px; border-radius: 4px; width: 100%; box-shadow: 0 2px 4px rgba(255,255,255,0.1); box-sizing: border-box; }
        .oled-screen { background: var(--lcd-bg-dark); border: 2px solid #222; border-radius: 2px; display: flex; box-shadow: inset 0 3px 8px rgba(0,0,0,0.9); overflow: hidden; }
        .oled-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 0; cursor: pointer; }
        .oled-divider { width: 1px; background: rgba(255,255,255,0.05); margin: 5px 0; }
        .oled-header { font-size: 11px; color: var(--lcd-label-color); font-family: 'Share Tech Mono'; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .oled-main { font-size: 18px; color: var(--oled-text); font-family: 'Share Tech Mono'; font-weight: bold; text-transform: uppercase; text-shadow: none !important; }

        /* HANON PATCH BROWSER */
        .patch-browser-content { max-width: 500px; }
        .patch-grid-hanon { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .patch-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 12px 5px; font-family: 'Share Tech Mono', monospace; font-size: 14px; cursor: pointer; border-radius: 4px; transition: 0.1s; text-align: center; }
        .patch-btn:hover { background: #222; color: #fff; }
        .patch-btn:active { transform: translateY(2px); }
        .patch-btn.disabled { color: #333; cursor: not-allowed; }
        .patch-btn.disabled:hover { background: #111; color: #333; }

        /* ── ZONGORA ── */
        .piano-crop-wrapper { width: 100%; position: relative; aspect-ratio: 2500/248; background: #000; overflow: visible; border-top: 2px solid #000; }
        .piano-inner { width: 100%; aspect-ratio: 2500/284; position: absolute; top: 0; left: 0; }
        .piano-img { width: 100%; height: 100%; display: block; filter: grayscale(100%); pointer-events: none; }
        .hitbox-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        .key-glow { position: absolute; top: 0; cursor: pointer; }
        .key-glow.pressed::after { content: ''; position: absolute; pointer-events: none; z-index: 150; top: 0; left: 0; width: 100%; height: 100%; border-radius: 0 0 4px 4px; background: rgba(0,0,0,0.11); box-shadow: inset 6px 0 10px -2px rgba(0,0,0,0.6); }
        .black-glow.pressed::after { top: 3px; left: 3px; width: calc(100% - 6px); height: calc(100% - 13px); border-radius: 3px; background: rgba(255,255,255,0.15); box-shadow: inset 0 -10px 15px rgba(255,255,255,0.3); z-index: 40; }

        /* ── MODÁLIS ABLAKOK ── */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--rack-bg); padding: 30px; border: 2px solid var(--rack-border); border-radius: 6px; text-align: center; max-width: 550px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,1), inset 0 1px 1px rgba(255,255,255,0.05); }
        .modal-title { color: #aaa; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; font-size: 16px; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #111; padding-bottom: 15px; }
        .modal-stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .modal-stat-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .modal-stat-label { font-size: 10px; color: var(--lcd-label-color); font-family: 'Share Tech Mono'; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .modal-stat-value { font-family: 'Share Tech Mono'; font-size: 28px; color: var(--oled-text); font-weight: bold; }
        .modal-tip { background: #111; border-left: 4px solid #333; padding: 15px; margin: 20px 0; text-align: left; font-size: 13px; color: #aaa; line-height: 1.5; border-radius: 0 4px 4px 0; font-family: 'Inter', sans-serif; }
        .modal-btn { background-color: var(--btn-dark); color: #aaa; border: 1px solid var(--btn-border); border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px; padding: 12px 40px; box-shadow: 0 3px 0 #000; transition: 0.1s; letter-spacing: 1px; }
        .modal-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000; }

        body.help-mode-active { cursor: help; } body.help-mode-active * { cursor: help !important; }
    </style>
</head>
<body>

    <!-- RESULT MODAL -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Session Complete</h2>
            <div class="modal-stats">
                <div class="modal-stat-box">
                    <div class="modal-stat-label">Avg Tempo</div>
                    <div id="modalBpm" class="modal-stat-value">0 BPM</div>
                </div>
                <div class="modal-stat-box">
                    <div class="modal-stat-label">Stability</div>
                    <div id="modalUni" class="modal-stat-value">100%</div>
                </div>
            </div>
            <div id="modalTip" class="modal-tip">Excellent work!</div>
            <button class="modal-btn" onclick="closeModal()">Acknowledge</button>
        </div>
    </div>

    <!-- PATCH BROWSER MODAL -->
    <div id="patchBrowserModal" class="modal-overlay">
        <div class="modal-content patch-browser-content">
            <h2 class="modal-title">Hanon Patch Browser</h2>
            <div style="text-align:left; margin-bottom:10px; color:var(--text-dim); font-size:11px; font-weight:bold; letter-spacing:1px;">PART I — EXERCISES 1–20</div>
            <div class="patch-grid-hanon">
                <button class="patch-btn" onclick="selectPatch(1, 'HANON No.1')">No. 1</button>
                <button class="patch-btn disabled">No. 2 <span style="font-size:10px; display:block; color:#444;">Soon</span></button>
                <button class="patch-btn disabled">No. 3 <span style="font-size:10px; display:block; color:#444;">Soon</span></button>
            </div>
            <button class="modal-btn" onclick="closePatchBrowser()">Cancel</button>
        </div>
    </div>

    <!-- KOTTA -->
    <div class="sheet-container">
        <div class="sheet-viewport">
            <img src="kottavonal_feher.png" class="sheet-image" id="sheetBg">
            <canvas id="staffCanvas" width="2450" height="480"></canvas>
        </div>
    </div>

    <!-- WORKSTATION CHASSIS -->
    <div class="lower-section">
        <div class="workstation-chassis">
            <div class="wood-cheek"></div>
            <div class="synth-core">

                <!-- MIXER OVERLAY -->
                <div id="mixerBar" class="settings-bar">
                    <div class="settings-control"><label>Attack</label><input type="range" id="vst_a" min="0" max="1" step="0.01" value="0.0"></div>
                    <div class="settings-control"><label>Decay</label><input type="range" id="vst_e" min="1" max="10" step="0.1" value="5.0"></div>
                    <div class="settings-control"><label>Release</label><input type="range" id="vst_r" min="0.1" max="3" step="0.1" value="0.6"></div>
                    <div class="settings-control"><label>Velocity</label><input type="range" id="vst_d" min="0.1" max="2" step="0.1" value="1.0"></div>
                </div>

                <!-- INFO SÁV -->
                <div class="info-bar-integrated">
                    <div id="infoBarText" class="info-bar-text">SYSTEM READY — SELECT EXERCISE OR PRESS START</div>
                </div>

                <!-- MASTER DASHBOARD -->
                <div class="master-dashboard">
                    <div class="dashboard-logo">
                        <svg viewBox="0 0 300 40" style="height:25px; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.8));">
                            <text x="60" y="30" fill="#666" font-family="'Inter',sans-serif" font-weight="800" font-size="32" text-anchor="end">AK</text>
                            <path d="M 64 30 L 72 30 L 72 12 L 68 12 L 68 0 L 64 0 Z" fill="#555"/>
                            <text x="76" y="30" fill="#666" font-family="'Inter',sans-serif" font-weight="800" font-size="32" text-anchor="start">RA</text>
                            <text x="135" y="28" fill="#444" font-family="'Inter',sans-serif" font-weight="600" font-size="14" letter-spacing="3">WORKSTATION</text>
                        </svg>
                    </div>

                    <!-- BAL CSOPORT -->
                    <div class="control-group">
                        <a href="index.html" class="hardware-btn" style="text-decoration:none;" data-help="HOME: RETURN TO MAIN MENU">Home</a>
                        <button id="handRH" class="hardware-btn active" onclick="if(!helpActive) toggleHand('RH')" data-help="TOP CLEF: TOGGLES RIGHT HAND NOTES">Top</button>
                        <button id="handLH" class="hardware-btn active" onclick="if(!helpActive) toggleHand('LH')" data-help="BOTTOM CLEF: TOGGLES LEFT HAND NOTES">Bottom</button>
                        <button id="btnHintName" class="hardware-btn" onclick="if(!helpActive) toggleHint('name')" data-help="HINTS: SHOWS NOTE NAMES ABOVE NOTEHEADS">Hints</button>
                        <button id="btnHintFinger" class="hardware-btn" onclick="if(!helpActive) toggleHint('finger')" data-help="FINGERS: SHOWS OFFICIAL FINGERING (1–5) ON SHEET">Fingers</button>
                    </div>

                    <!-- KÖZÉP: OLED + NYILAK -->
                    <div class="center-console">
                        <div class="lcd-arrow-wrapper">
                            <div class="arrow-row">
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleModule(-1)">▲</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleMode(1)">▲</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleHanon(1)">▲</button>
                                <button class="nav-disk-btn" style="opacity:0; pointer-events:none;">▲</button>
                            </div>

                            <div class="oled-wrapper">
                                <div class="oled-screen">
                                    <div class="oled-section" onclick="if(!helpActive) loadModule()" data-help="MODULE: CLICK TO NAVIGATE TO ANOTHER MODULE">
                                        <div class="oled-header">Module</div>
                                        <div class="oled-main" id="lcdModuleText">HANON</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" onclick="if(!helpActive) cycleMode(1)" data-help="MODE: SPRINT (1×), MARATHON (3×), TRAINING (∞)">
                                        <div class="oled-header">Mode</div>
                                        <div class="oled-main" id="lcdModeText">SPRINT</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" onclick="if(!helpActive) openPatchBrowser()" data-help="EXERCISE: CLICK TO BROWSE HANON EXERCISES">
                                        <div class="oled-header">Exercise</div>
                                        <div class="oled-main" id="lcdHanonText">No. 1</div>
                                    </div>
                                    <div class="oled-divider"></div>
                                    <div class="oled-section" data-help="STATS: REAL-TIME BPM AND TIMING STABILITY">
                                        <div class="oled-header">BPM / Stab</div>
                                        <div class="oled-main" id="lcdStats" style="font-size:14px; letter-spacing:1px;">0 / 100%</div>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" id="hanonSelectValue" value="1">

                            <div class="arrow-row">
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleModule(1)">▼</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleMode(-1)">▼</button>
                                <button class="nav-disk-btn" onclick="if(!helpActive) cycleHanon(-1)">▼</button>
                                <button class="nav-disk-btn" style="opacity:0; pointer-events:none;">▼</button>
                            </div>
                        </div>
                    </div>

                    <!-- JOBB CSOPORT -->
                    <div class="control-group">
                        <button id="btnStart" class="hardware-btn" onclick="if(!helpActive) handleMainButton()" data-help="START/STOP: BEGIN OR END THE EXERCISE">START</button>
                        <button id="audioToggle" class="hardware-btn active" onclick="if(!helpActive) toggleAudio()" data-help="PIANO AUDIO: TOGGLE INTERNAL SYNTHESIZER">Piano</button>
                        <button id="btnVst" class="hardware-btn" onclick="if(!helpActive) toggleVst()" data-help="MIXER: OPEN ADSR ENVELOPE PANEL">Mixer</button>
                        <button id="btnFullscreen" class="hardware-btn" onclick="if(!helpActive) toggleFullScreen()" data-help="FULLSCREEN: IMMERSIVE STUDIO MODE">Fullscr</button>
                        <button id="btnHelp" class="hardware-btn" onclick="toggleHelp()" data-help="HELP: CLICK ANY ELEMENT TO SEE INFO">Help</button>
                    </div>
                </div>

                <!-- ZONGORA -->
                <div class="piano-crop-wrapper">
                    <div class="piano-inner">
                        <img src="grandpiano-keys.png" class="piano-img">
                        <div id="hb-wrap" class="hitbox-layer"></div>
                    </div>
                </div>

            </div>
            <div class="wood-cheek right"></div>
        </div>
    </div>

<script>
    // ── AUDIO ──
    let audioInited = false;
    let audioCtx, sampleBuffers = {}, activeNodes = {}, audioOn = true;

    async function initAudio() {
        if (audioInited) return; audioInited = true;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const s = { 21: 'A0', 36: 'C2', 48: 'C3', 60: 'C4', 72: 'C5', 84: 'C6' };
        for (let k in s) {
            try {
                const r = await fetch(`https://tonejs.github.io/audio/salamander/${s[k]}.mp3`);
                sampleBuffers[k] = await audioCtx.decodeAudioData(await r.arrayBuffer());
            } catch (e) {}
        }
        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(m => {
                m.inputs.forEach(input => input.onmidimessage = (msg) => {
                    const cmd = msg.data[0] >> 4, n = msg.data[1], v = msg.data[2];
                    if (cmd === 9 && v > 0) { document.getElementById(`k-${n}`)?.classList.add('pressed'); handleNoteOn(n, v); }
                    else if (cmd === 8 || (cmd === 9 && v === 0)) { document.getElementById(`k-${n}`)?.classList.remove('pressed'); handleNoteOff(n); }
                });
            }).catch(e => {});
        }
    }

    function playTone(note, vel) {
        if (!audioCtx || !audioOn || Object.keys(sampleBuffers).length === 0) return;
        if (activeNodes[note]) { try { activeNodes[note].source.stop(); } catch (e) {} delete activeNodes[note]; }
        const source = audioCtx.createBufferSource();
        let closest = 36, minDiff = 999;
        for (let b in sampleBuffers) { let diff = Math.abs(note - b); if (diff < minDiff) { minDiff = diff; closest = b; } }
        source.buffer = sampleBuffers[closest];
        source.playbackRate.value = Math.pow(2, (note - closest) / 12);
        const gain = audioCtx.createGain();
        const v_a = parseFloat(document.getElementById('vst_a').value);
        const v_e = parseFloat(document.getElementById('vst_e').value);
        const v_d = parseFloat(document.getElementById('vst_d').value);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime((vel / 127) * v_d, audioCtx.currentTime + v_a + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + v_e);
        source.connect(gain).connect(audioCtx.destination); source.start();
        activeNodes[note] = { source, gain };
    }

    function handleNoteOff(midi) {
        if (!activeNodes[midi]) return;
        const v_r = parseFloat(document.getElementById('vst_r').value);
        const gainNode = activeNodes[midi].gain;
        gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
        gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + v_r);
        activeNodes[midi].source.stop(audioCtx.currentTime + v_r + 0.1);
        delete activeNodes[midi];
    }

    // ── HELP ──
    let helpActive = false;
    function toggleHelp() {
        helpActive = !helpActive;
        document.getElementById('btnHelp').classList.toggle('active', helpActive);
        if (helpActive) {
            document.body.classList.add('help-mode-active');
            document.getElementById('infoBarText').innerHTML = "HELP MODE — CLICK ANY ELEMENT TO READ ITS DESCRIPTION";
        } else {
            document.body.classList.remove('help-mode-active');
            document.getElementById('infoBarText').innerHTML = "SYSTEM READY — SELECT EXERCISE OR PRESS START";
        }
    }

    document.addEventListener('click', (e) => {
        if (e.target.closest('#btnHelp')) return;
        if (helpActive) {
            e.preventDefault(); e.stopPropagation();
            const target = e.target.closest('[data-help]');
            if (target) document.getElementById('infoBarText').innerHTML = target.dataset.help;
        }
    }, true);

    // ── FULLSCREEN ──
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else if (document.exitFullscreen) document.exitFullscreen();
    }
    document.addEventListener('fullscreenchange', () => {
        document.getElementById('btnFullscreen').classList.toggle('active', !!document.fullscreenElement);
    });

    // ── MODALS ──
    function openPatchBrowser() { document.getElementById('patchBrowserModal').style.display = 'flex'; }
    function closePatchBrowser() { document.getElementById('patchBrowserModal').style.display = 'none'; }
    function closeModal() { document.getElementById('resultModal').style.display = 'none'; stopPractice(); }

    // ── MODULE VÁLTÓ ──
    const modules = [
        { name: 'EAR TRAIN', url: 'hallasfejleszto.html' },
        { name: 'SIGHT READ', url: 'kottaolvasas.html' },
        { name: 'CHORDS', url: 'akkordok.html' },
        { name: 'SCALES', url: 'skalak.html' },
        { name: 'HANON', url: 'hanon.html' },
        { name: 'RHYTHM', url: 'ritmus.html' }
    ];
    let currentModuleIdx = 4; // HANON
    function cycleModule(dir) {
        if (helpActive) return;
        currentModuleIdx = (currentModuleIdx + dir + modules.length) % modules.length;
        document.getElementById('lcdModuleText').innerText = modules[currentModuleIdx].name;
    }
    function loadModule() {
        if (helpActive) return;
        if (currentModuleIdx !== 4) window.location.href = modules[currentModuleIdx].url;
    }

    // ── ÁLLAPOTOK ──
    let isRunning = false, activeRH = true, activeLH = true;
    let currentNoteInBlock = 0, currentBlockIndex = 0;
    let showNames = false, showFinger = false;
    let seqBlocks = [];
    let lastHitTime = 0, hitIntervals = [], fingerTimes = { 1: [], 2: [], 3: [], 4: [], 5: [] };

    // ── MODE ──
    const MODES = ['SPRINT', 'MARATHON', 'TRAINING'];
    let currentModeIdx = 0;
    function cycleMode(dir) {
        if (helpActive) return;
        currentModeIdx = (currentModeIdx + dir + MODES.length) % MODES.length;
        document.getElementById('lcdModeText').innerText = MODES[currentModeIdx];
        if (isRunning) stopPractice(); buildSequence(); draw();
    }

    // ── HANON VÁLTÓ ──
    const hanonList = [{ val: 1, name: 'No. 1' }]; // bővíthető
    let currentHanonIdx = 0;
    function cycleHanon(dir) {
        if (helpActive) return;
        let next = currentHanonIdx + dir;
        if (next < 0 || next >= hanonList.length) return;
        currentHanonIdx = next;
        document.getElementById('lcdHanonText').innerText = hanonList[currentHanonIdx].name;
        document.getElementById('hanonSelectValue').value = hanonList[currentHanonIdx].val;
        if (isRunning) stopPractice(); buildSequence(); draw();
    }
    function selectPatch(val, name) {
        currentHanonIdx = hanonList.findIndex(h => h.val === val);
        if (currentHanonIdx < 0) currentHanonIdx = 0;
        document.getElementById('lcdHanonText').innerText = hanonList[currentHanonIdx].name;
        document.getElementById('hanonSelectValue').value = val;
        closePatchBrowser();
        if (isRunning) stopPractice(); buildSequence(); draw();
    }

    // ── EGYÉB GOMBOK ──
    function toggleHand(hand) {
        if (hand === 'RH') { activeRH = !activeRH; if (!activeRH && !activeLH) activeLH = true; }
        else { activeLH = !activeLH; if (!activeLH && !activeRH) activeRH = true; }
        document.getElementById('handRH').classList.toggle('active', activeRH);
        document.getElementById('handLH').classList.toggle('active', activeLH);
        if (isRunning) stopPractice(); buildSequence(); draw();
    }
    function toggleHint(type) {
        if (type === 'name') { showNames = !showNames; document.getElementById('btnHintName').classList.toggle('active', showNames); }
        else { showFinger = !showFinger; document.getElementById('btnHintFinger').classList.toggle('active', showFinger); }
        draw();
    }
    function toggleAudio() {
        audioOn = !audioOn;
        document.getElementById('audioToggle').classList.toggle('active', audioOn);
        if (audioOn && !audioCtx) initAudio();
    }
    function toggleVst() {
        if (helpActive) return;
        let mb = document.getElementById('mixerBar');
        mb.style.display = (mb.style.display === 'flex') ? 'none' : 'flex';
        document.getElementById('btnVst').classList.toggle('active');
    }

    // ── HANON 1 LOGIKA (eredeti, érintetlen) ──
    const C_MAJOR_MIDI = [0, 2, 4, 5, 7, 9, 11];
    const NOTE_NAMES = ['C', 'D', 'E', 'F', 'G', 'A', 'H'];

    function getNoteInfo(diatonicStep) {
        let octave = Math.floor(diatonicStep / 7);
        let noteIndex = diatonicStep % 7;
        let midi = (octave * 12) + 12 + C_MAJOR_MIDI[noteIndex];
        let name = NOTE_NAMES[noteIndex];
        return { midi, name };
    }

    function buildHanon1() {
        let fullSeq = [];
        let ascPattern  = [0,  2,  3,  4,  5,  4,  3,  2];
        let descPattern = [0, -2, -3, -4, -5, -4, -3, -2];
        let f_rh_asc  = [1, 2, 3, 4, 5, 4, 3, 2];
        let f_lh_asc  = [5, 4, 3, 2, 1, 2, 3, 4];
        let f_rh_desc = [5, 4, 3, 2, 1, 2, 3, 4];
        let f_lh_desc = [1, 2, 3, 4, 5, 4, 3, 2];

        // Felfelé
        for (let rootStep = 28; rootStep <= 34; rootStep++) {
            for (let i = 0; i < 8; i++) {
                let currentStepRH = rootStep + ascPattern[i];
                let currentStepLH = (rootStep - 7) + ascPattern[i];
                let infoRH = getNoteInfo(currentStepRH);
                let infoLH = getNoteInfo(currentStepLH);
                fullSeq.push({
                    n: infoRH.name, s: '',
                    m_rh: infoRH.midi, step_rh: currentStepRH,
                    m_lh: infoLH.midi, step_lh: currentStepLH,
                    f_rh: f_rh_asc[i], f_lh: f_lh_asc[i]
                });
            }
        }

        // Lefelé
        for (let rootStep = 39; rootStep >= 31; rootStep--) {
            for (let i = 0; i < 8; i++) {
                let currentStepRH = rootStep + descPattern[i];
                let currentStepLH = (rootStep - 7) + descPattern[i];
                let infoRH = getNoteInfo(currentStepRH);
                let infoLH = getNoteInfo(currentStepLH);
                fullSeq.push({
                    n: infoRH.name, s: '',
                    m_rh: infoRH.midi, step_rh: currentStepRH,
                    m_lh: infoLH.midi, step_lh: currentStepLH,
                    f_rh: f_rh_desc[i], f_lh: f_lh_desc[i]
                });
            }
        }

        // Záróhang C4
        let finRH = getNoteInfo(28), finLH = getNoteInfo(21);
        fullSeq.push({ n: finRH.name, s: '', m_rh: finRH.midi, step_rh: 28, m_lh: finLH.midi, step_lh: 21, f_rh: 1, f_lh: 5 });
        return fullSeq;
    }

    function buildSequence() {
        let rawSeq = buildHanon1();
        let loops = (MODES[currentModeIdx] === 'SPRINT') ? 1 : (MODES[currentModeIdx] === 'MARATHON' ? 3 : 100);
        let flatSeq = [];
        for (let l = 0; l < loops; l++) flatSeq = flatSeq.concat(rawSeq);
        seqBlocks = [];
        for (let i = 0; i < flatSeq.length; i += 16) seqBlocks.push(flatSeq.slice(i, i + 16));
        currentBlockIndex = 0; currentNoteInBlock = 0;
    }

    // ── KOTTA KALIBRÁCIÓ ──
    const KOTTA_E4_Y = 187.6;
    const KOTTA_VONALKOZ_FEL_RH = 11.14;
    const KOTTA_G2_Y = 417;
    const KOTTA_VONALKOZ_FEL_LH = 10.71;

    const canvas = document.getElementById('staffCanvas'), ctx = canvas.getContext('2d');

    function draw() {
        ctx.clearRect(0, 0, 2450, 480);
        if (seqBlocks.length === 0) return;

        let block = seqBlocks[currentBlockIndex];
        let totalNotes = block.length;
        let startX = 180, endX = 2380;
        let spacingX = totalNotes > 1 ? (endX - startX) / (totalNotes - 1) : 0;

        block.forEach((n, i) => {
            let alpha = (isRunning && i < currentNoteInBlock) ? 0.2 : (isRunning && i === currentNoteInBlock ? 1.0 : 0.6);
            if (!isRunning && i === 0 && currentBlockIndex === 0) alpha = 1.0;
            let x = startX + (i * spacingX);
            let isActive = (isRunning && i === currentNoteInBlock);
            let color = isActive ? '#b3e6ff' : '#ffffff';

            if (activeRH) {
                ctx.globalAlpha = alpha;
                let y = KOTTA_E4_Y - ((n.step_rh - 30) * KOTTA_VONALKOZ_FEL_RH);
                ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2;
                if (n.step_rh <= 28) { for (let s = 28; s >= n.step_rh; s -= 2) { let ly = KOTTA_E4_Y - ((s - 30) * KOTTA_VONALKOZ_FEL_RH); ctx.beginPath(); ctx.moveTo(x - 20, ly); ctx.lineTo(x + 20, ly); ctx.stroke(); } }
                if (n.step_rh >= 40) { for (let s = 40; s <= n.step_rh; s += 2) { let ly = KOTTA_E4_Y - ((s - 30) * KOTTA_VONALKOZ_FEL_RH); ctx.beginPath(); ctx.moveTo(x - 20, ly); ctx.lineTo(x + 20, ly); ctx.stroke(); } }
                ctx.restore();
                ctx.beginPath(); ctx.ellipse(x, y, 14, 10, -Math.PI / 10, 0, 2 * Math.PI); ctx.fillStyle = color; ctx.fill();
                if (showNames) { ctx.font = 'bold 18px Inter'; ctx.fillStyle = '#b3e6ff'; ctx.textAlign = 'center'; ctx.fillText(n.n, x, y - 22); }
                if (showFinger) { ctx.font = 'bold 18px Inter'; ctx.fillStyle = '#b3e6ff'; ctx.textAlign = 'center'; ctx.fillText(n.f_rh, x, y + 34); }
            }

            if (activeLH) {
                ctx.globalAlpha = alpha;
                // Hanon LH: step=21 = C3, step=19 = G2 (KOTTA_G2_Y)
                // Offset = 19 hogy G2 (step=19) → y = KOTTA_G2_Y - 0 = G2 pixel pozíció
                let y = KOTTA_G2_Y - ((n.step_lh - 19) * KOTTA_VONALKOZ_FEL_LH);
                ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = 2;
                // Léniavonalak: bass clef alatt step<=17 (C3 alatti), fölötte step>=29
                if (n.step_lh <= 17) { for (let s = 17; s >= n.step_lh; s -= 2) { let ly = KOTTA_G2_Y - ((s - 19) * KOTTA_VONALKOZ_FEL_LH); ctx.beginPath(); ctx.moveTo(x - 20, ly); ctx.lineTo(x + 20, ly); ctx.stroke(); } }
                if (n.step_lh >= 29) { for (let s = 29; s <= n.step_lh; s += 2) { let ly = KOTTA_G2_Y - ((s - 19) * KOTTA_VONALKOZ_FEL_LH); ctx.beginPath(); ctx.moveTo(x - 20, ly); ctx.lineTo(x + 20, ly); ctx.stroke(); } }
                ctx.restore();
                ctx.beginPath(); ctx.ellipse(x, y, 14, 10, -Math.PI / 10, 0, 2 * Math.PI); ctx.fillStyle = color; ctx.fill();
                if (showNames) { ctx.font = 'bold 18px Inter'; ctx.fillStyle = '#b3e6ff'; ctx.textAlign = 'center'; ctx.fillText(n.n, x, y - 22); }
                if (showFinger) { ctx.font = 'bold 18px Inter'; ctx.fillStyle = '#b3e6ff'; ctx.textAlign = 'center'; ctx.fillText(n.f_lh, x, y + 34); }
            }
        });
        ctx.globalAlpha = 1.0;
    }

    // ── PRACTICE KONTROL ──
    function handleMainButton() {
        if (!isRunning) {
            initAudio(); buildSequence(); isRunning = true;
            document.getElementById('btnStart').innerText = 'STOP';
            document.getElementById('btnStart').classList.add('running');
            lastHitTime = 0; hitIntervals = []; fingerTimes = { 1: [], 2: [], 3: [], 4: [], 5: [] };
            document.getElementById('lcdStats').innerText = '0 / 100%';
            document.getElementById('infoBarText').innerText = `PLAYING — ${MODES[currentModeIdx]} — HANON ${hanonList[currentHanonIdx].name.toUpperCase()}`;
            draw();
        } else stopPractice();
    }

    function stopPractice() {
        isRunning = false; currentNoteInBlock = 0; currentBlockIndex = 0;
        document.getElementById('btnStart').innerText = 'START';
        document.getElementById('btnStart').classList.remove('running');
        document.getElementById('infoBarText').innerText = 'SYSTEM READY — SELECT EXERCISE OR PRESS START';
        draw();
    }

    function showResults() {
        isRunning = false;
        document.getElementById('btnStart').innerText = 'START';
        document.getElementById('btnStart').classList.remove('running');
        if (hitIntervals.length === 0) { stopPractice(); return; }

        let avgDiff = hitIntervals.reduce((a, b) => a + b) / hitIntervals.length;
        let avgBpm = Math.round(60000 / avgDiff);
        let finalUniformity = document.getElementById('lcdStats').innerText.split('/')[1]?.trim() || '100%';

        let weakestFinger = 0, maxAvgTime = 0;
        for (let f = 1; f <= 5; f++) {
            if (fingerTimes[f].length > 0) {
                let avg = fingerTimes[f].reduce((a, b) => a + b) / fingerTimes[f].length;
                if (avg > maxAvgTime) { maxAvgTime = avg; weakestFinger = f; }
            }
        }

        const fingerNames = ['', 'Thumb (1)', 'Index (2)', 'Middle (3)', 'Ring (4)', 'Pinky (5)'];
        let tipText = 'Excellent work! Your timing was consistent throughout the exercise.';
        if (weakestFinger === 4 || weakestFinger === 5) {
            tipText = `The data shows your <b>${fingerNames[weakestFinger]}</b> was the slowest. This is natural in Hanon exercises — focus on lifting that finger higher before each keystroke.`;
        } else if (weakestFinger > 0) {
            tipText = `Your <b>${fingerNames[weakestFinger]}</b> caused the most slowdowns. Check your hand position and keep your wrist relaxed.`;
        }

        document.getElementById('modalBpm').innerText = avgBpm + ' BPM';
        document.getElementById('modalUni').innerText = finalUniformity;
        document.getElementById('modalTip').innerHTML = tipText;
        document.getElementById('resultModal').style.display = 'flex';
        draw();
    }

    function handleNoteOn(midi, vel = 100) {
        playTone(midi, vel);
        if (!isRunning || seqBlocks.length === 0) return;
        let note = seqBlocks[currentBlockIndex][currentNoteInBlock];

        // Hit detekció: ha mindkét kéz aktív, elég bármelyik helyes hang
        // (egéren/billentyűzeten nem lehet egyszerre két hangot leütni)
        let hit = false;
        if (activeRH && midi === note.m_rh) hit = true;
        if (activeLH && midi === note.m_lh) hit = true;

        if (hit) {
            let now = performance.now();
            if (lastHitTime > 0) {
                let diff = now - lastHitTime;
                hitIntervals.push(diff);
                if (activeRH && note.f_rh) fingerTimes[note.f_rh].push(diff);
                if (activeLH && note.f_lh) fingerTimes[note.f_lh].push(diff);

                let currentBpm = Math.round(60000 / diff);
                let avg = hitIntervals.reduce((a, b) => a + b) / hitIntervals.length;
                let dev = Math.sqrt(hitIntervals.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / hitIntervals.length);
                let uniformity = Math.round(Math.max(0, 100 - (dev / 3)));
                document.getElementById('lcdStats').innerText = `${currentBpm} / ${uniformity}%`;
            }
            lastHitTime = now;
            currentNoteInBlock++;
            if (currentNoteInBlock >= seqBlocks[currentBlockIndex].length) {
                currentNoteInBlock = 0; currentBlockIndex++;
                if (currentBlockIndex >= seqBlocks.length) { showResults(); return; }
            }
            draw();
        }
    }

    // ── BILLENTYŰZET ──
    function create88() {
        const wrap = document.getElementById('hb-wrap');
        const whites = [0, 2, 4, 5, 7, 9, 11]; let wIdx = 0;
        for (let m = 21; m <= 108; m++) {
            const k = document.createElement('div'); const isW = whites.includes(m % 12);
            k.id = `k-${m}`; k.className = `key-glow ${isW ? 'white-glow' : 'black-glow'}`;
            if (isW) { k.style.left = (wIdx * 1.92307) + '%'; k.style.width = '1.92307%'; k.style.height = '100%'; wIdx++; }
            else { k.style.left = ((wIdx * 1.92307) - 0.6) + '%'; k.style.width = '1.2%'; k.style.height = '65%'; k.style.zIndex = '200'; }
            k.onmousedown = (e) => { e.preventDefault(); k.classList.add('pressed'); handleNoteOn(m, 100); };
            k.onmouseup = () => { k.classList.remove('pressed'); handleNoteOff(m); };
            k.onmouseleave = () => { k.classList.remove('pressed'); handleNoteOff(m); };
            wrap.appendChild(k);
        }
    }

    window.onload = () => { 
        create88(); 
        buildSequence(); 
        draw();
        // Audio inicializálás első interakcióra (nem bodyon, hogy ne zavarja a gombokat)
        window.addEventListener('pointerdown', () => initAudio(), { once: true });
    };
</script>
